<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event — LunarPad</title>
<link rel="stylesheet" href="/css/style.css">
<style>
.event-hero {
  background: var(--glass); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 32px;
  margin-bottom: 32px; backdrop-filter: blur(8px);
  position: relative; overflow: hidden;
}
.event-hero::before {
  content: ''; position: absolute; top: -50%; right: -20%;
  width: 300px; height: 300px; border-radius: 50%;
  background: radial-gradient(circle, rgba(57,217,138,.06) 0%, transparent 70%);
  pointer-events: none;
}
.event-hero-type {
  font-family: var(--font-mono); font-size: 0.65rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .1em; color: var(--accent);
  margin-bottom: 12px;
}
.event-hero-name { font-size: 1.6rem; font-weight: 800; color: var(--text); margin-bottom: 8px; }
.event-hero-meta { font-size: 0.88rem; color: var(--muted); margin-bottom: 20px; display: flex; gap: 16px; flex-wrap: wrap; }
.event-hero-row { display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 20px; }
.event-hero-actions { display: flex; gap: 8px; }
.event-hero-countdown { display: flex; gap: 8px; }
.event-hero-countdown .cd-unit {
  text-align: center; min-width: 52px;
  background: rgba(0,0,0,.3); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 8px;
}
.cd-val { font-family: var(--font-mono); font-size: 1.4rem; font-weight: 800; color: var(--accent); line-height: 1; }
.cd-label { font-family: var(--font-mono); font-size: 0.55rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-top: 4px; }

.event-prize {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--font-mono); font-size: 0.85rem; font-weight: 700;
  color: var(--btc-gold); padding: 6px 14px;
  background: rgba(242,177,52,.06); border: 1px solid rgba(242,177,52,.15);
  border-radius: 100px; margin-bottom: 16px;
}

.event-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
.event-tab {
  padding: 10px 20px; font-size: 0.82rem; font-weight: 500;
  color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
  transition: all .15s; background: none; border-top: none; border-left: none; border-right: none;
  font-family: var(--font);
}
.event-tab:hover { color: var(--text); }
.event-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.event-tab-view { display: none; }
.event-tab-view.active { display: block; }

.lineup-empty { font-size: 0.85rem; color: var(--muted2); padding: 24px; text-align: center; background: var(--glass); border: 1px solid var(--border); border-radius: var(--radius); }

.rsvp-card {
  background: var(--glass); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 24px; max-width: 400px;
}
.rsvp-card h3 { font-size: 0.9rem; font-weight: 700; color: var(--text); margin-bottom: 16px; }
.rsvp-success { font-size: 0.85rem; color: var(--accent); padding: 12px; display: none; }

/* About section */
.event-about-section {
  background: var(--glass); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 24px 28px; margin-bottom: 24px;
}
.event-about-heading {
  font-family: var(--font-mono); font-size: 0.65rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .12em; color: var(--accent); margin-bottom: 12px;
}
.event-about-body {
  font-size: 0.9rem; color: var(--text2); line-height: 1.75; white-space: pre-wrap;
}
.event-attendees-card {
  background: var(--glass); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 22px 24px; margin-bottom: 24px;
}
.event-attendees-head {
  display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; margin-bottom: 16px;
}
.event-attendees-title {
  font-family: var(--font-mono); font-size: 0.72rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .12em; color: var(--accent);
}
.event-attendees-copy {
  font-size: 0.84rem; color: var(--muted); margin-top: 6px;
}
.event-attendees-count {
  font-family: var(--font-mono); font-size: 0.7rem; color: var(--muted2);
  padding: 8px 12px; border-radius: 999px; border: 1px solid var(--border);
  background: rgba(255,255,255,0.03); white-space: nowrap;
}
.event-attendees-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px;
}
.event-attendee-pill {
  display: flex; align-items: center; gap: 12px; min-width: 0;
  padding: 12px 14px; border-radius: var(--radius);
  border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.03);
  text-decoration: none; color: inherit;
}
.event-attendee-pill:hover {
  border-color: rgba(124,92,252,.28); background: rgba(124,92,252,.08);
}
.event-attendee-avatar {
  width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; overflow: hidden;
  font-family: var(--font-mono); font-size: 0.78rem; font-weight: 800; color: #fff;
  background: linear-gradient(135deg, rgba(124,92,252,.85), rgba(60,203,218,.72));
  border: 1px solid rgba(255,255,255,.14);
}
.event-attendee-avatar img {
  width: 100%; height: 100%; object-fit: cover;
}
.event-attendee-body { min-width: 0; }
.event-attendee-name {
  font-size: 0.88rem; color: var(--text); font-weight: 700;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.event-attendee-meta {
  font-size: 0.76rem; color: var(--muted2); margin-top: 4px;
}

/* Speaker cards */
.speaker-card {
  background: var(--glass); border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: 18px 20px; margin-bottom: 12px;
  display: flex; gap: 16px; align-items: flex-start;
  transition: border-color .15s;
}
.speaker-card:hover { border-color: rgba(124,92,252,.3); }
.spk-avatar {
  width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 0.85rem; color: #fff;
  font-family: var(--font-mono); letter-spacing: .04em;
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.12), 0 8px 18px rgba(0,0,0,0.22);
  text-shadow: 0 1px 0 rgba(0,0,0,0.28);
}
.spk-card-body { flex: 1; min-width: 0; }

.spk-card-name { font-size: 0.92rem; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.spk-card-project { font-size: 0.8rem; color: var(--accent); font-weight: 600; margin-bottom: 4px; }
.spk-card-desc { font-size: 0.8rem; color: var(--muted); line-height: 1.5; margin-bottom: 8px; }
.spk-card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.duration-pill {
  font-family: var(--font-mono); font-size: 0.62rem; font-weight: 700; padding: 3px 8px;
  border: 1px solid var(--border); border-radius: 100px; color: var(--muted2);
}
.speaker-status-pill {
  display: inline-flex; align-items: center; gap: 4px;
  font-family: var(--font-mono); font-size: 0.62rem; font-weight: 700;
  padding: 3px 8px; border-radius: 100px;
  border: 1px solid rgba(124,92,252,0.26); color: #cbbcff;
  background: rgba(124,92,252,0.10);
}
.speaker-status-pill.presented {
  border-color: rgba(57,217,138,0.28);
  color: #8df0bf;
}
.speaker-status-pill.winner {
  border-color: rgba(242,177,52,0.35);
  background: rgba(242,177,52,0.08);
  color: var(--btc-bright);
}
.event-results-card {
  margin: 0 0 24px;
  padding: 20px 22px;
  border-radius: var(--radius-lg);
  border: 1px solid rgba(242,177,52,0.22);
  background: linear-gradient(180deg, rgba(18,20,36,0.92), rgba(13,15,26,0.96));
}
.event-results-kicker {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted2);
  margin-bottom: 8px;
}
.event-results-title {
  font-family: var(--font-mono);
  font-size: 1rem;
  color: var(--text);
  margin-bottom: 6px;
}
.event-results-copy {
  color: var(--muted);
  font-size: 0.84rem;
  margin-bottom: 14px;
}
.event-results-status-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.event-results-status-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 12px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.04);
  font-family: var(--font-mono);
  font-size: 0.66rem;
  color: var(--text2);
}
.event-results-status-pill.gold {
  border-color: rgba(242,177,52,0.28);
  color: var(--btc-bright);
  background: rgba(242,177,52,0.08);
}
.event-results-shell {
  display: grid;
  gap: 16px;
}
.event-results-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
}
.event-results-stat {
  padding: 14px 16px;
  border-radius: var(--radius);
  border: 1px solid rgba(255,255,255,0.07);
  background: rgba(255,255,255,0.03);
}
.event-results-stat-label {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted2);
  margin-bottom: 8px;
}
.event-results-stat-value {
  font-family: var(--font-mono);
  font-size: 1.1rem;
  color: var(--text);
}
.event-results-grid {
  display: grid;
  grid-template-columns: minmax(0, 1.4fr) minmax(260px, 0.8fr);
  gap: 16px;
}
.event-results-panel {
  padding: 16px 18px;
  border-radius: var(--radius);
  border: 1px solid rgba(255,255,255,0.07);
  background: rgba(255,255,255,0.03);
}
.event-results-panel-title {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted2);
  margin-bottom: 12px;
}
.event-results-ranking-list,
.event-results-support-list {
  display: grid;
  gap: 10px;
}
.event-results-ranking-item,
.event-results-support-item {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: flex-start;
  padding: 12px 0;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.event-results-ranking-item:first-child,
.event-results-support-item:first-child {
  border-top: none;
  padding-top: 0;
}
.event-results-ranking-main,
.event-results-support-main {
  min-width: 0;
}
.event-results-ranking-rank {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--muted2);
  margin-bottom: 6px;
}
.event-results-ranking-name,
.event-results-support-name {
  font-size: 0.9rem;
  color: var(--text);
  font-weight: 700;
}
.event-results-ranking-project,
.event-results-support-copy,
.event-results-summary-markdown {
  color: var(--muted);
  font-size: 0.8rem;
  line-height: 1.55;
}
.event-results-ranking-meta,
.event-results-support-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 8px;
}
.event-results-meta-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 9px;
  border-radius: 999px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  font-family: var(--font-mono);
  font-size: 0.62rem;
  color: var(--text2);
}
.event-results-meta-pill.gold {
  color: var(--btc-bright);
  border-color: rgba(242,177,52,0.25);
  background: rgba(242,177,52,0.08);
}
.event-results-ranking-links {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 10px;
}
.event-results-link {
  font-size: 0.74rem;
  color: var(--accent);
  text-decoration: none;
}
.event-results-ranking-score {
  text-align: right;
  min-width: 88px;
  font-family: var(--font-mono);
}
.event-results-ranking-score strong {
  display: block;
  color: var(--text);
  font-size: 0.95rem;
}
.event-results-ranking-score span {
  display: block;
  margin-top: 4px;
  color: var(--btc-bright);
  font-size: 0.72rem;
}
.event-results-summary-markdown {
  white-space: pre-wrap;
}

.spk-card-right { display: flex; flex-direction: column; align-items: center; gap: 8px; flex-shrink: 0; }

/* Empty CTA state */
.empty-cta {
  text-align: center; padding: 40px 24px;
  background: var(--glass); border: 1px dashed var(--border); border-radius: var(--radius-lg);
}
.empty-cta-icon { font-size: 2rem; margin-bottom: 12px; }
.empty-cta h3 { font-size: 0.95rem; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.empty-cta p { font-size: 0.82rem; color: var(--muted2); margin-bottom: 16px; }

@media (max-width: 768px) {
  .event-hero { padding: 20px; }
  .event-hero-name { font-size: 1.2rem; }
  .event-hero-row { flex-direction: column; align-items: flex-start; gap: 16px; }
  .event-hero-meta { margin-bottom: 16px; gap: 10px; }
  .event-hero-countdown {
    width: 100%;
    flex-wrap: wrap;
  }
  .event-hero-countdown .cd-unit {
    flex: 1 1 calc(50% - 6px);
    min-width: 0;
  }
  .event-hero-actions {
    width: 100%;
    flex-direction: column;
  }
  .event-hero-actions .btn,
  .event-hero-actions button {
    width: 100%;
    justify-content: center;
    min-height: 44px;
  }
  .event-tabs { overflow-x: auto; margin-bottom: 18px; }
  .event-tab { white-space: nowrap; padding: 10px 14px; }
  .empty-cta { padding: 28px 18px; }
  .event-results-grid { grid-template-columns: 1fr; }
  .event-results-ranking-item,
  .event-results-support-item {
    flex-direction: column;
  }
  .event-results-ranking-score {
    text-align: left;
    min-width: 0;
  }
}

@media (max-width: 480px) {
  .event-hero { padding: 18px; }
  .event-hero[style*='display:flex'] {
    flex-direction: column;
    gap: 16px !important;
  }
  .event-hero[style*='display:flex'] > div:last-child {
    width: 100%;
    display: flex;
    justify-content: flex-start;
  }
}
</style>
</head>
<body>

<header class="header">
  <a href="/" class="logo">Lunar <span class="logo-slash"> \ </span><span class="logo-accent">Pad</span></a>
  <nav class="nav-tabs">
    <a href="/" class="nav-tab active">Build in Public</a>
    <a href="/decks" class="nav-tab">Decks</a>
    <a href="/foyer" class="nav-tab">The Foyer</a>
  </nav>
  <div class="header-actions" id="authArea">
    
    <div id="userArea"></div>
  </div>
</header>

<div class="container" style="padding-top:24px;padding-bottom:64px;">
  <a href="javascript:history.back()" class="viewer-back">Back</a>
  <div id="eventContent">
    <div class="skeleton-card" style="height:220px;border-radius:var(--radius-lg);margin-bottom:24px"></div>
    <div class="skeleton-card" style="height:80px;margin-bottom:12px"></div>
    <div class="skeleton-card" style="height:48px;margin-bottom:24px"></div>
    <div class="skeleton-card" style="height:110px;margin-bottom:12px"></div>
    <div class="skeleton-card" style="height:110px"></div>
  </div>
</div>

<footer class="footer"><div class="footer-brand">LunarPad — Build. Ship. Earn sats.</div><div class="footer-links"><a href="/privacy.html">Privacy</a><a href="/terms.html">Terms</a><a href="https://github.com/satsdisco/lunarpad" target="_blank" rel="noopener">Docs</a><a href="https://github.com/satsdisco/lunarpad/issues" target="_blank" rel="noopener">Changelog</a><a href="https://github.com/satsdisco/lunarpad" target="_blank" rel="noopener">GitHub</a></div></footer>

<script>
const eventId = window.location.pathname.split('/').pop();
let eventData = null;

function esc(s) { const d = document.createElement('div'); d.textContent = String(s ?? ''); return d.innerHTML; }
function timeAgo(ds) { const m = Math.floor((Date.now()-new Date(ds).getTime())/60000); if(m<1)return 'just now'; if(m<60)return m+'m ago'; const h=Math.floor(m/60); if(h<24)return h+'h ago'; return Math.floor(h/24)+'d ago'; }
function initials(name) { return String(name || '?').split(' ').map(w => w[0] || '').join('').slice(0, 2).toUpperCase(); }

function getEventStartDate(ev) {
  if (!ev?.date || !ev?.time) return null;
  const value = new Date(ev.date + ('T' + ev.time));
  return Number.isNaN(value.getTime()) ? null : value;
}

function renderAttendeesSection(rsvpPayload) {
  const attendees = Array.isArray(rsvpPayload?.rsvps) ? rsvpPayload.rsvps : [];
  if (!attendees.length) return '';
  const attendeeHtml = attendees.map((rsvp) => {
    const name = rsvp.profile_name || rsvp.name || 'Anonymous';
    const href = rsvp.profile_user_id ? `/profile/${encodeURIComponent(rsvp.profile_user_id)}` : null;
    const content = `
      <div class="event-attendee-avatar">${rsvp.avatar ? `<img src="${esc(rsvp.avatar)}" alt="${esc(name)}">` : esc(initials(name))}</div>
      <div class="event-attendee-body">
        <div class="event-attendee-name">${esc(name)}</div>
        <div class="event-attendee-meta">Joined ${timeAgo(rsvp.created_at)}</div>
      </div>`;
    return href
      ? `<a class="event-attendee-pill" href="${href}">${content}</a>`
      : `<div class="event-attendee-pill">${content}</div>`;
  }).join('');
  return `
    <div class="event-attendees-card">
      <div class="event-attendees-head">
        <div>
          <div class="event-attendees-title">Attendees</div>
          <div class="event-attendees-copy">See who is already in the room before you RSVP or present.</div>
        </div>
        <div class="event-attendees-count">👥 ${attendees.length} attending</div>
      </div>
      <div class="event-attendees-grid">${attendeeHtml}</div>
    </div>`;
}

function renderResultsSection(results, liveSummary, speakers) {
  const artifact = results || null;
  const winner = artifact?.winner || liveSummary?.winner || null;
  if (!artifact && !winner) return '';
  const scoreboard = artifact?.scoreboard || {
    total_votes: artifact?.total_votes || liveSummary?.scoreboard?.total_votes || 0,
    total_zaps: artifact?.total_zaps || liveSummary?.scoreboard?.total_zaps || 0,
    presenter_count: Array.isArray(speakers) ? speakers.length : 0,
    completed_count: Array.isArray(speakers) ? speakers.filter((sp) => sp.presented_at || sp.status === 'presented' || sp.status === 'winner').length : 0,
    skipped_count: Array.isArray(speakers) ? speakers.filter((sp) => sp.status === 'skipped').length : 0,
  };
  const payoutLabel = liveSummary?.payout_status === 'sent'
    ? 'Payout sent'
    : (liveSummary?.payout_status === 'confirmed' ? 'Payout pending send' : 'Payout pending');
  const rankings = Array.isArray(artifact?.rankings) && artifact.rankings.length
    ? artifact.rankings
    : (Array.isArray(speakers) ? speakers.map((speaker, index) => ({
        rank: index + 1,
        id: speaker.id,
        name: speaker.name,
        user_id: speaker.user_id || null,
        project_title: speaker.project || speaker.project_title || 'Untitled',
        votes: Number(speaker.votes || 0),
        zap_total: Number(speaker.zap_total || 0),
        deck_id: speaker.deck_id || null,
        github_url: speaker.github_url || null,
        demo_url: speaker.demo_url || null,
        status: speaker.status || 'scheduled',
      })) : []);
  const rankingHtml = rankings.length
    ? rankings.map((speaker) => {
        const profileHref = speaker.user_id ? `/profile/${encodeURIComponent(speaker.user_id)}` : '';
        const deckHref = speaker.deck_id ? `/deck/${encodeURIComponent(speaker.deck_id)}` : '';
        return `
          <div class="event-results-ranking-item">
            <div class="event-results-ranking-main">
              <div class="event-results-ranking-rank">#${speaker.rank}</div>
              <div class="event-results-ranking-name">${profileHref ? `<a href="${profileHref}" style="color:inherit;text-decoration:none">${esc(speaker.name)}</a>` : esc(speaker.name)}</div>
              <div class="event-results-ranking-project">${esc(speaker.project_title || 'Untitled')}</div>
              <div class="event-results-ranking-meta">
                ${speaker.status === 'winner' ? '<span class="event-results-meta-pill gold">🏆 Winner</span>' : ''}
                ${speaker.status === 'skipped' ? '<span class="event-results-meta-pill">Skipped</span>' : ''}
                ${(speaker.status === 'presented' || speaker.presented_at) ? '<span class="event-results-meta-pill">Presented</span>' : ''}
              </div>
              <div class="event-results-ranking-links">
                ${deckHref ? `<a class="event-results-link" href="${deckHref}">📽 Deck</a>` : ''}
                ${speaker.demo_url ? `<a class="event-results-link" href="${esc(speaker.demo_url)}" target="_blank" rel="noopener">↗ Demo</a>` : ''}
                ${speaker.github_url ? `<a class="event-results-link" href="${esc(speaker.github_url)}" target="_blank" rel="noopener">⌥ GitHub</a>` : ''}
              </div>
            </div>
            <div class="event-results-ranking-score">
              <strong>${Number(speaker.votes || 0).toLocaleString()} vote${Number(speaker.votes || 0) === 1 ? '' : 's'}</strong>
              <span>⚡ ${Number(speaker.zap_total || 0).toLocaleString()} sats</span>
            </div>
          </div>`;
      }).join('')
    : '<div class="event-results-summary-markdown">No ranked presenters captured yet.</div>';
  const supportHtml = Array.isArray(artifact?.recent_support) && artifact.recent_support.length
    ? artifact.recent_support.map((item) => `
        <div class="event-results-support-item">
          <div class="event-results-support-main">
            <div class="event-results-support-name">${esc(item.user_name || 'Anonymous')} → ${esc(item.speaker_name || 'Presenter')}</div>

          </div>
          <div class="event-results-meta-pill gold">⚡ ${Number(item.amount_sats || 0).toLocaleString()} sats</div>
        </div>`).join('')
    : '<div class="event-results-summary-markdown">No support activity was captured for this session.</div>';
  return `
    <div class="event-results-card" id="results">
      <div class="event-results-kicker">Event Results</div>
      <div class="event-results-title">${winner ? `Winner confirmed — ${esc(winner.name)}` : 'Event recap available'}</div>
      <div class="event-results-copy">${winner ? `${esc(winner.project_title || winner.project || 'Untitled')} took the room on votes. The support layer stayed visible, but the finish stayed vote-first.` : 'This event now has a durable recap artifact with rankings, totals, and support activity.'}</div>
      <div class="event-results-status-row">
        ${winner ? '<span class="event-results-status-pill gold">🏆 Winner confirmed</span>' : ''}
        <span class="event-results-status-pill">${esc(payoutLabel)}</span>
        ${artifact?.generated_at ? `<span class="event-results-status-pill">Updated ${timeAgo(artifact.generated_at)}</span>` : ''}
      </div>
      <div class="event-results-shell" style="margin-top:16px">
        <div class="event-results-stats">
          <div class="event-results-stat"><div class="event-results-stat-label">Total votes</div><div class="event-results-stat-value">${Number(scoreboard.total_votes || 0).toLocaleString()}</div></div>
          <div class="event-results-stat"><div class="event-results-stat-label">Total sats</div><div class="event-results-stat-value">⚡ ${Number(scoreboard.total_zaps || 0).toLocaleString()}</div></div>
          <div class="event-results-stat"><div class="event-results-stat-label">Presenters</div><div class="event-results-stat-value">${Number(scoreboard.presenter_count || rankings.length || 0).toLocaleString()}</div></div>
          <div class="event-results-stat"><div class="event-results-stat-label">Completed</div><div class="event-results-stat-value">${Number(scoreboard.completed_count || 0).toLocaleString()}</div></div>
        </div>
        <div class="event-results-grid">
          <div class="event-results-panel">
            <div class="event-results-panel-title">Rankings</div>
            <div class="event-results-ranking-list">${rankingHtml}</div>
          </div>
          <div class="event-results-panel">
            <div class="event-results-panel-title">Session recap</div>
            <div class="event-results-summary-markdown">${esc(artifact?.summary_markdown || 'No stored recap summary yet.')}</div>
            <div class="event-results-panel-title" style="margin-top:18px">Recent support</div>
            <div class="event-results-support-list">${supportHtml}</div>
          </div>
        </div>
      </div>
    </div>`;
}

function speakerInitials(name) {
  return (name || '?').split(' ').map(w => w[0] || '').join('').slice(0, 2).toUpperCase();
}

function speakerAvatarColor(name) {
  let h = 0;
  for (let i = 0; i < (name || '').length; i++) h = ((h << 5) - h + name.charCodeAt(i)) | 0;
  const hue = Math.abs(h) % 360;
  return `hsl(${hue},55%,38%)`;
}

function renderSpeaker(sp, rank) {
  const medals = ['🥇','🥈','🥉'];
  const rankLabel = rank <= 3 ? medals[rank-1] : '#' + rank;
  const initials = speakerInitials(sp.name);
  const avatarBg = speakerAvatarColor(sp.name);
  const projectTitle = sp.project || sp.project_title || '';
  const profileLink = sp.user_id ? `/profile/${esc(sp.user_id)}` : null;
  const isWinner = sp.status === 'winner';
  const isPresented = !!sp.presented_at || sp.status === 'presented' || isWinner;
  const isSkipped = sp.status === 'skipped';
  const speakerStatusHtml = isWinner
    ? '<span class="speaker-status-pill winner">Winner 🏆</span>'
    : (isPresented
      ? '<span class="speaker-status-pill presented">Presented ✓</span>'
      : (isSkipped ? '<span class="speaker-status-pill">Skipped</span>' : '<span class="speaker-status-pill">Scheduled</span>'));
  const nameEl = profileLink
    ? `<a href="${profileLink}" class="spk-card-name" style="color:inherit;text-decoration:none" onclick="event.stopPropagation()">${esc(sp.name)}</a>`
    : `<div class="spk-card-name">${esc(sp.name)}</div>`;
  return `
    <div class="speaker-card" ${sp.deck_id ? `onclick="window.location='/deck/${sp.deck_id}'" style="cursor:pointer"` : ''}>
      <div class="spk-avatar" style="background:${avatarBg}">${initials}</div>
      <div class="spk-card-body">
        ${nameEl}
        <div class="spk-card-project">${sp.deck_id ? `<a href="/deck/${esc(sp.deck_id)}" class="spk-card-project" style="color:var(--accent);text-decoration:none" onclick="event.stopPropagation()">${esc(projectTitle)} →</a>` : esc(projectTitle)}</div>
        ${sp.description ? `<div class="spk-card-desc">${esc(sp.description)}</div>` : ''}
        <div class="spk-card-meta">
          <span class="duration-pill">${sp.duration} min</span>
          ${speakerStatusHtml}
          ${sp.github_url ? `<a href="${esc(sp.github_url)}" target="_blank" class="spk-link" onclick="event.stopPropagation()">⌥ GitHub</a>` : ''}
          ${sp.demo_url ? `<a href="${esc(sp.demo_url)}" target="_blank" class="spk-link" onclick="event.stopPropagation()">↗ Demo</a>` : ''}
          ${sp.deck_id ? `<a href="/deck/${esc(sp.deck_id)}" class="spk-link" onclick="event.stopPropagation()">📽 Deck</a>` : ''}
        </div>
      </div>
      <div class="spk-card-right">
        <div style="font-family:var(--font-mono);font-size:0.6rem;color:var(--muted2);text-align:center">${rankLabel}</div>
        <button class="vote-btn" onclick="event.stopPropagation();voteSpeaker('${esc(sp.id)}',this)">
          <span class="arrow">▲</span><span class="vc">${sp.votes||0}</span>
        </button>
        ${_currentUser && _currentUser.is_admin && !isPresented ? `<button class="btn btn-sm" style="font-size:0.6rem;padding:3px 8px;border-radius:12px;margin-top:6px" onclick="event.stopPropagation();markSpeakerPresented('${esc(sp.id)}')">Mark Presented</button>` : ''}
        ${_currentUser && _currentUser.is_admin && isPresented ? `<button class="btn btn-ghost" style="padding:6px 10px;font-size:0.72rem" onclick="event.stopPropagation();undoSpeakerPresented('${esc(sp.id)}')">Undo Presented</button>` : ''}
        ${_currentUser && _currentUser.is_admin && isSkipped ? `<button class="btn btn-ghost" style="padding:6px 10px;font-size:0.72rem" onclick="event.stopPropagation();undoSpeakerSkipped('${esc(sp.id)}')">Undo Skip</button>` : ''}
        ${sp.user_id && _currentUser && (sp.user_id === _currentUser.id || _currentUser.is_admin) && !isPresented ? `<button class="btn btn-sm" style="font-size:0.6rem;padding:3px 8px;border-radius:12px;color:var(--danger);border-color:var(--danger);margin-top:6px" onclick="event.stopPropagation();withdrawSpeaker('${esc(sp.id)}')">Withdraw</button>` : ''}
      </div>
    </div>`;
}

function renderBounty(b) {
  const sc = {open:'open',claimed:'claimed',completed:'completed'}[b.status]||'open';
  const statusLabel = {open:'Open',claimed:'Claimed',completed:'Completed'}[b.status]||b.status;
  return `
    <a class="bounty-card bounty-card-link" href="/bounty/${esc(b.id)}">
      <div class="bounty-header">
        <div class="bounty-title">${esc(b.title)}</div>
        <span class="bounty-status ${sc}">${statusLabel}</span>
      </div>
      <div class="bounty-sats">⚡ ${(b.sats_amount||0).toLocaleString()} sats</div>
      ${b.description ? `<div class="bounty-desc">${esc(b.description)}</div>` : ''}
      <div class="bounty-card-cta">View Bounty <span aria-hidden="true">→</span></div>
    </a>`;
}

function switchTab(name, evt) {
  document.querySelectorAll('.event-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.event-tab-view').forEach(v => v.classList.remove('active'));
  const trigger = evt?.currentTarget || evt?.target;
  if (trigger) trigger.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

// Countdown
function startCountdown() {
  if (!eventData?.date) return;
  function tick() {
    const eventDate = getEventStartDate(eventData);
    const container = document.querySelector('.event-hero-countdown');
    if (!container) return;
    if (!eventDate) {
      container.innerHTML = '<div class="event-status-ended">Start time TBD</div>';
      return;
    }
    const diff = eventDate.getTime() - Date.now();

    if (diff > 0) {
      const d=Math.floor(diff/864e5), h=Math.floor(diff%864e5/36e5), m=Math.floor(diff%36e5/6e4), s=Math.floor(diff%6e4/1e3);
      // Restore chips if we previously showed LIVE/ENDED
      if (!document.getElementById('cd-d')) {
        container.innerHTML = `
          <div class="cd-unit"><div class="cd-val" id="cd-d">--</div><div class="cd-label">Days</div></div>
          <div class="cd-unit"><div class="cd-val" id="cd-h">--</div><div class="cd-label">Hrs</div></div>
          <div class="cd-unit"><div class="cd-val" id="cd-m">--</div><div class="cd-label">Min</div></div>
          <div class="cd-unit"><div class="cd-val" id="cd-s">--</div><div class="cd-label">Sec</div></div>`;
      }
      const el=(id,v)=>{ const e=document.getElementById('cd-'+id); if(e)e.textContent=String(v).padStart(2,'0'); };
      el('d',d);el('h',h);el('m',m);el('s',s);
    } else if (diff > -86400000) {
      container.innerHTML = '<div class="event-status-live"><span class="live-dot"></span> LIVE NOW</div>';
    } else {
      container.innerHTML = '<div class="event-status-ended">Event Ended</div>';
    }
  }
  tick(); setInterval(tick, 1000);
}

// RSVP
async function doRsvp() {
  try {
    const res = await fetch('/api/events/'+eventId+'/rsvp', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({})});
    if (res.ok || res.status === 409) loadEvent();
    else { const e = await res.json(); alert(e.error || 'RSVP failed'); }
  } catch { alert('RSVP failed'); }
}

async function cancelRsvp() {
  try {
    const res = await fetch('/api/events/'+eventId+'/rsvp', {method:'DELETE'});
    if (res.ok) loadEvent();
    else { const e = await res.json(); alert(e.error || 'Failed'); }
  } catch { alert('Failed to cancel RSVP'); }
}

// Speaker signup
async function submitSpeaker() {
  const name=document.getElementById('spkName').value.trim(), proj=document.getElementById('spkProject').value.trim();
  if(!name||!proj) return alert('Name and project required');
  const r = await fetch('/api/speakers',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
    name, project_title:proj, description:document.getElementById('spkDesc').value.trim(),
    duration:+document.getElementById('spkDuration').value, event_id:eventId,
    github_url:document.getElementById('spkGithub').value.trim()||null,
    demo_url:document.getElementById('spkDemo').value.trim()||null,
    deck_id:document.getElementById('spkDeck').value||null
  })});
  if(r.ok){ document.getElementById('signupSection').style.display='none'; loadEvent(); }
  else { const e=await r.json().catch(()=>({})); alert(e.error||'Failed'); }
}

// Vote
async function voteSpeaker(id, btn) {
  const r = await fetch('/api/vote',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'speaker',id})});
  const d = await r.json();
  btn.querySelector('.vc').textContent = d.votes;
  btn.classList.toggle('voted', d.voted);
}

async function withdrawSpeaker(id) {
  if (!confirm('Withdraw your speaker registration?')) return;
  try {
    const res = await fetch('/api/speakers/' + id, { method: 'DELETE' });
    if (res.ok) { loadEvent(); }
    else { const e = await res.json(); alert(e.error || 'Failed'); }
  } catch { alert('Failed to withdraw'); }
}

async function markSpeakerPresented(id) {
  if (!confirm('Mark this speaker as having actually presented?')) return;
  try {
    const res = await fetch('/api/speakers/' + id + '/presented', { method: 'POST' });
    if (res.ok) { loadEvent(); }
    else { const e = await res.json(); alert(e.error || 'Failed'); }
  } catch { alert('Failed to mark presenter'); }
}

async function undoSpeakerPresented(id) {
  if (!confirm('Undo presented status for this speaker?')) return;
  try {
    const res = await fetch('/api/speakers/' + id + '/presented', { method: 'DELETE' });
    if (res.ok) { loadEvent(); }
    else { const e = await res.json(); alert(e.error || 'Failed'); }
  } catch { alert('Failed to undo presented'); }
}

async function undoSpeakerSkipped(id) {
  if (!confirm('Undo skipped status for this speaker?')) return;
  try {
    const res = await fetch('/api/speakers/' + id + '/skip', { method: 'DELETE' });
    if (res.ok) { loadEvent(); }
    else { const e = await res.json(); alert(e.error || 'Failed'); }
  } catch { alert('Failed to undo skip'); }
}

// Load decks for dropdown
async function loadDecksDropdown() {
  try {
    const r = await fetch('/api/decks?limit=48');
    const data = await r.json();
    const sel = document.getElementById('spkDeck');
    (data.decks||[]).forEach(d => { const o=document.createElement('option'); o.value=d.id; o.textContent=d.title; sel.appendChild(o); });
  } catch {}
}

loadEvent();
