<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event — LunarPad</title>
<link rel="stylesheet" href="/css/style.css">
<style>
.event-hero {
  background: var(--glass); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 32px;
  margin-bottom: 32px; backdrop-filter: blur(8px);
  position: relative; overflow: hidden;
}
.event-hero::before {
  content: ''; position: absolute; top: -50%; right: -20%;
  width: 300px; height: 300px; border-radius: 50%;
  background: radial-gradient(circle, rgba(57,217,138,.06) 0%, transparent 70%);
  pointer-events: none;
}
.event-hero-type {
  font-family: var(--font-mono); font-size: 0.65rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .1em; color: var(--accent);
  margin-bottom: 12px;
}
.event-hero-name { font-size: 1.6rem; font-weight: 800; color: var(--text); margin-bottom: 8px; }
.event-hero-meta { font-size: 0.88rem; color: var(--muted); margin-bottom: 20px; display: flex; gap: 16px; flex-wrap: wrap; }
.event-hero-row { display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 20px; }
.event-hero-actions { display: flex; gap: 8px; }
.event-hero-countdown { display: flex; gap: 8px; }
.event-hero-countdown .cd-unit {
  text-align: center; min-width: 52px;
  background: rgba(0,0,0,.3); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 8px;
}
.cd-val { font-family: var(--font-mono); font-size: 1.4rem; font-weight: 800; color: var(--accent); line-height: 1; }
.cd-label { font-family: var(--font-mono); font-size: 0.55rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-top: 4px; }

.event-prize {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--font-mono); font-size: 0.85rem; font-weight: 700;
  color: var(--btc-gold); padding: 6px 14px;
  background: rgba(242,177,52,.06); border: 1px solid rgba(242,177,52,.15);
  border-radius: 100px; margin-bottom: 16px;
}

.event-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
.event-tab {
  padding: 10px 20px; font-size: 0.82rem; font-weight: 500;
  color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
  transition: all .15s; background: none; border-top: none; border-left: none; border-right: none;
  font-family: var(--font);
}
.event-tab:hover { color: var(--text); }
.event-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.event-tab-view { display: none; }
.event-tab-view.active { display: block; }

.lineup-empty { font-size: 0.85rem; color: var(--muted2); padding: 24px; text-align: center; background: var(--glass); border: 1px solid var(--border); border-radius: var(--radius); }

.rsvp-card {
  background: var(--glass); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 24px; max-width: 400px;
}
.rsvp-card h3 { font-size: 0.9rem; font-weight: 700; color: var(--text); margin-bottom: 16px; }
.rsvp-success { font-size: 0.85rem; color: var(--accent); padding: 12px; display: none; }

/* About section */
.event-about-section {
  background: var(--glass); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 24px 28px; margin-bottom: 24px;
}
.event-about-heading {
  font-family: var(--font-mono); font-size: 0.65rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .12em; color: var(--accent); margin-bottom: 12px;
}
.event-about-body {
  font-size: 0.9rem; color: var(--text2); line-height: 1.75; white-space: pre-wrap;
}

/* Speaker cards */
.speaker-card {
  background: var(--glass); border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: 18px 20px; margin-bottom: 12px;
  display: flex; gap: 16px; align-items: flex-start;
  transition: border-color .15s;
}
.speaker-card:hover { border-color: rgba(124,92,252,.3); }
.spk-avatar {
  width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 0.85rem; color: #fff;
  background: linear-gradient(135deg, #7c5cfc, #3ccbda);
}
.spk-card-body { flex: 1; min-width: 0; }
.spk-card-name { font-size: 0.92rem; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.spk-card-project { font-size: 0.8rem; color: var(--accent); font-weight: 600; margin-bottom: 4px; }
.spk-card-desc { font-size: 0.8rem; color: var(--muted); line-height: 1.5; margin-bottom: 8px; }
.spk-card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.duration-pill {
  font-family: var(--font-mono); font-size: 0.62rem; font-weight: 700; padding: 3px 8px;
  border: 1px solid var(--border); border-radius: 100px; color: var(--muted2);
}
.spk-card-right { display: flex; flex-direction: column; align-items: center; gap: 8px; flex-shrink: 0; }

/* Empty CTA state */
.empty-cta {
  text-align: center; padding: 40px 24px;
  background: var(--glass); border: 1px dashed var(--border); border-radius: var(--radius-lg);
}
.empty-cta-icon { font-size: 2rem; margin-bottom: 12px; }
.empty-cta h3 { font-size: 0.95rem; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.empty-cta p { font-size: 0.82rem; color: var(--muted2); margin-bottom: 16px; }

@media (max-width: 768px) {
  .event-hero { padding: 20px; }
  .event-hero-name { font-size: 1.2rem; }
  .event-hero-row { flex-direction: column; align-items: flex-start; }
  .event-tabs { overflow-x: auto; }
  .event-tab { white-space: nowrap; padding: 10px 14px; }
}
</style>
</head>
<body>

<header class="header">
  <a href="/" class="logo">Lunar <span class="logo-slash"> \ </span><span class="logo-accent">Pad</span></a>
  <nav class="nav-tabs">
    <a href="/" class="nav-tab active">Build in Public</a>
    <a href="/decks" class="nav-tab">Decks</a>
    <a href="/foyer" class="nav-tab">The Foyer</a>
  </nav>
  <div class="header-actions" id="authArea">
    
    <div id="userArea"></div>
  </div>
</header>

<div class="container" style="padding-top:24px;padding-bottom:64px;">
  <a href="javascript:history.back()" class="viewer-back">Back</a>
  <div id="eventContent">
    <div class="skeleton-card" style="height:220px;border-radius:var(--radius-lg);margin-bottom:24px"></div>
    <div class="skeleton-card" style="height:80px;margin-bottom:12px"></div>
    <div class="skeleton-card" style="height:48px;margin-bottom:24px"></div>
    <div class="skeleton-card" style="height:110px;margin-bottom:12px"></div>
    <div class="skeleton-card" style="height:110px"></div>
  </div>
</div>

<footer class="footer">LunarPad — Build. Ship. Earn sats.</footer>

<script>
const eventId = window.location.pathname.split('/').pop();
let eventData = null;

function esc(s) { const d = document.createElement('div'); d.textContent = String(s ?? ''); return d.innerHTML; }
function timeAgo(ds) { const m = Math.floor((Date.now()-new Date(ds).getTime())/60000); if(m<1)return 'just now'; if(m<60)return m+'m ago'; const h=Math.floor(m/60); if(h<24)return h+'h ago'; return Math.floor(h/24)+'d ago'; }

async function loadEvent() {
  try {
    const [evRes, bRes, rsvpRes] = await Promise.all([
      fetch('/api/events/' + eventId).then(r => r.json()),
      fetch('/api/events/' + eventId + '/bounties').then(r => r.json()).catch(() => []),
      fetch('/api/events/' + eventId + '/rsvps').then(r => r.json()).catch(() => null)
    ]);
    eventData = evRes;
    if (evRes.error || !evRes.id) {
      document.getElementById('eventContent').innerHTML = `
        <div style="text-align:center;padding:60px 20px">
          <div style="font-size:2.5rem;margin-bottom:16px">🌙</div>
          <h2 style="font-family:var(--font-mono);font-size:1.1rem;color:var(--text);margin-bottom:8px">Event not found</h2>
          <p style="color:var(--muted);font-size:0.85rem;margin-bottom:20px">This event may have been removed or the link is incorrect.</p>
          <a href="/" class="btn btn-primary" style="padding:10px 24px">Go to Build in Public →</a>
        </div>`;
      return;
    }
    const ev = eventData;
    const bounties = bRes;
    const rsvpCount = rsvpRes ? (rsvpRes.count || (Array.isArray(rsvpRes) ? rsvpRes.length : 0)) : 0;
    const userRsvp = rsvpRes?.user_rsvp || false;
    const prizePool = bounties.reduce((s, b) => s + (b.sats_amount || 0), 0);

    document.title = ev.name + ' — LunarPad';

    const dateStr = ev.date ? new Date(ev.date).toLocaleDateString('en', { weekday:'long', month:'long', day:'numeric', year:'numeric' }) : 'TBD';
    const speakers = (ev.speakers || []).sort((a,b) => (b.votes||0) - (a.votes||0));

    const attendingBadge = rsvpCount > 0 ? `<span>👥 ${rsvpCount} attending</span>` : '';

    // Determine if event is in the past (ended)
    const eventDate = ev.date ? new Date(ev.date + (ev.time ? 'T' + ev.time : 'T23:59:59')) : null;
    const isEnded = eventDate ? (Date.now() - eventDate.getTime() > 86400000) : false;

    // Build action buttons outside template to avoid nested backtick issues
    const btnStyle = 'style="font-size:0.82rem;padding:7px 16px;border-radius:20px"';
    let heroActionsHtml = '';
    if (isEnded) {
      heroActionsHtml = '<button class="btn" id="shareBtn" ' + btnStyle + '>Share</button>';
    } else {
      heroActionsHtml = userRsvp
        ? '<button class="btn btn-primary" id="rsvpToggle" ' + btnStyle + ' onclick="cancelRsvp()">✓ Going</button>'
        : '<button class="btn" id="rsvpToggle" ' + btnStyle + ' onclick="doRsvp()">👥 RSVP</button>';
      heroActionsHtml += '<button class="btn btn-primary" id="presentToggle" ' + btnStyle + '>🎤 Present</button>';
      heroActionsHtml += '<button class="btn" id="shareBtn" ' + btnStyle + '>Share</button>';
      heroActionsHtml += '<a class="btn" id="addToCalBtn" ' + btnStyle + ' style="display:none;font-size:0.82rem;padding:7px 16px;border-radius:20px">📅 Calendar</a>';
    }
    heroActionsHtml += '<a class="btn" id="goLiveBtn" style="display:none;font-size:0.82rem;padding:7px 16px;border-radius:20px" href="#" target="_blank">🔴 Go Live</a>';

    const endedBadge = isEnded ? ' <span style="color:var(--muted);font-weight:400">(ended)</span>' : '';
    const locationSpan = ev.location ? '<span>📍 ' + esc(ev.location) + '</span>' : '';
    const prizeDiv = prizePool ? '<div class="event-prize">⚡ ' + prizePool.toLocaleString() + ' sats prize pool</div>' : '';

    const evDate = ev.date ? new Date(ev.date) : null;
    const calDay = evDate ? evDate.getDate() : '?';
    const calMonth = evDate ? evDate.toLocaleDateString('en', { month: 'short' }).toUpperCase() : '';
    const calWeekday = evDate ? evDate.toLocaleDateString('en', { weekday: 'short' }) : '';
    const evTypeRaw = ev.event_type || ev.type || 'Event';
    const heroTypeColors = { 'demo-day': '#7c5cfc', 'hackathon': '#39d98a', 'bounty': '#d4a843', 'workshop': '#3CCBDA', 'meetup': '#f472b6' };
    const heroColor = heroTypeColors[evTypeRaw] || '#7c5cfc';

    document.getElementById('eventContent').innerHTML = `
      <div class="event-hero" style="display:flex;align-items:flex-start;gap:24px">
        <div style="flex:1;min-width:0">
          <div class="event-hero-type">${esc(evTypeRaw)}${endedBadge}</div>
          <div class="event-hero-name">${esc(ev.name)}</div>
          <div class="event-hero-meta">
            ${locationSpan}
            ${attendingBadge}
          </div>
          ${prizeDiv}
          <div style="font-family:var(--font-mono);font-size:0.6rem;color:var(--muted2);text-transform:uppercase;letter-spacing:.1em;margin:16px 0 4px" id="countdownLabel">Event starts in</div>
          <div class="event-hero-countdown">
            <div class="cd-unit"><div class="cd-val" id="cd-d">--</div><div class="cd-label">Days</div></div>
            <div class="cd-unit"><div class="cd-val" id="cd-h">--</div><div class="cd-label">Hrs</div></div>
            <div class="cd-unit"><div class="cd-val" id="cd-m">--</div><div class="cd-label">Min</div></div>
            <div class="cd-unit"><div class="cd-val" id="cd-s">--</div><div class="cd-label">Sec</div></div>
          </div>
          <div class="event-hero-actions" style="margin-top:16px;display:flex;flex-wrap:wrap;gap:8px">
            ${heroActionsHtml}
          </div>
        </div>
        <div style="flex-shrink:0;width:130px;height:130px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--glass2);border:2px solid ${heroColor};border-radius:16px;text-align:center;box-shadow:0 0 25px ${heroColor}33">
          <div style="font-family:var(--font-mono);font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.15em;color:${heroColor}">${calMonth}</div>
          <div style="font-family:var(--font-mono);font-size:3.5rem;font-weight:800;color:#fff;line-height:1;text-shadow:0 0 20px ${heroColor}55">${calDay}</div>
          <div style="font-family:var(--font-mono);font-size:0.7rem;font-weight:500;color:var(--muted);margin-top:4px">${calWeekday}</div>
        </div>
      </div>

      <!-- About This Event -->
      ${ev.description ? `
      <div class="event-about-section">
        <div class="event-about-heading">About This Event</div>
        <div class="event-about-body">${esc(ev.description)}</div>
      </div>` : ''}

      <!-- RSVP handled via toggle button in hero actions -->

      <!-- Speaker Signup (hidden by default) -->
      <div id="signupSection" style="display:none;margin-bottom:24px">
        <div class="rsvp-card" style="max-width:520px">
          <h3>Sign Up to Present</h3>
          <div class="form-row"><div class="form-group"><label>Name</label><input type="text" id="spkName" placeholder="Your name"></div><div class="form-group"><label>Project</label><input type="text" id="spkProject" placeholder="Project title"></div></div>
          <div class="form-group"><label>Description</label><textarea id="spkDesc" placeholder="What will you demo?"></textarea></div>
          <div class="form-row"><div class="form-group"><label>GitHub (optional)</label><input type="url" id="spkGithub" placeholder="https://github.com/..."></div><div class="form-group"><label>Demo (optional)</label><input type="url" id="spkDemo" placeholder="https://..."></div></div>
          <div class="form-row"><div class="form-group"><label>Duration</label><select id="spkDuration"><option value="5">5 min</option><option value="10" selected>10 min</option><option value="15">15 min</option></select></div><div class="form-group"><label>Attach Deck</label><select id="spkDeck"><option value="">None</option></select></div></div>
          <div style="display:flex;gap:8px;margin-top:12px">
            <button class="btn btn-primary btn-sm" onclick="submitSpeaker()">Submit</button>
            <button class="btn btn-sm" onclick="document.getElementById('signupSection').style.display='none'">Cancel</button>
          </div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="event-tabs">
        <button class="event-tab active" onclick="switchTab('lineup')">Lineup (${speakers.length} participants)</button>
        <button class="event-tab" onclick="switchTab('bounties')">Bounties (${bounties.length})</button>
      </div>

      <div class="event-tab-view active" id="tab-lineup">
        <div id="speakerRows">
          ${speakers.length
            ? speakers.map((sp, i) => renderSpeaker(sp, i+1)).join('')
            : (isEnded
              ? `<div class="empty-cta">
                  <div class="empty-cta-icon">🎤</div>
                  <h3>No presentations were recorded for this event.</h3>
                 </div>`
              : `<div class="empty-cta">
                  <div class="empty-cta-icon">🎤</div>
                  <h3>No participants yet — be the first to present!</h3>
                  <p>Share your project, demo something you built, or talk about what you're learning.</p>
                  <button class="btn btn-primary" onclick="document.getElementById('signupSection').style.display='block';document.getElementById('signupSection').scrollIntoView({behavior:'smooth'})">Sign Up to Present</button>
                 </div>`)}
        </div>
      </div>

      <div class="event-tab-view" id="tab-bounties">
        ${bounties.length
          ? '<div class="bounty-grid">' + bounties.map(b => renderBounty(b)).join('') + '</div>'
          : `<div class="empty-cta">
              <div class="empty-cta-icon">⚡</div>
              <h3>No bounties yet</h3>
              <p>Bounties let organizers reward builders for solving specific challenges. Check back soon.</p>
             </div>`}
      </div>
    `;

    startCountdown();
    loadDecksDropdown();

    // Wire up action buttons (avoiding inline onclick with escaping issues)
    const shareBtn = document.getElementById('shareBtn');
    if (shareBtn) shareBtn.onclick = function() {
      if (navigator.share) {
        navigator.share({ title: ev.name + ' — LunarPad', url: window.location.href }).catch(() => {});
      } else {
        navigator.clipboard.writeText(window.location.href).then(() => {
          shareBtn.textContent = '\u2713 Copied!'; setTimeout(() => shareBtn.textContent = 'Share', 1800);
          // Toast
          const toast = document.createElement('div');
          toast.textContent = '\ud83d\udcce Link copied to clipboard!';
          toast.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:10px 20px;border-radius:100px;font-size:0.82rem;font-weight:600;z-index:9999;opacity:0;transition:opacity .2s';
          document.body.appendChild(toast);
          requestAnimationFrame(() => toast.style.opacity = '1');
          setTimeout(() => { toast.style.opacity = '0'; toast.addEventListener('transitionend', () => toast.remove()); }, 2000);
        }).catch(() => {});
      }
    };
    // RSVP toggle handled via inline onclick (doRsvp/cancelRsvp)
    const presentToggle = document.getElementById('presentToggle');
    if (presentToggle) presentToggle.onclick = () => {
      const s = document.getElementById('signupSection');
      if (s) s.style.display = s.style.display === 'none' ? 'block' : 'none';
    };

    // Pre-fill RSVP + Speaker forms from session
    try {
      const meRes2 = await fetch('/api/me').then(r => r.json());
      if (meRes2.user) {
        const rn = document.getElementById('rsvpName');
        const re = document.getElementById('rsvpEmail');
        if (rn && !rn.value) rn.value = meRes2.user.name || '';
        if (re && !re.value) re.value = meRes2.user.email || '';
        const sn = document.getElementById('spkName');
        if (sn && !sn.value) sn.value = meRes2.user.name || '';
      }
    } catch {}

    // Add to Calendar (Google Calendar link)
    if (ev.date && !isEnded) {
      const calBtn = document.getElementById('addToCalBtn');
      if (calBtn) {
        const start = ev.date.replace(/-/g, '') + (ev.time ? 'T' + ev.time.replace(/:/g, '') + '00' : '');
        const end = ev.date.replace(/-/g, '') + (ev.time ? 'T' + String(parseInt(ev.time) + 2).padStart(2,'0') + ev.time.slice(2).replace(/:/g, '') + '00' : '');
        const gcalUrl = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(ev.name)}&dates=${start}/${end}&details=${encodeURIComponent(ev.description || '')}&location=${encodeURIComponent(ev.location || '')}`;
        calBtn.href = gcalUrl;
        calBtn.target = '_blank';
        calBtn.style.display = '';
      }
    }

    // BUG-002/003: Hide inappropriate CTAs for ended events
    if (isEnded) {
      const rsvp = document.getElementById('rsvpSection');
      const signup = document.getElementById('signupSection');
      if (rsvp) rsvp.remove();
      if (signup) signup.remove();
    }
  } catch(e) {
    document.getElementById('eventContent').innerHTML = '<div class="error-state"><span>⚠️</span><p>Failed to load event.</p><button onclick="loadEvent()">Retry</button></div>';
  }
}

function speakerInitials(name) {
  return (name || '?').split(' ').map(w => w[0] || '').join('').slice(0, 2).toUpperCase();
}

function speakerAvatarColor(name) {
  let h = 0;
  for (let i = 0; i < (name || '').length; i++) h = ((h << 5) - h + name.charCodeAt(i)) | 0;
  const hue = Math.abs(h) % 360;
  return `hsl(${hue},55%,38%)`;
}

function renderSpeaker(sp, rank) {
  const medals = ['🥇','🥈','🥉'];
  const rankLabel = rank <= 3 ? medals[rank-1] : '#' + rank;
  const initials = speakerInitials(sp.name);
  const avatarBg = speakerAvatarColor(sp.name);
  const projectTitle = sp.project || sp.project_title || '';
  const profileLink = sp.user_id ? `/profile/${esc(sp.user_id)}` : null;
  const nameEl = profileLink
    ? `<a href="${profileLink}" class="spk-card-name" style="color:inherit;text-decoration:none" onclick="event.stopPropagation()">${esc(sp.name)}</a>`
    : `<div class="spk-card-name">${esc(sp.name)}</div>`;
  return `
    <div class="speaker-card" ${sp.deck_id ? `onclick="window.location='/deck/${sp.deck_id}'" style="cursor:pointer"` : ''}>
      <div class="spk-avatar" style="background:${avatarBg}">${initials}</div>
      <div class="spk-card-body">
        ${nameEl}
        <div class="spk-card-project">${sp.deck_id ? `<a href="/deck/${esc(sp.deck_id)}" class="spk-card-project" style="color:var(--accent);text-decoration:none" onclick="event.stopPropagation()">${esc(projectTitle)} →</a>` : esc(projectTitle)}</div>
        ${sp.description ? `<div class="spk-card-desc">${esc(sp.description)}</div>` : ''}
        <div class="spk-card-meta">
          <span class="duration-pill">${sp.duration} min</span>
          ${sp.github_url ? `<a href="${esc(sp.github_url)}" target="_blank" class="spk-link" onclick="event.stopPropagation()">⌥ GitHub</a>` : ''}
          ${sp.demo_url ? `<a href="${esc(sp.demo_url)}" target="_blank" class="spk-link" onclick="event.stopPropagation()">↗ Demo</a>` : ''}
          ${sp.deck_id ? `<a href="/deck/${esc(sp.deck_id)}" class="spk-link" onclick="event.stopPropagation()">📽 Deck</a>` : ''}
        </div>
      </div>
      <div class="spk-card-right">
        <div style="font-family:var(--font-mono);font-size:0.6rem;color:var(--muted2);text-align:center">${rankLabel}</div>
        <button class="vote-btn" onclick="event.stopPropagation();voteSpeaker('${esc(sp.id)}',this)">
          <span class="arrow">▲</span><span class="vc">${sp.votes||0}</span>
        </button>
        ${sp.user_id && _currentUser && (sp.user_id === _currentUser.id || _currentUser.is_admin) ? `<button class="btn btn-sm" style="font-size:0.6rem;padding:3px 8px;border-radius:12px;color:var(--danger);border-color:var(--danger);margin-top:6px" onclick="event.stopPropagation();withdrawSpeaker('${esc(sp.id)}')">Withdraw</button>` : ''}
      </div>
    </div>`;
}

function renderBounty(b) {
  const sc = {open:'open',claimed:'claimed',completed:'completed'}[b.status]||'open';
  const statusLabel = {open:'Open',claimed:'Claimed',completed:'Completed'}[b.status]||b.status;
  return `
    <div class="bounty-card" onclick="window.location='/bounty/${esc(b.id)}'" style="cursor:pointer">
      <div class="bounty-header">
        <div class="bounty-title">${esc(b.title)}</div>
        <span class="bounty-status ${sc}">${statusLabel}</span>
      </div>
      <div class="bounty-sats">⚡ ${(b.sats_amount||0).toLocaleString()} sats</div>
      ${b.description ? `<div class="bounty-desc">${esc(b.description)}</div>` : ''}
    </div>`;
}

function switchTab(name) {
  document.querySelectorAll('.event-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.event-tab-view').forEach(v => v.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

// Countdown
function startCountdown() {
  if (!eventData?.date) return;
  function tick() {
    const eventDate = new Date(eventData.date + (eventData.time ? 'T' + eventData.time : 'T00:00'));
    const diff = eventDate.getTime() - Date.now();
    const container = document.querySelector('.event-hero-countdown');
    if (!container) return;

    if (diff > 0) {
      const d=Math.floor(diff/864e5), h=Math.floor(diff%864e5/36e5), m=Math.floor(diff%36e5/6e4), s=Math.floor(diff%6e4/1e3);
      // Restore chips if we previously showed LIVE/ENDED
      if (!document.getElementById('cd-d')) {
        container.innerHTML = `
          <div class="cd-unit"><div class="cd-val" id="cd-d">--</div><div class="cd-label">Days</div></div>
          <div class="cd-unit"><div class="cd-val" id="cd-h">--</div><div class="cd-label">Hrs</div></div>
          <div class="cd-unit"><div class="cd-val" id="cd-m">--</div><div class="cd-label">Min</div></div>
          <div class="cd-unit"><div class="cd-val" id="cd-s">--</div><div class="cd-label">Sec</div></div>`;
      }
      const el=(id,v)=>{ const e=document.getElementById('cd-'+id); if(e)e.textContent=String(v).padStart(2,'0'); };
      el('d',d);el('h',h);el('m',m);el('s',s);
    } else if (diff > -86400000) {
      container.innerHTML = '<div class="event-status-live"><span class="live-dot"></span> LIVE NOW</div>';
    } else {
      container.innerHTML = '<div class="event-status-ended">Event Ended</div>';
    }
  }
  tick(); setInterval(tick, 1000);
}

// RSVP
async function doRsvp() {
  try {
    const res = await fetch('/api/events/'+eventId+'/rsvp', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({})});
    if (res.ok || res.status === 409) loadEvent();
    else { const e = await res.json(); alert(e.error || 'RSVP failed'); }
  } catch { alert('RSVP failed'); }
}

async function cancelRsvp() {
  try {
    const res = await fetch('/api/events/'+eventId+'/rsvp', {method:'DELETE'});
    if (res.ok) loadEvent();
    else { const e = await res.json(); alert(e.error || 'Failed'); }
  } catch { alert('Failed to cancel RSVP'); }
}

// Speaker signup
async function submitSpeaker() {
  const name=document.getElementById('spkName').value.trim(), proj=document.getElementById('spkProject').value.trim();
  if(!name||!proj) return alert('Name and project required');
  const r = await fetch('/api/speakers',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
    name, project_title:proj, description:document.getElementById('spkDesc').value.trim(),
    duration:+document.getElementById('spkDuration').value, event_id:eventId,
    github_url:document.getElementById('spkGithub').value.trim()||null,
    demo_url:document.getElementById('spkDemo').value.trim()||null,
    deck_id:document.getElementById('spkDeck').value||null
  })});
  if(r.ok){ document.getElementById('signupSection').style.display='none'; loadEvent(); }
  else { const e=await r.json().catch(()=>({})); alert(e.error||'Failed'); }
}

// Vote
async function voteSpeaker(id, btn) {
  const r = await fetch('/api/vote',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'speaker',id})});
  const d = await r.json();
  btn.querySelector('.vc').textContent = d.votes;
  btn.classList.toggle('voted', d.voted);
}

async function withdrawSpeaker(id) {
  if (!confirm('Withdraw your speaker registration?')) return;
  try {
    const res = await fetch('/api/speakers/' + id, { method: 'DELETE' });
    if (res.ok) { loadEvent(); }
    else { const e = await res.json(); alert(e.error || 'Failed'); }
  } catch { alert('Failed to withdraw'); }
}

// Load decks for dropdown
async function loadDecksDropdown() {
  try {
    const r = await fetch('/api/decks?limit=48');
    const data = await r.json();
    const sel = document.getElementById('spkDeck');
    (data.decks||[]).forEach(d => { const o=document.createElement('option'); o.value=d.id; o.textContent=d.title; sel.appendChild(o); });
  } catch {}
}

loadEvent();
