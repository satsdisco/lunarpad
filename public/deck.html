<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LunarPad — Viewing Presentation</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="header">
  <a href="/" class="logo">Lunar <span class="logo-slash"> \ </span><span class="logo-accent">Pad</span></a>
  <nav class="nav-tabs">
    <a href="/" class="nav-tab">Build in Public</a>
    <a href="/decks" class="nav-tab">Decks</a>
    <a href="/foyer" class="nav-tab">The Foyer</a>
  </nav>
  <div class="header-actions" id="authArea">
    
    <div id="userArea"></div>
  </div>
</header>

<div class="container viewer-page">
  <a href="javascript:history.back()" class="viewer-back">Back</a>

  <div class="viewer-frame-wrap" id="frameWrap">
    <iframe class="viewer-frame" id="frame" sandbox="allow-scripts allow-same-origin allow-popups" loading="lazy"></iframe>
    <button class="viewer-fullscreen" id="fullscreenBtn" title="Fullscreen">⛶ Fullscreen</button>
  </div>

  <div class="viewer-info">
    <h1 class="viewer-title" id="deckTitle">Loading...</h1>
    <div class="viewer-meta" id="deckMeta"></div>
    <div class="viewer-desc" id="deckDesc"></div>
    <div class="viewer-tags" id="deckTags"></div>

    <div id="deckZapStats"></div>

    <div class="viewer-actions">
      <div class="viewer-actions-group viewer-actions-group-primary">
        <button class="vote-btn" id="voteBtn" title="Upvote this deck to show lasting support and discovery value."><span class="arrow">▲</span><span id="voteCount">0</span></button>
        <button class="btn btn-zap" id="zapDeckBtn" onclick="openZapModal()" style="display:none">⚡ Zap</button>
        <button class="btn btn-ghost" id="downloadBtn">⬇ Download</button>
      </div>
      <div class="viewer-actions-group viewer-actions-group-links">
        <a class="btn btn-ghost" id="githubBtn" href="#" target="_blank" rel="noopener" style="display:none">⌥ GitHub</a>
        <a class="btn btn-ghost" id="demoBtn" href="#" target="_blank" rel="noopener" style="display:none">↗ Live Demo</a>
        <button class="btn btn-ghost" id="embedBtn">⟨/⟩ Embed Code</button>
        <button class="btn btn-ghost" id="linkBtn">🔗 Copy Link</button>
        <button class="btn btn-ghost" id="qrBtn" onclick="toggleQR()">⬡ QR Code</button>
        <button class="btn btn-danger" id="deleteBtn" style="display:none;">🗑 Delete</button>
      </div>
    </div>

    <div class="embed-box" id="embedBox">
      <label>Embed this presentation</label>
      <code id="embedCode"></code>
    </div>

    <div class="qr-box" id="qrBox" style="display:none">
      <label>Scan to view & vote on your phone</label>
      <div class="qr-wrap">
        <img id="qrImg" class="qr-img" src="" alt="QR code" loading="lazy" onerror="this.parentElement.innerHTML='<div style=padding:20px;color:var(--muted)>QR failed to load</div>'">
      </div>
      <div class="qr-url" id="qrUrl"></div>
      <div style="font-size:0.68rem;color:var(--muted2);margin-top:6px">Great for demo day — put this on screen for the audience</div>
    </div>

    <div class="comments-section" id="comments">
      <div class="comments-header">
        <span id="commentsHeader">Comments</span>
        <div class="comment-filters" id="commentFilters" style="display:none">
          <button class="comment-filter active" data-sort="top" onclick="sortComments('top',this)">Top</button>
          <button class="comment-filter" data-sort="newest" onclick="sortComments('newest',this)">Newest</button>
          <button class="comment-filter" data-sort="oldest" onclick="sortComments('oldest',this)">Oldest</button>
          <button class="comment-filter" data-sort="threads" onclick="sortComments('threads',this)">Biggest threads</button>
        </div>
      </div>
      <div id="commentFormArea"></div>
      <div class="comment-list" id="commentList"></div>
    </div>
  </div>
</div>

<!-- Deck Zap Modal -->
<div class="modal-overlay" id="zapModal">
  <div class="modal-content" style="max-width:440px;text-align:center">
    <button class="modal-close" onclick="closeZapModal()">&times;</button>
    <div id="zapModalBody"></div>
  </div>
</div>

<div id="zapOverlay" class="zap-overlay">⚡</div>

<footer class="footer"><div class="footer-brand">LunarPad — Build. Ship. Earn sats.</div><div class="footer-links"><a href="/privacy.html">Privacy</a><a href="/terms.html">Terms</a><a href="https://github.com/satsdisco/lunarpad" target="_blank" rel="noopener">Docs</a><a href="https://github.com/satsdisco/lunarpad/issues" target="_blank" rel="noopener">Changelog</a><a href="https://github.com/satsdisco/lunarpad" target="_blank" rel="noopener">GitHub</a></div></footer>

<script>
  const deckId = window.location.pathname.split('/').pop();

  function toggleQR() {
    const box = document.getElementById('qrBox');
    const img = document.getElementById('qrImg');
    const urlEl = document.getElementById('qrUrl');
    if (box.style.display === 'none' || !box.style.display) {
      if (!img.src || img.src === window.location.origin + '/') {
        img.src = `/api/decks/${deckId}/qr`;
        // Show the slug URL or fallback
        const base = window.location.origin;
        fetch(`/api/decks/${deckId}`).then(r => r.json()).then(d => {
          urlEl.textContent = d.slug ? `${base}/d/${d.slug}` : `${base}/deck/${deckId}`;
        });
      }
      box.style.display = 'block';
      document.getElementById('embedBox').style.display = 'none';
    } else {
      box.style.display = 'none';
    }
  }

  async function loadDeck() {
    const res = await fetch(`/api/decks/${deckId}`);
    if (!res.ok) { document.getElementById('deckTitle').textContent = 'Presentation not found'; return; }
    const deck = await res.json();

    document.title = `${deck.title} — LunarPad`;
    document.getElementById('deckTitle').textContent = deck.title;
    document.getElementById('frame').src = `/presentations/${deck.id}/${deck.entry_point}`;

    const date = new Date(deck.created_at).toLocaleDateString('en', { month: 'long', day: 'numeric', year: 'numeric' });
    document.getElementById('deckMeta').innerHTML =
      `<span>👤 ${deck.uploaded_by ? `<a href="/profile/${esc(deck.uploaded_by)}" class="profile-link" onclick="event.stopPropagation()">${esc(deck.author)}</a>` : esc(deck.author)}</span><span>📅 ${date}</span><span>👁 ${deck.views} view${deck.views !== 1 ? 's' : ''}</span>
      ${deck.project_id ? `<a href="/project/${esc(deck.project_id)}" style="color:var(--accent);font-weight:600">📦 ${esc(deck.project_name)}</a>` : ''}`;

    if (deck.description) {
      document.getElementById('deckDesc').textContent = deck.description;
    }

    if (deck.tags) {
      document.getElementById('deckTags').innerHTML = deck.tags.split(',')
        .map(t => t.trim()).filter(Boolean)
        .map(t => `<span class="viewer-tag">${esc(t)}</span>`).join('');
    }

    // GitHub / Demo links — validate URLs to prevent javascript: injection
    function safeUrl(url) {
      try { const u = new URL(url); return (u.protocol === 'http:' || u.protocol === 'https:') ? url : null; }
      catch { return null; }
    }
    if (deck.github_url) {
      const safe = safeUrl(deck.github_url);
      if (safe) { const gb = document.getElementById('githubBtn'); gb.href = safe; gb.style.display = ''; }
    }
    if (deck.demo_url) {
      const safe = safeUrl(deck.demo_url);
      if (safe) { const db2 = document.getElementById('demoBtn'); db2.href = safe; db2.style.display = ''; }
    }

    // Embed code
    const embedUrl = `${location.origin}/presentations/${deck.id}/${deck.entry_point}`;
    document.getElementById('embedCode').textContent =
      `<iframe src="${embedUrl}" width="800" height="450" frameborder="0" sandbox="allow-scripts allow-same-origin"></iframe>`;

    // Download
    document.getElementById('downloadBtn').addEventListener('click', () => {
      window.open(`/api/decks/${deck.id}/download`);
    });

    // Track view
    fetch(`/api/decks/${deck.id}/view`, { method: 'POST' });

    // Load votes
    loadVotes(deck.id);

    // Load comments
    loadComments(deck.id);

    // Show delete + zap button based on auth
    fetch('/api/me').then(r=>r.json()).then(d => {
      if (d.user && (d.user.is_admin || (deck.uploaded_by && d.user.id === deck.uploaded_by))) {
        document.getElementById('deleteBtn').style.display = '';
      }
      if (d.user) {
        document.getElementById('zapDeckBtn').style.display = '';
      }
    });

    // Load zap total
    loadZapTotal();

    // Delete
    document.getElementById('deleteBtn').addEventListener('click', async () => {
      if (!confirm('Delete this presentation? This cannot be undone.')) return;
      const r = await fetch(`/api/decks/${deck.id}`, { method: 'DELETE' });
      if (r.ok) { window.location.href = '/'; }
      else { alert('Failed to delete'); }
    });
  }

  async function loadVotes(id) {
    const res = await fetch(`/api/vote/count?type=deck&id=${id}`);
    const data = await res.json();
    document.getElementById('voteCount').textContent = data.votes;
    const btn = document.getElementById('voteBtn');
    if (data.voted) btn.classList.add('voted');
  }

  document.getElementById('voteBtn').addEventListener('click', async () => {
    const btn = document.getElementById('voteBtn');
    const res = await fetch('/api/vote', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: 'deck', id: deckId }),
    });
    const data = await res.json();
    document.getElementById('voteCount').textContent = data.votes;
    btn.classList.toggle('voted', data.voted);
  });

  // Fullscreen
  document.getElementById('fullscreenBtn').addEventListener('click', () => {
    const wrap = document.getElementById('frameWrap');
    if (wrap.requestFullscreen) wrap.requestFullscreen();
    else if (wrap.webkitRequestFullscreen) wrap.webkitRequestFullscreen();
  });

  // Embed toggle
  document.getElementById('embedBtn').addEventListener('click', () => {
    const box = document.getElementById('embedBox');
    box.style.display = box.style.display === 'none' ? 'block' : (box.style.display ? 'none' : 'block');
  });

  // Copy link
  document.getElementById('linkBtn').addEventListener('click', () => {
    navigator.clipboard.writeText(window.location.href);
    const btn = document.getElementById('linkBtn');
    btn.textContent = '✓ Copied!';
    setTimeout(() => { btn.textContent = '🔗 Copy Link'; }, 2000);
  });

  function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  function timeAgo(dateStr) {
    const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000);
    if (diff < 60) return diff + 's ago';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    return Math.floor(diff / 86400) + 'd ago';
  }

  let currentUser = null;
  let currentDeckId = null;

  async function loadComments(deckId) {
    currentDeckId = deckId;
    const [commRes, meRes] = await Promise.all([
      fetch(`/api/decks/${deckId}/comments`),
      fetch('/api/me'),
    ]);
    const comments = await commRes.json();
    const meData = await meRes.json();
    currentUser = meData.user;

    const header = document.getElementById('commentsHeader');
    header.textContent = `Comments (${comments.length})`;

    const formArea = document.getElementById('commentFormArea');
    if (currentUser) {
      formArea.innerHTML = `
        <div class="comment-form">
          <textarea id="commentInput" placeholder="Add a comment..."></textarea>
          <div class="comment-form-actions">
            <button class="btn btn-primary btn-sm" id="commentSubmit">Post Comment</button>
          </div>
        </div>`;
      document.getElementById('commentSubmit').addEventListener('click', () => postComment(deckId));
      document.getElementById('commentInput').addEventListener('keydown', e => {
        if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) postComment(deckId);
      });
    } else {
      formArea.innerHTML = `<p class="sign-in-prompt"><a href="/auth/google">Sign in</a> to comment</p>`;
    }

    buildThreadData(comments);
    sortComments('top');
  }

  let _roots = [];
  let _replies = {};
  let _currentSort = 'top';

  function buildThreadData(comments) {
    const byId = {};
    _roots = [];
    _replies = {};
    for (const c of comments) {
      byId[c.id] = c;
      const effectiveParent = c.parent_id ? (byId[c.parent_id]?.parent_id || c.parent_id) : null;
      if (!effectiveParent) {
        _roots.push(c);
      } else {
        (_replies[effectiveParent] = _replies[effectiveParent] || []).push(c);
      }
    }
    const filters = document.getElementById('commentFilters');
    if (filters) filters.style.display = _roots.length > 1 ? '' : 'none';
  }

  function sortComments(mode, btn) {
    _currentSort = mode;
    if (btn) {
      document.querySelectorAll('.comment-filter').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
    const sorted = [..._roots];
    if (mode === 'top') {
      sorted.sort((a, b) => (b.votes || 0) - (a.votes || 0));
    } else if (mode === 'newest') {
      sorted.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    } else if (mode === 'oldest') {
      sorted.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
    } else if (mode === 'threads') {
      sorted.sort((a, b) => (_replies[b.id]?.length || 0) - (_replies[a.id]?.length || 0));
    }
    const list = document.getElementById('commentList');
    if (!sorted.length) {
      list.innerHTML = '<p class="sign-in-prompt">No comments yet. Be the first!</p>';
      return;
    }
    list.innerHTML = sorted.map(c => renderThread(c, _replies[c.id] || [])).join('');
  }

  function renderThread(root, kids) {
    const replyBtn = currentUser && !kids.length ? `<button class="reply-btn" onclick="focusThreadReply('${esc(root.id)}')">Reply</button>` : '';
    const threadReplies = kids.map(r => `
      <div class="thread-reply" id="comment-${esc(r.id)}">
        <div class="thread-reply-body">
          <span class="comment-author">${esc(r.author_name)}</span>
          <span class="comment-time">${timeAgo(r.created_at)}</span>
          <div class="comment-text">${esc(r.content)}</div>
        </div>
        <button class="vote-btn btn-sm ${r.voted ? 'voted' : ''}" id="cvbtn-${esc(r.id)}"
          onclick="toggleCommentVote('${esc(r.id)}', this)">
          <span class="arrow">▲</span>
          <span id="cvcount-${esc(r.id)}">${r.votes}</span>
        </button>
      </div>`).join('');
    const replyCount = kids.length ? `<span class="thread-count">${kids.length} ${kids.length === 1 ? 'reply' : 'replies'}</span>` : '';
    const quickReply = currentUser && kids.length ? `
      <div class="thread-reply-input">
        <input id="quickReply-${esc(root.id)}" placeholder="Add a reply..." onkeydown="if(event.key==='Enter'){postReply('${esc(root.id)}',true);event.preventDefault()}">
        <button class="btn btn-primary btn-sm" onclick="postReply('${esc(root.id)}',true)">Reply</button>
      </div>` : '';
    return `
      <div class="comment-item" id="comment-${esc(root.id)}">
        <div class="comment-body">
          <span class="comment-author">${esc(root.author_name)}</span>
          <span class="comment-time">${timeAgo(root.created_at)}</span>
          <div class="comment-text">${esc(root.content)}</div>
          <div class="comment-actions">${replyBtn} ${replyCount}</div>
        </div>
        <div class="comment-vote">
          <button class="vote-btn btn-sm ${root.voted ? 'voted' : ''}" id="cvbtn-${esc(root.id)}"
            onclick="toggleCommentVote('${esc(root.id)}', this)">
            <span class="arrow">▲</span>
            <span id="cvcount-${esc(root.id)}">${root.votes}</span>
          </button>
        </div>
        ${kids.length ? `<div class="thread-replies">${threadReplies}${quickReply}</div>` : ''}
        <div id="reply-form-${esc(root.id)}"></div>
      </div>`;
  }

  function focusThreadReply(parentId) {
    // For comments with no replies yet, show the inline form
    const container = document.getElementById('reply-form-' + parentId);
    if (!container) return;
    container.innerHTML = `
      <div class="thread-replies" style="margin-top:8px">
        <div class="thread-reply-input">
          <input id="quickReply-${parentId}" placeholder="Add a reply..." onkeydown="if(event.key==='Enter'){postReply('${parentId}',true);event.preventDefault()}">
          <button class="btn btn-primary btn-sm" onclick="postReply('${parentId}',true)">Reply</button>
        </div>
      </div>`;
    document.getElementById('quickReply-' + parentId).focus();
  }

  async function postReply(parentId, useQuickInput) {
    const input = document.getElementById(useQuickInput ? 'quickReply-' + parentId : 'replyInput-' + parentId);
    if (!input) return;
    const content = input.value.trim();
    if (!content) return;
    const res = await fetch(`/api/decks/${currentDeckId}/comments`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content, parent_id: parentId }),
    });
    if (!res.ok) { alert('Failed to post reply'); return; }
    loadComments(currentDeckId);
  }

  async function postComment(deckId) {
    const input = document.getElementById('commentInput');
    const content = input.value.trim();
    if (!content) return;
    const btn = document.getElementById('commentSubmit');
    btn.disabled = true;
    const res = await fetch(`/api/decks/${deckId}/comments`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content }),
    });
    btn.disabled = false;
    if (!res.ok) { alert('Failed to post comment'); return; }
    input.value = '';
    loadComments(deckId);
  }

  async function toggleCommentVote(commentId, btn) {
    const res = await fetch('/api/vote', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: 'comment', id: commentId }),
    });
    const data = await res.json();
    document.getElementById('cvcount-' + commentId).textContent = data.votes;
    btn.classList.toggle('voted', data.voted);
    if (data.error) { alert(data.error); }
  }

  // ─── Zap ─────────────────────────────────────────────────────────────────
  let _zapPollInterval = null;
  let _zapPollTimeout = null;

  function showZap() {
    const el = document.getElementById('zapOverlay');
    el.classList.add('active');
    setTimeout(() => el.classList.remove('active'), 1600);
  }

  function closeZapModal() {
    document.getElementById('zapModal').classList.remove('open');
    if (_zapPollInterval) { clearInterval(_zapPollInterval); _zapPollInterval = null; }
    if (_zapPollTimeout) { clearTimeout(_zapPollTimeout); _zapPollTimeout = null; }
  }

  async function loadZapTotal() {
    try {
      const res = await fetch('/api/decks/' + deckId + '/zaps');
      const data = await res.json();
      const el = document.getElementById('deckZapStats');
      if (!el || !data.total_sats) return;
      el.innerHTML = `
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:10px 14px;background:rgba(242,177,52,.06);border:1px solid rgba(242,177,52,.15);border-radius:var(--radius);margin-bottom:12px">
          <span style="font-family:var(--font-mono);font-size:0.88rem;font-weight:800;color:var(--btc-bright)">⚡ ${Number(data.total_sats).toLocaleString()} sats received</span>
        </div>`;
    } catch {}
  }

  function openZapModal() {
    const presets = [1000, 5000, 10000, 21000, 50000, 100000];
    document.getElementById('zapModalBody').innerHTML = `
      <div style="font-size:1.05rem;font-weight:800;color:var(--btc-bright);margin-bottom:4px">⚡ Zap Creator</div>
      <div style="font-size:0.8rem;color:var(--muted2);margin-bottom:20px">Tip the creator directly via Lightning</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:16px">
        ${presets.map(s => `<button class="sats-preset-btn" onclick="setZapAmount(${s}, this)">${s >= 1000 ? (s/1000)+'k' : s}</button>`).join('')}
      </div>
      <div style="margin-bottom:16px">
        <input type="number" id="zapAmountInput" min="1" placeholder="Custom amount (sats)"
          style="width:100%;padding:10px 14px;background:var(--glass);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:0.9rem;text-align:center">
      </div>
      <button class="btn btn-primary" style="width:100%;padding:12px" onclick="generateZapInvoice()">Generate Invoice</button>
      <div id="zapError" style="color:#e05;font-size:0.8rem;margin-top:8px"></div>
    `;
    document.getElementById('zapModal').classList.add('open');
  }

  function setZapAmount(val, btn) {
    document.getElementById('zapAmountInput').value = val;
    document.querySelectorAll('.sats-preset-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  async function generateZapInvoice() {
    const amount = parseInt(document.getElementById('zapAmountInput').value);
    if (!amount || amount < 1) { document.getElementById('zapError').textContent = 'Enter an amount'; return; }
    document.getElementById('zapError').textContent = '';
    document.getElementById('zapModalBody').innerHTML = `<div style="padding:32px 0;color:var(--muted2);font-size:0.85rem">Generating invoice...</div>`;
    try {
      const r = await fetch('/api/decks/' + deckId + '/zap', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ amount_sats: amount }),
      });
      if (!r.ok) { const e = await r.json(); openZapModal(); document.getElementById('zapError').textContent = e.error || 'Failed'; return; }
      const data = await r.json();
      document.getElementById('zapModalBody').innerHTML = `
        <div style="margin-bottom:12px">
          <div style="font-size:0.95rem;font-weight:800;color:var(--btc-bright)">⚡ ${Number(amount).toLocaleString()} sats</div>
          <div style="font-size:0.75rem;color:var(--muted2);margin-top:2px">→ ${esc(data.recipient)}</div>
        </div>
        ${data.qr_data_url ? `<img src="${data.qr_data_url}" style="width:200px;height:200px;border-radius:8px;margin-bottom:12px" alt="QR">` : ''}
        <div style="margin-bottom:12px">
          <button class="btn btn-sm" style="width:100%" onclick="navigator.clipboard.writeText('${esc(data.payment_request)}').then(()=>this.textContent='Copied!').catch(()=>{})">Copy Invoice</button>
        </div>
        <div id="zapPaymentStatus" class="payment-waiting">
          <span class="waiting-dots">Waiting for payment<span class="dot-anim">...</span></span>
        </div>
        <button class="btn btn-primary" style="margin-top:10px;width:100%;display:none" id="confirmZapBtn" onclick="manualConfirmZap('${esc(data.zap_id)}')">✅ I've Paid — Confirm</button>
      `;
      startZapPolling(data.zap_id);
    } catch (e) {
      openZapModal();
      document.getElementById('zapError').textContent = 'Error: ' + e.message;
    }
  }

  function startZapPolling(zapId) {
    const TIMEOUT_MS = 5 * 60 * 1000;
    _zapPollTimeout = setTimeout(() => {
      clearInterval(_zapPollInterval);
      const el = document.getElementById('zapPaymentStatus');
      if (el) el.innerHTML = 'Payment not detected — it may still arrive later.';
    }, TIMEOUT_MS);
    _zapPollInterval = setInterval(async () => {
      try {
        const r = await fetch('/api/zaps/verify/' + zapId);
        const data = await r.json();
        if (data.settled) {
          clearInterval(_zapPollInterval); clearTimeout(_zapPollTimeout);
          const el = document.getElementById('zapPaymentStatus');
          if (el) el.innerHTML = '<div class="payment-confirmed">⚡ Zap sent!</div>';
          showZap();
          setTimeout(() => { closeZapModal(); loadZapTotal(); }, 2800);
        } else if (data.no_verify) {
          clearInterval(_zapPollInterval); clearTimeout(_zapPollTimeout);
          const el = document.getElementById('zapPaymentStatus');
          if (el) el.innerHTML = '<span style="font-size:0.78rem;color:var(--muted2)">Auto-verification not available.<br>Click below after you\'ve paid.</span>';
          const btn = document.getElementById('confirmZapBtn');
          if (btn) btn.style.display = '';
        }
      } catch {}
    }, 3000);
  }

  async function manualConfirmZap(zapId) {
    const btn = document.getElementById('confirmZapBtn');
    if (btn) { btn.disabled = true; btn.textContent = 'Confirming…'; }
    try {
      const r = await fetch('/api/zaps/confirm/' + zapId, { method: 'POST' });
      const data = await r.json();
      if (data.settled) {
        const el = document.getElementById('zapPaymentStatus');
        if (el) el.innerHTML = '<div class="payment-confirmed">⚡ Zap confirmed!</div>';
        if (btn) btn.style.display = 'none';
        showZap();
        setTimeout(() => { closeZapModal(); loadZapTotal(); }, 2800);
      } else {
        if (btn) { btn.disabled = false; btn.textContent = '✅ I\'ve Paid — Confirm'; }
      }
    } catch {
      if (btn) { btn.disabled = false; btn.textContent = '✅ I\'ve Paid — Confirm'; }
    }
  }

  loadDeck();
</script>
