<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeckPad — Viewing Presentation</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="header">
  <a href="/" class="logo"><span class="mark">◆</span> DeckPad</a>
  <nav class="nav-tabs">
    <a href="/" class="nav-tab">Decks</a>
    <a href="/build" class="nav-tab">Build in Public</a>
    
  </nav>
  <div class="header-actions" id="authArea">
    <a href="/upload" class="btn btn-primary">⬆ Upload Deck</a>
    <div id="userArea"></div>
  </div>
</header>

<div class="container viewer-page">
  <a href="/" class="viewer-back">Back to gallery</a>

  <div class="viewer-frame-wrap" id="frameWrap">
    <iframe class="viewer-frame" id="frame" sandbox="allow-scripts allow-same-origin allow-popups" loading="lazy"></iframe>
    <button class="viewer-fullscreen" id="fullscreenBtn" title="Fullscreen">⛶ Fullscreen</button>
  </div>

  <div class="viewer-info">
    <h1 class="viewer-title" id="deckTitle">Loading...</h1>
    <div class="viewer-meta" id="deckMeta"></div>
    <div class="viewer-desc" id="deckDesc"></div>
    <div class="viewer-tags" id="deckTags"></div>

    <div class="viewer-actions">
      <button class="vote-btn" id="voteBtn"><span class="arrow">▲</span><span id="voteCount">0</span></button>
      <button class="btn btn-ghost" id="downloadBtn">⬇ Download</button>
      <a class="btn btn-ghost" id="githubBtn" href="#" target="_blank" rel="noopener" style="display:none">⌥ GitHub</a>
      <a class="btn btn-ghost" id="demoBtn" href="#" target="_blank" rel="noopener" style="display:none">↗ Live Demo</a>
      <button class="btn btn-ghost" id="embedBtn">⟨/⟩ Embed Code</button>
      <button class="btn btn-ghost" id="linkBtn">🔗 Copy Link</button>
      <button class="btn btn-danger" id="deleteBtn" style="display:none;">🗑 Delete</button>
    </div>

    <div class="embed-box" id="embedBox">
      <label>Embed this presentation</label>
      <code id="embedCode"></code>
    </div>

    <div class="comments-section">
      <div class="comments-header" id="commentsHeader">Comments</div>
      <div id="commentFormArea"></div>
      <div class="comment-list" id="commentList"></div>
    </div>
  </div>
</div>

<footer class="footer">DeckPad — Your stage for HTML presentations</footer>

<script>
  const deckId = window.location.pathname.split('/').pop();

  async function loadDeck() {
    const res = await fetch(`/api/decks/${deckId}`);
    if (!res.ok) { document.getElementById('deckTitle').textContent = 'Presentation not found'; return; }
    const deck = await res.json();

    document.title = `${deck.title} — DeckPad`;
    document.getElementById('deckTitle').textContent = deck.title;
    document.getElementById('frame').src = `/presentations/${deck.id}/${deck.entry_point}`;

    const date = new Date(deck.created_at).toLocaleDateString('en', { month: 'long', day: 'numeric', year: 'numeric' });
    document.getElementById('deckMeta').innerHTML =
      `<span>👤 ${esc(deck.author)}</span><span>📅 ${date}</span><span>👁 ${deck.views} view${deck.views !== 1 ? 's' : ''}</span>`;

    if (deck.description) {
      document.getElementById('deckDesc').textContent = deck.description;
    }

    if (deck.tags) {
      document.getElementById('deckTags').innerHTML = deck.tags.split(',')
        .map(t => t.trim()).filter(Boolean)
        .map(t => `<span class="viewer-tag">${esc(t)}</span>`).join('');
    }

    // GitHub / Demo links
    if (deck.github_url) {
      const gb = document.getElementById('githubBtn');
      gb.href = deck.github_url;
      gb.style.display = '';
    }
    if (deck.demo_url) {
      const db2 = document.getElementById('demoBtn');
      db2.href = deck.demo_url;
      db2.style.display = '';
    }

    // Embed code
    const embedUrl = `${location.origin}/presentations/${deck.id}/${deck.entry_point}`;
    document.getElementById('embedCode').textContent =
      `<iframe src="${embedUrl}" width="800" height="450" frameborder="0" sandbox="allow-scripts allow-same-origin"></iframe>`;

    // Download
    document.getElementById('downloadBtn').addEventListener('click', () => {
      window.open(`/api/decks/${deck.id}/download`);
    });

    // Track view
    fetch(`/api/decks/${deck.id}/view`, { method: 'POST' });

    // Load votes
    loadVotes(deck.id);

    // Load comments
    loadComments(deck.id);

    // Show delete only if user owns this deck
    fetch('/api/me').then(r=>r.json()).then(d => {
      if (d.user && deck.uploaded_by && d.user.id === deck.uploaded_by) {
        document.getElementById('deleteBtn').style.display = '';
      }
    });

    // Delete
    document.getElementById('deleteBtn').addEventListener('click', async () => {
      if (!confirm('Delete this presentation? This cannot be undone.')) return;
      const r = await fetch(`/api/decks/${deck.id}`, { method: 'DELETE' });
      if (r.ok) { window.location.href = '/'; }
      else { alert('Failed to delete'); }
    });
  }

  async function loadVotes(id) {
    const res = await fetch(`/api/vote/count?type=deck&id=${id}`);
    const data = await res.json();
    document.getElementById('voteCount').textContent = data.votes;
    const btn = document.getElementById('voteBtn');
    if (data.voted) btn.classList.add('voted');
  }

  document.getElementById('voteBtn').addEventListener('click', async () => {
    const btn = document.getElementById('voteBtn');
    const res = await fetch('/api/vote', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: 'deck', id: deckId }),
    });
    const data = await res.json();
    document.getElementById('voteCount').textContent = data.votes;
    btn.classList.toggle('voted', data.voted);
  });

  // Fullscreen
  document.getElementById('fullscreenBtn').addEventListener('click', () => {
    const wrap = document.getElementById('frameWrap');
    if (wrap.requestFullscreen) wrap.requestFullscreen();
    else if (wrap.webkitRequestFullscreen) wrap.webkitRequestFullscreen();
  });

  // Embed toggle
  document.getElementById('embedBtn').addEventListener('click', () => {
    const box = document.getElementById('embedBox');
    box.style.display = box.style.display === 'none' ? 'block' : (box.style.display ? 'none' : 'block');
  });

  // Copy link
  document.getElementById('linkBtn').addEventListener('click', () => {
    navigator.clipboard.writeText(window.location.href);
    const btn = document.getElementById('linkBtn');
    btn.textContent = '✓ Copied!';
    setTimeout(() => { btn.textContent = '🔗 Copy Link'; }, 2000);
  });

  function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  function timeAgo(dateStr) {
    const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000);
    if (diff < 60) return diff + 's ago';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    return Math.floor(diff / 86400) + 'd ago';
  }

  let currentUser = null;

  async function loadComments(deckId) {
    const [commRes, meRes] = await Promise.all([
      fetch(`/api/decks/${deckId}/comments`),
      fetch('/api/me'),
    ]);
    const comments = await commRes.json();
    const meData = await meRes.json();
    currentUser = meData.user;

    const header = document.getElementById('commentsHeader');
    header.textContent = `Comments (${comments.length})`;

    const formArea = document.getElementById('commentFormArea');
    if (currentUser) {
      formArea.innerHTML = `
        <div class="comment-form">
          <textarea id="commentInput" placeholder="Add a comment..."></textarea>
          <div class="comment-form-actions">
            <button class="btn btn-primary btn-sm" id="commentSubmit">Post Comment</button>
          </div>
        </div>`;
      document.getElementById('commentSubmit').addEventListener('click', () => postComment(deckId));
      document.getElementById('commentInput').addEventListener('keydown', e => {
        if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) postComment(deckId);
      });
    } else {
      formArea.innerHTML = `<p class="sign-in-prompt"><a href="/auth/google">Sign in</a> to comment</p>`;
    }

    renderComments(comments);
  }

  function renderComments(comments) {
    const list = document.getElementById('commentList');
    if (!comments.length) {
      list.innerHTML = '<p class="sign-in-prompt">No comments yet. Be the first!</p>';
      return;
    }
    list.innerHTML = comments.map(c => `
      <div class="comment-item" id="comment-${esc(c.id)}">
        <div class="comment-body">
          <span class="comment-author">${esc(c.author_name)}</span>
          <span class="comment-time">${timeAgo(c.created_at)}</span>
          <div class="comment-text">${esc(c.content)}</div>
        </div>
        <div class="comment-vote">
          <button class="vote-btn btn-sm ${c.voted ? 'voted' : ''}" id="cvbtn-${esc(c.id)}"
            onclick="toggleCommentVote('${esc(c.id)}', this)">
            <span class="arrow">▲</span>
            <span id="cvcount-${esc(c.id)}">${c.votes}</span>
          </button>
        </div>
      </div>`).join('');
  }

  async function postComment(deckId) {
    const input = document.getElementById('commentInput');
    const content = input.value.trim();
    if (!content) return;
    const btn = document.getElementById('commentSubmit');
    btn.disabled = true;
    const res = await fetch(`/api/decks/${deckId}/comments`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content }),
    });
    btn.disabled = false;
    if (!res.ok) { alert('Failed to post comment'); return; }
    input.value = '';
    loadComments(deckId);
  }

  async function toggleCommentVote(commentId, btn) {
    const res = await fetch('/api/vote', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: 'comment', id: commentId }),
    });
    const data = await res.json();
    document.getElementById('cvcount-' + commentId).textContent = data.votes;
    btn.classList.toggle('voted', data.voted);
    if (data.error) { alert(data.error); }
  }

  loadDeck();
</script>
<script>
// Auth
async function initAuth() {
  try {
    const res = await fetch('/api/me');
    const data = await res.json();
    const area = document.getElementById('userArea');
    if (!area) return;
    if (data.user) {
      area.innerHTML = `
        <div class="user-menu">
          <div class="user-pill" onclick="this.parentElement.querySelector('.user-dropdown').classList.toggle('open')">
            <img src="${data.user.avatar || ''}" alt="" onerror="this.style.display='none'">
            <span>${data.user.name || data.user.email}</span>
          </div>
          <div class="user-dropdown">
            <a href="/">My Profile</a>
            <a href="/auth/logout">Sign out</a>
          </div>
        </div>`;
      document.addEventListener('click', e => {
        if (!e.target.closest('.user-menu')) {
          document.querySelectorAll('.user-dropdown').forEach(d => d.classList.remove('open'));
        }
      });
    } else {
      area.innerHTML = '<a href="/auth/google" class="sign-in-btn">Sign in with Google</a>';
    }
  } catch(e) { console.warn('Auth check failed'); }
}
initAuth();
</script>
</body>
</html>
