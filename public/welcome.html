<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LunarPad</title>
<link rel="stylesheet" href="/css/style.css">
<style>
  .landing { max-width: 480px; margin: 0 auto; padding: 80px 24px; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
  .landing-logo { font-family: var(--font-mono); font-size: 1.6rem; font-weight: 800; color: var(--text); margin-bottom: 24px; }
  .landing-logo .slash { color: var(--text); font-weight: 400; margin: 0 -1px; }
  .landing-logo .accent { color: var(--btc-gold); }
  .landing-desc { font-size: 0.9rem; color: var(--muted); line-height: 1.7; margin-bottom: 32px; }
  .landing-features { list-style: none; margin-bottom: 40px; }
  .landing-features li { font-size: 0.82rem; color: var(--muted); padding: 6px 0; }
  .landing-features li::before { content: '→ '; color: var(--accent); font-family: var(--font-mono); }
  .landing-features li strong { color: var(--text2); }
  .landing-btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 12px 28px; font-size: 0.85rem; font-weight: 600;
    color: #fff; background: var(--accent);
    border: none; border-radius: var(--radius); cursor: pointer;
    transition: all .2s; text-decoration: none;
    font-family: var(--font);
  }
  .landing-btn:hover { background: var(--accent-hover); color: #fff; transform: translateY(-1px); }
  .landing-btn svg { width: 18px; height: 18px; }
  .landing-footer { margin-top: 48px; font-family: var(--font-mono); font-size: 0.65rem; color: var(--dim); }
  .landing-footer a { color: var(--muted2); }
  .landing-footer a:hover { color: var(--accent); }
  @media (max-width: 480px) { .landing { padding: 40px 20px; } .landing-logo { font-size: 1.3rem; } }
</style>
</head>
<body>
<div class="landing">
  <div class="landing-logo">Lunar<span class="slash">\</span><span class="accent">Pad</span></div>
  <div class="landing-desc">Build. Ship. Earn sats.<br>A platform for presentations, projects, and demo days.</div>
  <ul class="landing-features">
    <li><strong>Present</strong> — upload HTML decks, share with your team</li>
    <li><strong>Build</strong> — showcase projects, join bounties, compete</li>
    <li><strong>Vote</strong> — upvote the best builds at demo days</li>
  </ul>
  <a href="/auth/google" class="landing-btn">
    <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
    Sign in with Google
  </a>
  <div class="landing-footer"><a href="https://github.com/satsdisco/deckpad">source</a> · open source</div>
</div>
<script>fetch('/api/me').then(r=>r.json()).then(d=>{if(d.user)window.location.href='/';}).catch(()=>{});</script>
</body>
</html>
