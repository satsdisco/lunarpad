<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LunarPad</title>
<link rel="stylesheet" href="/css/style.css">
<style>
  .landing { max-width: 400px; margin: 0 auto; padding: 80px 24px; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
  .landing-logo { font-family: var(--font-mono); font-size: 1.6rem; font-weight: 800; color: var(--text); margin-bottom: 8px; }
  .landing-logo .slash { color: var(--text); font-weight: 400; }
  .landing-logo .accent { color: var(--btc-gold); }
  .landing-desc { font-size: 0.85rem; color: var(--muted); margin-bottom: 32px; }
  .auth-tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
  .auth-tab {
    padding: 10px 20px; font-size: 0.82rem; font-weight: 500;
    color: var(--muted); cursor: pointer; border: none; background: none;
    border-bottom: 2px solid transparent; font-family: var(--font); transition: all .15s;
  }
  .auth-tab:hover { color: var(--text); }
  .auth-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .auth-form { display: none; }
  .auth-form.active { display: block; }
  .auth-form .form-group { margin-bottom: 14px; }
  .auth-form .form-group label { font-family: var(--font-mono); display: block; font-size: 0.7rem; font-weight: 700; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .06em; }
  .auth-form input {
    width: 100%; padding: 10px 14px; background: var(--glass); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); font-size: 0.85rem;
    font-family: var(--font); outline: none; transition: border-color .2s;
  }
  .auth-form input:focus { border-color: var(--accent); }
  .auth-form input::placeholder { color: var(--muted2); }
  .auth-submit {
    width: 100%; padding: 11px; font-size: 0.85rem; font-weight: 600;
    color: #fff; background: var(--accent); border: none;
    border-radius: var(--radius); cursor: pointer; font-family: var(--font);
    transition: all .2s; margin-top: 8px;
  }
  .auth-submit:hover { background: var(--accent-hover); }
  .auth-error { font-size: 0.8rem; color: var(--danger, #e5484d); margin-top: 8px; display: none; }
  .landing-footer { margin-top: 40px; font-family: var(--font-mono); font-size: 0.65rem; color: var(--dim); }
  .landing-footer a { color: var(--muted2); }
  .landing-footer a:hover { color: var(--accent); }
  @media (max-width: 480px) { .landing { padding: 40px 20px; } }
</style>
</head>
<body>
<div class="landing">
  <div class="landing-logo">Lunar<span class="slash">\</span><span class="accent">Pad</span></div>
  <div class="landing-desc">Build. Ship. Earn sats.</div>

  <div class="auth-tabs">
    <button class="auth-tab active">Sign In</button>
  </div>

  <form class="auth-form active" id="form-login" onsubmit="return doLogin(event)">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="loginUser" placeholder="your username" autocomplete="username" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="••••••" autocomplete="current-password" required>
    </div>
    <button type="submit" class="auth-submit">Sign In</button>
    <div class="auth-error" id="loginError"></div>
  </form>

  <form class="auth-form" id="form-register" onsubmit="return doRegister(event)">
    <div class="form-group">
      <label>Display Name</label>
      <input type="text" id="regName" placeholder="How others see you" autocomplete="name">
    </div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="regUser" placeholder="Choose a username" autocomplete="username" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="regPass" placeholder="Choose a password" autocomplete="new-password" required>
    </div>
    <button type="submit" class="auth-submit">Create Account</button>
    <div class="auth-error" id="regError"></div>
  </form>

  <div class="landing-footer"><a href="https://github.com/satsdisco/deckpad">source</a> · open source</div>
</div>

<script>
function switchAuth(tab) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('form-' + tab).classList.add('active');
}

async function doLogin(e) {
  e.preventDefault();
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';
  try {
    const r = await fetch('/auth/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ username: document.getElementById('loginUser').value, password: document.getElementById('loginPass').value })
    });
    const d = await r.json();
    if (r.ok) { window.location.href = '/'; }
    else { errEl.textContent = d.error; errEl.style.display = 'block'; }
  } catch { errEl.textContent = 'Connection error'; errEl.style.display = 'block'; }
  return false;
}

async function doRegister(e) {
  e.preventDefault();
  const errEl = document.getElementById('regError');
  errEl.style.display = 'none';
  try {
    const r = await fetch('/auth/register', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        name: document.getElementById('regName').value,
        username: document.getElementById('regUser').value,
        password: document.getElementById('regPass').value
      })
    });
    const d = await r.json();
    if (r.ok) { window.location.href = '/'; }
    else { errEl.textContent = d.error; errEl.style.display = 'block'; }
  } catch { errEl.textContent = 'Connection error'; errEl.style.display = 'block'; }
  return false;
}

// Auto-redirect if already logged in
fetch('/api/me').then(r=>r.json()).then(d=>{if(d.user)window.location.href='/';}).catch(()=>{});
</script>
</body>
</html>
