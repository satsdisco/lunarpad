<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeckPad — HTML Presentation Gallery</title>
<style>/* ─── DeckPad Global Styles ──────────────────────────────────────────────── */
:root {
  --bg: #050505;
  --surface: #0e0e0e;
  --surface2: #161616;
  --border: #1e1e1e;
  --border2: #2a2a2a;
  --gold: #f5c518;
  --gold2: #c89f15;
  --gold-glow: rgba(245,197,24,.12);
  --text: #eee;
  --muted: #777;
  --muted2: #555;
  --radius: 12px;
  --radius-lg: 16px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

a { color: var(--gold); text-decoration: none; }
a:hover { color: var(--gold2); }

/* ─── Layout ─────────────────────────────────────────────────────────────── */
.container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

/* ─── Header ─────────────────────────────────────────────────────────────── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 32px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
  background: rgba(5,5,5,.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.logo {
  font-size: 1.4em; font-weight: 800; color: var(--gold);
  letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px;
}
.logo span { font-size: 1.3em; }

.header-actions { display: flex; gap: 12px; align-items: center; }

.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 20px; border-radius: 8px; font-size: 14px;
  font-weight: 600; cursor: pointer; border: none;
  transition: all .15s ease;
}
.btn-primary {
  background: var(--gold); color: #000;
}
.btn-primary:hover { background: var(--gold2); transform: translateY(-1px); }
.btn-ghost {
  background: transparent; color: var(--muted); border: 1px solid var(--border2);
}
.btn-ghost:hover { border-color: var(--gold2); color: var(--text); }

/* ─── Search & Filters ───────────────────────────────────────────────────── */
.toolbar {
  display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
  padding: 24px 0 16px;
}

.search-box {
  flex: 1; min-width: 200px; position: relative;
}
.search-box input {
  width: 100%; padding: 11px 16px 11px 40px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-size: 14px; outline: none;
  transition: border-color .2s;
}
.search-box input:focus { border-color: var(--gold2); }
.search-box input::placeholder { color: var(--muted2); }
.search-box::before {
  content: '🔍'; position: absolute; left: 14px; top: 50%;
  transform: translateY(-50%); font-size: 14px; pointer-events: none;
}

.sort-select {
  padding: 11px 16px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-size: 14px; cursor: pointer; outline: none;
}
.sort-select:focus { border-color: var(--gold2); }
.sort-select option { background: var(--surface); }

/* ─── Tags ───────────────────────────────────────────────────────────────── */
.tag-bar {
  display: flex; gap: 6px; flex-wrap: wrap; padding-bottom: 8px;
}
.tag-chip {
  padding: 5px 14px; border-radius: 100px; font-size: 12px; font-weight: 500;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--muted); cursor: pointer; transition: all .15s;
  user-select: none;
}
.tag-chip:hover { border-color: var(--gold2); color: var(--text); }
.tag-chip.active {
  background: var(--gold-glow); border-color: var(--gold2);
  color: var(--gold);
}

/* ─── Gallery Grid ───────────────────────────────────────────────────────── */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px; padding: 8px 0 48px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  cursor: pointer;
  transition: transform .2s ease, border-color .2s, box-shadow .2s;
}
.card:hover {
  transform: translateY(-4px);
  border-color: var(--border2);
  box-shadow: 0 16px 48px rgba(0,0,0,.5);
}
.card-thumb {
  width: 100%; aspect-ratio: 16/9; object-fit: cover;
  background: var(--surface2);
  display: block;
}
.card-thumb-placeholder {
  width: 100%; aspect-ratio: 16/9;
  display: flex; align-items: center; justify-content: center;
  font-size: 48px;
  background: linear-gradient(135deg, #1a1510, #0a0a0a);
}
.card-body { padding: 16px; }
.card-title {
  font-size: 16px; font-weight: 700; color: var(--text);
  margin-bottom: 6px; line-height: 1.3;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.card-meta {
  font-size: 12px; color: var(--muted); display: flex;
  align-items: center; gap: 12px;
}
.card-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 10px; }
.card-tag {
  font-size: 10px; padding: 2px 8px; border-radius: 4px;
  background: rgba(245,197,24,.06); color: var(--gold2);
  border: 1px solid rgba(245,197,24,.12);
}

/* ─── Empty State ────────────────────────────────────────────────────────── */
.empty-state {
  text-align: center; padding: 80px 20px; grid-column: 1 / -1;
}
.empty-state .icon { font-size: 64px; margin-bottom: 16px; }
.empty-state h3 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.empty-state p { color: var(--muted); margin-bottom: 24px; }

/* ─── Pagination ─────────────────────────────────────────────────────────── */
.pagination {
  display: flex; justify-content: center; gap: 8px; padding: 0 0 48px;
}
.page-btn {
  padding: 8px 14px; border-radius: 8px; font-size: 14px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted); cursor: pointer; transition: all .15s;
}
.page-btn:hover { border-color: var(--gold2); color: var(--text); }
.page-btn.active { background: var(--gold); color: #000; border-color: var(--gold); font-weight: 700; }
.page-btn:disabled { opacity: .3; cursor: default; }

/* ─── Upload Page ────────────────────────────────────────────────────────── */
.upload-page { max-width: 640px; margin: 0 auto; padding: 40px 24px 80px; }
.upload-page h1 {
  font-size: 32px; font-weight: 800; margin-bottom: 8px;
}
.upload-page .subtitle { color: var(--muted); margin-bottom: 32px; }

.drop-zone {
  border: 2px dashed var(--border2); border-radius: var(--radius-lg);
  padding: 60px 24px; text-align: center;
  transition: border-color .2s, background .2s; cursor: pointer;
  margin-bottom: 24px;
}
.drop-zone:hover, .drop-zone.drag-over {
  border-color: var(--gold); background: var(--gold-glow);
}
.drop-zone .icon { font-size: 48px; margin-bottom: 12px; }
.drop-zone .label { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.drop-zone .hint { font-size: 13px; color: var(--muted); }
.drop-zone .file-name {
  margin-top: 12px; font-size: 14px; color: var(--gold);
  font-weight: 600; display: none;
}

.form-group { margin-bottom: 20px; }
.form-group label {
  display: block; font-size: 13px; font-weight: 600;
  color: var(--muted); margin-bottom: 6px;
}
.form-group input, .form-group textarea {
  width: 100%; padding: 12px 14px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-size: 14px;
  outline: none; font-family: inherit; transition: border-color .2s;
}
.form-group input:focus, .form-group textarea:focus { border-color: var(--gold2); }
.form-group textarea { resize: vertical; min-height: 80px; }

.upload-progress {
  display: none; margin-top: 20px; text-align: center;
}
.progress-bar-bg {
  width: 100%; height: 6px; background: var(--surface2);
  border-radius: 3px; overflow: hidden; margin-bottom: 8px;
}
.progress-bar-fill {
  height: 100%; background: var(--gold); border-radius: 3px;
  width: 0%; transition: width .3s ease;
}
.progress-text { font-size: 13px; color: var(--muted); }

/* ─── Deck Viewer ────────────────────────────────────────────────────────── */
.viewer-page { padding-bottom: 48px; }

.viewer-back {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 20px 0; font-size: 14px; color: var(--muted);
}
.viewer-back:hover { color: var(--gold); }

.viewer-frame-wrap {
  position: relative; width: 100%; aspect-ratio: 16/9;
  border-radius: var(--radius-lg); overflow: hidden;
  border: 1px solid var(--border);
  background: #000;
}
.viewer-frame {
  width: 100%; height: 100%; border: none;
}
.viewer-fullscreen {
  position: absolute; top: 12px; right: 12px;
  background: rgba(0,0,0,.7); border: 1px solid rgba(255,255,255,.15);
  color: #fff; padding: 8px 14px; border-radius: 8px;
  font-size: 13px; cursor: pointer; opacity: 0;
  transition: opacity .2s;
  backdrop-filter: blur(8px);
}
.viewer-frame-wrap:hover .viewer-fullscreen { opacity: 1; }
.viewer-fullscreen:hover { background: rgba(245,197,24,.3); border-color: var(--gold); }

.viewer-info { padding: 24px 0; }
.viewer-title { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
.viewer-meta { font-size: 14px; color: var(--muted); display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 12px; }
.viewer-desc { font-size: 15px; color: var(--muted); line-height: 1.6; margin-bottom: 16px; }
.viewer-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
.viewer-tag {
  padding: 4px 12px; border-radius: 6px; font-size: 12px;
  background: rgba(245,197,24,.06); color: var(--gold2);
  border: 1px solid rgba(245,197,24,.12);
}

.viewer-actions { display: flex; gap: 10px; flex-wrap: wrap; }

.embed-box {
  margin-top: 20px; padding: 16px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 10px;
  display: none;
}
.embed-box label { font-size: 12px; color: var(--muted); margin-bottom: 6px; display: block; }
.embed-box code {
  display: block; padding: 10px; background: var(--bg);
  border-radius: 6px; font-size: 12px; color: var(--gold);
  word-break: break-all; font-family: 'SF Mono', Monaco, monospace;
}

/* ─── Footer ─────────────────────────────────────────────────────────────── */
.footer {
  text-align: center; padding: 32px; font-size: 13px;
  color: var(--muted2); border-top: 1px solid var(--border);
}

/* ─── Nav Tabs ────────────────────────────────────────────────────────────── */
.nav-tabs { display: flex; align-items: center; gap: 2px; }
.nav-tab {
  padding: 8px 14px; font-size: 13px; font-weight: 500;
  color: var(--muted); text-decoration: none; position: relative;
  transition: color .15s;
}
.nav-tab::after {
  content: ''; position: absolute; bottom: -21px; left: 14px; right: 14px;
  height: 2px; background: var(--gold); border-radius: 2px;
  opacity: 0; transition: opacity .15s;
}
.nav-tab:hover { color: var(--text); }
.nav-tab.active { color: var(--gold); }
.nav-tab.active::after { opacity: 1; }

/* ─── Responsive ─────────────────────────────────────────────────────────── */
@media (max-width: 640px) {
  .header { padding: 16px 20px; gap: 12px; flex-wrap: wrap; }
  .logo { font-size: 1.2em; }
  .nav-tabs { gap: 0; order: 3; width: 100%; border-top: 1px solid var(--border); padding-top: 8px; }
  .nav-tab::after { bottom: -9px; }
  .gallery { grid-template-columns: 1fr; }
  .toolbar { flex-direction: column; }
  .upload-page h1 { font-size: 24px; }
  .viewer-title { font-size: 22px; }
  .viewer-frame-wrap { aspect-ratio: 4/3; }
}
</style>
</head>
<body>

<header class="header">
  <a href="/" class="logo"><span>🎭</span> DeckPad</a>
  <nav class="nav-tabs">
    <a href="/" class="nav-tab active">Decks</a>
    <a href="/build" class="nav-tab">Build in Public</a>
    <a href="/vote" class="nav-tab">Vote</a>
  </nav>
  <div class="header-actions">
    <a href="/upload" class="btn btn-primary">⬆ Upload Deck</a>
  </div>
</header>

<div class="container">
  <div class="toolbar">
    <div class="search-box">
      <input type="text" id="search" placeholder="Search presentations...">
    </div>
    <select class="sort-select" id="sort">
      <option value="newest">Newest first</option>
      <option value="oldest">Oldest first</option>
      <option value="views">Most viewed</option>
      <option value="votes">Top voted</option>
    </select>
  </div>

  <div class="tag-bar" id="tagBar"></div>
  <div class="gallery" id="gallery"></div>
  <div class="pagination" id="pagination"></div>
</div>

<footer class="footer">DeckPad — Your stage for HTML presentations</footer>

<script>
  let currentPage = 1;
  let currentSearch = '';
  let currentSort = 'newest';
  let activeTags = new Set();

  // Load tags
  async function loadTags() {
    const res = await fetch('/api/tags');
    const tags = await res.json();
    const bar = document.getElementById('tagBar');
    bar.innerHTML = '';
    tags.forEach(tag => {
      const chip = document.createElement('div');
      chip.className = 'tag-chip';
      chip.textContent = tag;
      chip.addEventListener('click', () => {
        if (activeTags.has(tag)) { activeTags.delete(tag); chip.classList.remove('active'); }
        else { activeTags.add(tag); chip.classList.add('active'); }
        currentPage = 1;
        loadDecks();
      });
      bar.appendChild(chip);
    });
  }

  // Load decks
  async function loadDecks() {
    const params = new URLSearchParams({
      page: currentPage,
      limit: 12,
      sort: currentSort,
    });
    if (currentSearch) params.set('search', currentSearch);
    if (activeTags.size) params.set('tags', [...activeTags].join(','));

    const res = await fetch('/api/decks?' + params);
    const data = await res.json();
    renderGallery(data.decks);
    renderPagination(data.pagination);
  }

  function renderGallery(decks) {
    const el = document.getElementById('gallery');
    if (!decks.length) {
      el.innerHTML = `
        <div class="empty-state">
          <div class="icon">🎭</div>
          <h3>No presentations yet</h3>
          <p>Be the first to upload an HTML presentation</p>
          <a href="/upload" class="btn btn-primary">Upload Your Deck</a>
        </div>`;
      return;
    }

    el.innerHTML = decks.map(d => {
      const thumb = d.thumbnail
        ? `<img class="card-thumb" src="/thumbnails/${d.thumbnail}" alt="${esc(d.title)}" loading="lazy">`
        : `<div class="card-thumb-placeholder">🎭</div>`;

      const tags = d.tags ? d.tags.split(',').map(t => t.trim()).filter(Boolean)
        .slice(0, 3).map(t => `<span class="card-tag">${esc(t)}</span>`).join('') : '';

      const date = new Date(d.created_at).toLocaleDateString('en', { month: 'short', day: 'numeric', year: 'numeric' });
      const votes = d.votes || 0;

      return `
        <div class="card" onclick="location.href='/deck/${d.id}'">
          ${thumb}
          <div class="card-body">
            <div class="card-title">${esc(d.title)}</div>
            <div class="card-meta">
              <span>${esc(d.author)}</span>
              <span>${date}</span>
              <span>${d.views} view${d.views !== 1 ? 's' : ''}</span>
              <span>🔺 ${votes}</span>
            </div>
            ${tags ? `<div class="card-tags">${tags}</div>` : ''}
          </div>
        </div>`;
    }).join('');
  }

  function renderPagination(p) {
    const el = document.getElementById('pagination');
    if (p.pages <= 1) { el.innerHTML = ''; return; }

    let html = '';
    html += `<button class="page-btn" ${p.page <= 1 ? 'disabled' : ''} onclick="goPage(${p.page - 1})">‹</button>`;
    for (let i = 1; i <= p.pages; i++) {
      html += `<button class="page-btn${i === p.page ? ' active' : ''}" onclick="goPage(${i})">${i}</button>`;
    }
    html += `<button class="page-btn" ${p.page >= p.pages ? 'disabled' : ''} onclick="goPage(${p.page + 1})">›</button>`;
    el.innerHTML = html;
  }

  function goPage(n) { currentPage = n; loadDecks(); window.scrollTo({ top: 0, behavior: 'smooth' }); }

  function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  // Events
  let searchTimeout;
  document.getElementById('search').addEventListener('input', e => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      currentSearch = e.target.value;
      currentPage = 1;
      loadDecks();
    }, 250);
  });

  document.getElementById('sort').addEventListener('change', e => {
    currentSort = e.target.value;
    currentPage = 1;
    loadDecks();
  });

  // Init
  loadTags();
  loadDecks();
</script>
</body>
</html>
