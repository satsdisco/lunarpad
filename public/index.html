<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LunarPad — Build. Ship. Earn sats.</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="header">
  <a href="/" class="logo">Lunar <span class="logo-slash"> \ </span><span class="logo-accent">Pad</span></a>
  <nav class="nav-tabs">
    <a href="/" class="nav-tab active">Decks</a>
    <a href="/build" class="nav-tab">Build in Public</a>
    
  </nav>
  <div class="header-actions" id="authArea">
    
    <div id="userArea"></div>
  </div>
</header>

<div class="container">
  <div class="toolbar">
    <div class="search-box">
      <input type="text" id="search" placeholder="Search presentations...">
    </div>
    <select class="sort-select" id="sort">
      <option value="newest">Newest first</option>
      <option value="oldest" selected>Oldest first</option>
      <option value="views">Most viewed</option>
      <option value="votes">Top voted</option>
    </select>
  </div>

  <div class="tag-bar" id="tagBar"></div>
  <div class="gallery" id="gallery">
    <div class="skeleton-card" style="height:220px"></div>
    <div class="skeleton-card" style="height:220px"></div>
    <div class="skeleton-card" style="height:220px"></div>
    <div class="skeleton-card" style="height:220px"></div>
    <div class="skeleton-card" style="height:220px"></div>
    <div class="skeleton-card" style="height:220px"></div>
  </div>
  <div class="pagination" id="pagination"></div>
</div>

<footer class="footer">LunarPad — Build. Ship. Earn sats.</footer>

<script>
  let currentPage = 1;
  let currentSearch = '';
  let currentSort = 'oldest';
  let activeTags = new Set();

  // Load tags
  async function loadTags() {
    const res = await fetch('/api/tags');
    const tags = await res.json();
    const bar = document.getElementById('tagBar');
    bar.innerHTML = '';
    tags.forEach(tag => {
      const chip = document.createElement('div');
      chip.className = 'tag-chip';
      chip.textContent = tag;
      chip.addEventListener('click', () => {
        if (activeTags.has(tag)) { activeTags.delete(tag); chip.classList.remove('active'); }
        else { activeTags.add(tag); chip.classList.add('active'); }
        currentPage = 1;
        loadDecks();
      });
      bar.appendChild(chip);
    });
  }

  // Load decks
  async function loadDecks() {
    const params = new URLSearchParams({
      page: currentPage,
      limit: 12,
      sort: currentSort,
    });
    if (currentSearch) params.set('search', currentSearch);
    if (activeTags.size) params.set('tags', [...activeTags].join(','));

    const res = await fetch('/api/decks?' + params);
    const data = await res.json();
    renderGallery(data.decks);
    renderPagination(data.pagination);
  }

  function renderGallery(decks) {
    const el = document.getElementById('gallery');
    if (!decks.length) {
      el.innerHTML = `
        <div class="empty-state">
          <div class="icon">🎭</div>
          <h3>No presentations yet</h3>
          <p>Be the first to upload an HTML presentation</p>
          <button class="btn btn-primary" onclick="document.getElementById('uploadModal').classList.add('open')">Upload Your Deck</button>
        </div>`;
      return;
    }

    el.innerHTML = decks.map(d => {
      const thumb = d.thumbnail
        ? `<img class="card-thumb" src="/thumbnails/${d.thumbnail}" alt="${esc(d.title)}" loading="lazy">`
        : `<div class="card-thumb-placeholder">🎭</div>`;

      const tags = d.tags ? d.tags.split(',').map(t => t.trim()).filter(Boolean)
        .slice(0, 3).map(t => `<span class="card-tag">${esc(t)}</span>`).join('') : '';

      const date = new Date(d.created_at).toLocaleDateString('en', { month: 'short', day: 'numeric', year: 'numeric' });
      const votes = d.votes || 0;

      return `
        <div class="card" onclick="location.href='/deck/${d.id}'">
          ${thumb}
          <div class="card-body">
            <div class="card-title">${esc(d.title)}</div>
            <div class="card-meta">
              <span>${d.uploaded_by ? `<a href="/profile/${esc(d.uploaded_by)}" class="profile-link" onclick="event.stopPropagation()">${esc(d.author)}</a>` : esc(d.author)}</span>
              <span>${date}</span>
              <span>${d.views} view${d.views !== 1 ? 's' : ''}</span>
              <span>🔺 ${votes}</span>
            </div>
            ${tags ? `<div class="card-tags">${tags}</div>` : ''}
          </div>
        </div>`;
    }).join('');
  }

  function renderPagination(p) {
    const el = document.getElementById('pagination');
    if (p.pages <= 1) { el.innerHTML = ''; return; }

    let html = '';
    html += `<button class="page-btn" ${p.page <= 1 ? 'disabled' : ''} onclick="goPage(${p.page - 1})">‹</button>`;
    for (let i = 1; i <= p.pages; i++) {
      html += `<button class="page-btn${i === p.page ? ' active' : ''}" onclick="goPage(${i})">${i}</button>`;
    }
    html += `<button class="page-btn" ${p.page >= p.pages ? 'disabled' : ''} onclick="goPage(${p.page + 1})">›</button>`;
    el.innerHTML = html;
  }

  function goPage(n) { currentPage = n; loadDecks(); window.scrollTo({ top: 0, behavior: 'smooth' }); }

  function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  // Events
  let searchTimeout;
  document.getElementById('search').addEventListener('input', e => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      currentSearch = e.target.value;
      currentPage = 1;
      loadDecks();
    }, 250);
  });

  document.getElementById('sort').addEventListener('change', e => {
    currentSort = e.target.value;
    currentPage = 1;
    loadDecks();
  });

  // Init
  loadTags();
  loadDecks();
</script>
<script>
// Auth
async function initAuth() {
  try {
    const res = await fetch('/api/me');
    const data = await res.json();
    const area = document.getElementById('userArea');
    if (!area) return;
    if (data.user) {
      area.innerHTML = `
        <div class="user-menu">
          <div class="user-pill" onclick="this.parentElement.querySelector('.user-dropdown').classList.toggle('open')">
            <img src="${data.user.avatar || ''}" alt="" onerror="this.style.display='none'">
            <span>${data.user.name || data.user.email}</span>
          </div>
          <div class="user-dropdown">
            <a href="/profile">My Profile</a>
            <a href="/auth/logout">Sign out</a>
          </div>
        </div>`;
      document.addEventListener('click', e => {
        if (!e.target.closest('.user-menu')) {
          document.querySelectorAll('.user-dropdown').forEach(d => d.classList.remove('open'));
        }
      });
    } else {
      area.innerHTML = '<a href="/welcome" class="sign-in-btn">Sign in</a>';
    }
  } catch(e) { console.warn('Auth check failed'); }
}
initAuth();
</script>
<button class="fab" title="Upload Deck" onclick="document.getElementById('uploadModal').classList.add('open')"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span class="fab-label">Upload Deck</span></button>

<div class="modal-overlay" id="uploadModal">
  <div class="modal-content" style="max-width:560px;">
    <button class="modal-close" onclick="this.closest('.modal-overlay').classList.remove('open')">&times;</button>
    <div class="modal-title" style="font-family:var(--font-mono);font-size:0.85rem;font-weight:700;margin-bottom:16px;color:var(--text);">Upload a Presentation</div>

    <form id="uploadForm">
      <div class="drop-zone" id="dropZone">
        <div class="icon">📂</div>
        <div class="label">Drop your file here</div>
        <div class="hint">or click to browse &nbsp;·&nbsp; .html or .zip up to 50MB</div>
        <div class="file-name" id="fileName"></div>
        <input type="file" id="fileInput" accept=".html,.htm,.zip" hidden>
      </div>

      <div class="form-group">
        <label>Title *</label>
        <input type="text" id="title" placeholder="My Amazing Presentation" required>
      </div>
      <div class="form-group">
        <label>Author</label>
        <input type="text" id="author" placeholder="Your name or handle">
      </div>
      <div class="form-group">
        <label>Tags</label>
        <input type="text" id="tags" placeholder="design, tech, keynote (comma-separated)">
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="description" placeholder="What's this presentation about?"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>GitHub URL <span style="font-weight:400;color:var(--muted2)">(optional)</span></label>
          <input type="url" id="github_url" placeholder="https://github.com/you/project">
        </div>
        <div class="form-group">
          <label>Live Demo URL <span style="font-weight:400;color:var(--muted2)">(optional)</span></label>
          <input type="url" id="demo_url" placeholder="https://yourproject.app">
        </div>
      </div>

      <button type="submit" class="btn btn-primary" id="submitBtn" style="width:100%;justify-content:center;padding:14px;" disabled>
        Upload Deck
      </button>

      <div class="upload-progress" id="progress">
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
        <div class="progress-text" id="progressText">Uploading...</div>
      </div>
    </form>
  </div>
</div>

<script>
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const fileName = document.getElementById('fileName');
  const submitBtn = document.getElementById('submitBtn');
  let selectedFile = null;

  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files.length) setFile(e.dataTransfer.files[0]);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files.length) setFile(fileInput.files[0]);
  });

  function setFile(file) {
    const ext = file.name.split('.').pop().toLowerCase();
    if (!['html', 'htm', 'zip'].includes(ext)) { alert('Only .html, .htm, or .zip files accepted'); return; }
    selectedFile = file;
    fileName.textContent = '📄 ' + file.name + ' (' + (file.size / 1024).toFixed(0) + ' KB)';
    fileName.style.display = 'block';
    submitBtn.disabled = false;
    const titleInput = document.getElementById('title');
    if (!titleInput.value) {
      titleInput.value = file.name.replace(/\.(html|htm|zip)$/i, '').replace(/[-_]/g, ' ');
    }
  }

  document.getElementById('uploadForm').addEventListener('submit', async e => {
    e.preventDefault();
    if (!selectedFile) return;
    const title = document.getElementById('title').value.trim();
    if (!title) { alert('Title is required'); return; }
    submitBtn.disabled = true;
    submitBtn.textContent = 'Uploading...';
    const progress = document.getElementById('progress');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    progress.style.display = 'block';
    const formData = new FormData();
    formData.append('file', selectedFile);
    formData.append('title', title);
    formData.append('author', document.getElementById('author').value.trim());
    formData.append('tags', document.getElementById('tags').value.trim());
    formData.append('description', document.getElementById('description').value.trim());
    formData.append('github_url', document.getElementById('github_url').value.trim());
    formData.append('demo_url', document.getElementById('demo_url').value.trim());
    try {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', '/api/upload');
      xhr.upload.addEventListener('progress', e => {
        if (e.lengthComputable) {
          const pct = Math.round((e.loaded / e.total) * 100);
          progressFill.style.width = pct + '%';
          progressText.textContent = pct < 100 ? 'Uploading... ' + pct + '%' : 'Processing...';
        }
      });
      xhr.addEventListener('load', () => {
        if (xhr.status >= 200 && xhr.status < 300) {
          const data = JSON.parse(xhr.responseText);
          progressFill.style.width = '100%';
          progressText.textContent = 'Done! Redirecting...';
          setTimeout(() => { window.location.href = '/deck/' + data.id; }, 500);
        } else {
          const err = JSON.parse(xhr.responseText);
          alert(err.error || 'Upload failed');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Upload Deck';
          progress.style.display = 'none';
        }
      });
      xhr.addEventListener('error', () => {
        alert('Upload failed');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Upload Deck';
        progress.style.display = 'none';
      });
      xhr.send(formData);
    } catch (err) {
      alert(err.message);
      submitBtn.disabled = false;
      submitBtn.textContent = 'Upload Deck';
      progress.style.display = 'none';
    }
  });
</script>
</body>
</html>
