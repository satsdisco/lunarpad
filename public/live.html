<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LunarPad — Live</title>
<link rel="stylesheet" href="/css/style.css">
<style>
/* ── Live page full-screen overlay ── */
body { background: #080a14; overflow: hidden; }

.live-page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Top bar ── */
.live-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  background: rgba(13,15,26,0.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(124,92,252,0.15);
  position: relative;
  z-index: 10;
  flex-shrink: 0;
}
.live-logo {
  font-family: var(--font-mono);
  font-size: 1rem;
  font-weight: 800;
  color: var(--text);
  text-decoration: none;
}
.live-logo span { color: var(--accent); }
.live-indicator {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  font-weight: 700;
  color: #ff4d4d;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.live-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #ff4d4d;
  animation: live-pulse 1.5s ease infinite;
}
@keyframes live-pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.7); }
}
.live-event-name {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--muted);
  font-weight: 600;
}

/* ── Main content ── */
.live-content {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ── Deck frame ── */
.live-frame-wrap {
  flex: 1;
  position: relative;
  background: #000;
}
.live-frame {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}
.live-no-deck {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  color: var(--muted2);
}
.live-no-deck-icon {
  font-size: 4rem;
  opacity: 0.4;
  filter: drop-shadow(0 0 20px rgba(124,92,252,0.4));
}
.live-no-deck h2 {
  font-family: var(--font-mono);
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--muted);
}
.live-no-deck p {
  font-size: 0.85rem;
  color: var(--muted2);
}

/* ── Side panel ── */
.live-sidebar {
  width: 280px;
  flex-shrink: 0;
  background: rgba(13,15,26,0.92);
  border-left: 1px solid rgba(124,92,252,0.12);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.live-sidebar-head {
  padding: 16px;
  border-bottom: 1px solid rgba(124,92,252,0.1);
  font-family: var(--font-mono);
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--muted2);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.live-speaker-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.live-speaker-item {
  padding: 10px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.15s;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.live-speaker-item:hover {
  background: var(--accent-dim);
  border-color: var(--border);
}
.live-speaker-item.active {
  background: rgba(124,92,252,0.12);
  border-color: rgba(124,92,252,0.3);
}
.live-speaker-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--accent-dim);
  border: 1px solid var(--border2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--accent);
  flex-shrink: 0;
}
.live-speaker-info { flex: 1; min-width: 0; }
.live-speaker-name {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.live-speaker-project {
  font-size: 0.7rem;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.live-now-badge {
  font-family: var(--font-mono);
  font-size: 0.55rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: #ff4d4d;
  background: rgba(255,77,77,0.12);
  border: 1px solid rgba(255,77,77,0.3);
  border-radius: 100px;
  padding: 2px 6px;
  flex-shrink: 0;
}
.live-votes-badge {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--muted2);
  flex-shrink: 0;
}

/* ── Bottom info bar (current speaker) ── */
.live-info-bar {
  padding: 10px 20px;
  background: rgba(13,15,26,0.9);
  border-top: 1px solid rgba(124,92,252,0.12);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  gap: 16px;
}
.live-current-speaker {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.live-current-name {
  font-family: var(--font-mono);
  font-size: 0.9rem;
  font-weight: 800;
  color: var(--text);
}
.live-current-project {
  font-size: 0.75rem;
  color: var(--accent);
  font-weight: 600;
}
.live-vote-area {
  display: flex;
  align-items: center;
  gap: 10px;
}
.live-vote-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 20px;
  background: var(--accent);
  border: none;
  border-radius: 100px;
  color: #fff;
  font-family: var(--font-mono);
  font-size: 0.8rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
}
.live-vote-btn:hover { background: var(--accent-hover); transform: scale(1.04); }
.live-vote-btn.voted { background: rgba(124,92,252,0.2); color: var(--accent); border: 1px solid var(--accent); }
.live-vote-count {
  font-family: var(--font-mono);
  font-size: 1rem;
  font-weight: 800;
  color: var(--text);
}

/* ── Admin controls ── */
.live-admin-bar {
  display: none;
  padding: 8px 16px;
  background: rgba(124,92,252,0.06);
  border-top: 1px solid rgba(124,92,252,0.15);
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
  flex-shrink: 0;
}
.live-admin-bar.visible { display: flex; }
.live-admin-label {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-right: 4px;
}
.btn-live-admin {
  padding: 5px 14px;
  border-radius: 100px;
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--border2);
  background: var(--glass);
  color: var(--text);
  transition: all 0.15s;
  font-family: var(--font);
}
.btn-live-admin:hover { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.btn-live-admin.danger { border-color: rgba(255,77,77,0.3); color: #ff6b6b; }
.btn-live-admin.danger:hover { background: rgba(255,77,77,0.1); border-color: rgba(255,77,77,0.5); }
.btn-live-admin.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-live-admin.primary:hover { background: var(--accent-hover); }

/* ── Waiting screen ── */
.live-waiting {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  background: #080a14;
}
.live-waiting-logo {
  font-family: var(--font-mono);
  font-size: 2.5rem;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.03em;
}
.live-waiting-logo span { color: var(--accent); }
.live-waiting-sub {
  font-size: 0.9rem;
  color: var(--muted);
  text-align: center;
}
.live-waiting-dots span {
  animation: blink 1.4s infinite;
  opacity: 0;
}
.live-waiting-dots span:nth-child(2) { animation-delay: 0.2s; }
.live-waiting-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink {
  0%, 80%, 100% { opacity: 0; }
  40% { opacity: 1; }
}
.live-qr-area {
  text-align: center;
}
.live-qr-label {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--muted2);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 10px;
}
.live-qr-url {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--accent);
  background: var(--accent-dim);
  padding: 6px 16px;
  border-radius: 100px;
  border: 1px solid rgba(124,92,252,0.2);
}

/* ── Offline ── */
.live-offline {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  background: #080a14;
  color: var(--muted2);
}
.live-offline h2 {
  font-family: var(--font-mono);
  font-size: 1.4rem;
  color: var(--muted);
}

/* ── Responsive: hide sidebar on small screens ── */
@media (max-width: 860px) {
  .live-sidebar { display: none; }
}
</style>
</head>
<body>

<div class="live-page">
  <!-- Top bar -->
  <div class="live-bar">
    <a href="/" class="live-logo">Lunar<span>\Pad</span></a>
    <div class="live-indicator">
      <div class="live-dot" id="liveDot" style="background:#666"></div>
      <span id="liveStatus">Connecting...</span>
    </div>
    <div class="live-event-name" id="liveEventName">—</div>
  </div>

  <!-- Main content -->
  <div class="live-content">

    <!-- Deck iframe -->
    <div class="live-frame-wrap" id="frameWrap">

      <!-- Waiting for session -->
      <div class="live-waiting" id="waitingScreen">
        <div class="live-waiting-logo">Lunar<span>\Pad</span></div>
        <div class="live-waiting-sub">
          Waiting for the event to start
          <div class="live-waiting-dots"><span>.</span><span>.</span><span>.</span></div>
        </div>
        <div class="live-qr-area">
          <div class="live-qr-label">Join the audience</div>
          <div class="live-qr-url" id="joinUrl">—</div>
        </div>
      </div>

      <!-- Offline screen -->
      <div class="live-offline" id="offlineScreen" style="display:none">
        <div style="font-size:3rem">🌙</div>
        <h2>Event Ended</h2>
        <p>Thanks for being part of it!</p>
        <a href="/" class="btn btn-ghost" style="margin-top:8px">Back to LunarPad</a>
      </div>

      <!-- No deck selected -->
      <div class="live-no-deck" id="noDeckScreen" style="display:none">
        <div class="live-no-deck-icon">🎤</div>
        <h2 id="noDeckName">Up next...</h2>
        <p id="noDeckProject"></p>
      </div>

      <!-- The actual deck -->
      <iframe class="live-frame" id="liveFrame" src="" style="display:none"
        sandbox="allow-scripts allow-same-origin allow-popups"></iframe>

    </div>

    <!-- Speaker list sidebar -->
    <div class="live-sidebar">
      <div class="live-sidebar-head">Lineup</div>
      <div class="live-speaker-list" id="speakerList"></div>
    </div>

  </div>

  <!-- Current speaker info bar -->
  <div class="live-info-bar" id="infoBar" style="display:none">
    <div class="live-current-speaker">
      <div class="live-current-name" id="currentName">—</div>
      <div class="live-current-project" id="currentProject">—</div>
    </div>
    <div class="live-vote-area">
      <div class="live-vote-count">▲ <span id="voteCount">0</span></div>
      <button class="live-vote-btn" id="voteBtn" onclick="vote()">Vote</button>
    </div>
  </div>

  <!-- Admin controls -->
  <div class="live-admin-bar" id="adminBar">
    <span class="live-admin-label">Admin:</span>
    <button class="btn-live-admin primary" id="startBtn" onclick="startSession()" style="display:none">▶ Start Session</button>
    <button class="btn-live-admin danger" id="stopBtn" onclick="stopSession()" style="display:none">■ End Session</button>
    <span style="font-size:0.72rem;color:var(--muted);margin-left:4px" id="adminSpeakerHint">Click a speaker in the list to make them current</span>
  </div>
</div>

<script>
const pathParts = window.location.pathname.split('/').filter(Boolean);
const eventId = pathParts[1];
let pollInterval = null;
let currentSpeakerId = null;
let isAdmin = false;
let speakers = [];

function esc(s) { const d = document.createElement('div'); d.textContent = String(s ?? ''); return d.innerHTML; }

async function init() {
  // Check auth + admin
  try {
    const me = await fetch('/api/me').then(r => r.json());
    if (me.user?.is_admin) {
      isAdmin = true;
      document.getElementById('adminBar').classList.add('visible');
    }
  } catch {}

  // Set join URL
  document.getElementById('joinUrl').textContent = window.location.origin + '/live/' + eventId;

  // Start polling
  await poll();
  pollInterval = setInterval(poll, 3000);
}

async function poll() {
  try {
    const data = await fetch('/api/live/' + eventId).then(r => r.json());
    render(data);
  } catch {
    setStatus(false);
  }
}

function setStatus(active) {
  const dot = document.getElementById('liveDot');
  const status = document.getElementById('liveStatus');
  dot.style.background = active ? '#ff4d4d' : '#666';
  status.textContent = active ? 'LIVE' : 'Offline';
}

function render(data) {
  if (!data.active) {
    setStatus(false);
    // Show offline or waiting
    if (data.event) {
      document.getElementById('offlineScreen').style.display = 'flex';
    } else {
      document.getElementById('waitingScreen').style.display = 'flex';
    }
    document.getElementById('waitingScreen').style.display = data.event ? 'none' : 'flex';
    document.getElementById('offlineScreen').style.display = data.event ? 'flex' : 'none';
    document.getElementById('liveFrame').style.display = 'none';
    document.getElementById('noDeckScreen').style.display = 'none';
    document.getElementById('infoBar').style.display = 'none';

    if (isAdmin) {
      document.getElementById('startBtn').style.display = '';
      document.getElementById('stopBtn').style.display = 'none';
    }
    return;
  }

  setStatus(true);
  document.getElementById('liveEventName').textContent = data.event?.name || '—';

  // Admin controls
  if (isAdmin) {
    document.getElementById('startBtn').style.display = 'none';
    document.getElementById('stopBtn').style.display = '';
  }

  // Speaker list
  speakers = data.speakers || [];
  const listEl = document.getElementById('speakerList');
  listEl.innerHTML = speakers.map(s => {
    const initials = s.name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
    const isNow = data.speaker?.id === s.id;
    return `
      <div class="live-speaker-item${isNow ? ' active' : ''}" id="spk-${esc(s.id)}"
        onclick="${isAdmin ? `setSpeaker('${esc(s.id)}')` : ''}">
        <div class="live-speaker-avatar">${esc(initials)}</div>
        <div class="live-speaker-info">
          <div class="live-speaker-name">${esc(s.name)}</div>
          <div class="live-speaker-project">${esc(s.project_title || s.project || '')}</div>
        </div>
        ${isNow ? '<span class="live-now-badge">NOW</span>' : ''}
        <span class="live-votes-badge">▲${s.votes || 0}</span>
      </div>`;
  }).join('');

  // Current speaker
  const spk = data.speaker;
  if (spk) {
    // Show speaker info bar
    document.getElementById('infoBar').style.display = 'flex';
    document.getElementById('currentName').textContent = spk.name;
    document.getElementById('currentProject').textContent = spk.project_title || spk.project || '';

    // If speaker changed, update frame
    if (spk.id !== currentSpeakerId) {
      currentSpeakerId = spk.id;
      loadSpeakerDeck(spk);
      loadVotes(spk.id);
    }
  } else {
    // No current speaker — show waiting state
    document.getElementById('infoBar').style.display = 'none';
    document.getElementById('liveFrame').style.display = 'none';
    document.getElementById('noDeckScreen').style.display = 'none';
    document.getElementById('waitingScreen').style.display = 'flex';
    document.getElementById('offlineScreen').style.display = 'none';
    currentSpeakerId = null;
  }
}

function loadSpeakerDeck(spk) {
  const frame = document.getElementById('liveFrame');
  const noDeck = document.getElementById('noDeckScreen');
  const waiting = document.getElementById('waitingScreen');
  const offline = document.getElementById('offlineScreen');

  waiting.style.display = 'none';
  offline.style.display = 'none';

  if (spk.deck_id && spk.entry_point) {
    frame.src = `/presentations/${spk.deck_id}/${spk.entry_point}`;
    frame.style.display = 'block';
    noDeck.style.display = 'none';
  } else {
    frame.style.display = 'none';
    frame.src = '';
    document.getElementById('noDeckName').textContent = spk.name;
    document.getElementById('noDeckProject').textContent = spk.project_title || spk.project || '';
    noDeck.style.display = 'flex';
  }
}

async function loadVotes(speakerId) {
  try {
    const data = await fetch(`/api/vote/count?type=speaker&id=${speakerId}`).then(r => r.json());
    document.getElementById('voteCount').textContent = data.votes || 0;
    const btn = document.getElementById('voteBtn');
    btn.classList.toggle('voted', !!data.voted);
    btn.textContent = data.voted ? '✓ Voted' : 'Vote';
  } catch {}
}

async function vote() {
  if (!currentSpeakerId) return;
  const btn = document.getElementById('voteBtn');
  btn.disabled = true;
  try {
    const data = await fetch('/api/vote', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: 'speaker', id: currentSpeakerId }),
    }).then(r => r.json());
    document.getElementById('voteCount').textContent = data.votes || 0;
    btn.classList.toggle('voted', !!data.voted);
    btn.textContent = data.voted ? '✓ Voted' : 'Vote';
  } catch {}
  btn.disabled = false;
}

// Admin actions
async function startSession() {
  await fetch(`/api/live/${eventId}/start`, { method: 'POST' });
  await poll();
}

async function stopSession() {
  if (!confirm('End the live session?')) return;
  await fetch(`/api/live/${eventId}/stop`, { method: 'POST' });
  currentSpeakerId = null;
  await poll();
}

async function setSpeaker(speakerId) {
  if (!isAdmin) return;
  await fetch(`/api/live/${eventId}/speaker`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ speaker_id: speakerId }),
  });
  await poll();
}

init();
</script>
</body>
</html>
