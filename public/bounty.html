<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bounty — LunarPad</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="header">
  <a href="/" class="logo">Lunar <span class="logo-slash"> \ </span><span class="logo-accent">Pad</span></a>
  <nav class="nav-tabs">
    <a href="/" class="nav-tab active">Build in Public</a>
    <a href="/decks" class="nav-tab">Decks</a>
  </nav>
  <div class="header-actions" id="authArea">
    <div id="userArea"></div>
  </div>
</header>

<div class="bounty-page container" id="bountyPage">
  <a href="/build" class="bounty-back">← Back to Build in Public</a>
  <div id="bountyContent">
    <!-- Skeleton placeholder -->
    <div class="bounty-hero skeleton-card" id="bountyLoadingSkele">
      <div class="skeleton sk-line-lg sk-w-60" style="height:22px;margin-bottom:10px"></div>
      <div class="skeleton sk-line sk-w-40" style="height:36px;margin-bottom:16px"></div>
      <div class="skeleton sk-line sk-w-80" style="margin-bottom:8px"></div>
      <div class="skeleton sk-line sk-w-60"></div>
    </div>
  </div>
</div>

<!-- Payment Modal -->
<div class="modal-overlay" id="paymentModal">
  <div class="modal-content" style="max-width:440px;text-align:center">
    <button class="modal-close" onclick="closePaymentModal()">&times;</button>
    <div id="paymentModalBody"></div>
  </div>
</div>

<!-- Zap animation overlay -->
<div id="zapOverlay" class="zap-overlay">⚡</div>

<!-- Project Submit Modal -->
<div class="modal-overlay" id="projectModal">
  <div class="modal-content">
    <button class="modal-close" onclick="this.closest('.modal-overlay').classList.remove('open')">&times;</button>
    <div class="modal-title">Submit Your Solution</div>
    <div id="projBountyLabel" style="display:none;font-size:0.8rem;color:var(--btc-bright);margin-bottom:12px;padding:8px 12px;border:1px solid rgba(242,177,52,.2);border-radius:var(--radius);background:rgba(242,177,52,.05)"></div>
    <input type="hidden" id="projBountyId" value="">
    <div class="form-row">
      <div class="form-group">
        <label>Project Name</label>
        <input type="text" id="projName" placeholder="My cool project">
      </div>
      <div class="form-group">
        <label>Builder Name</label>
        <input type="text" id="projBuilder" placeholder="Your name" readonly style="opacity:0.7;cursor:default">
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="projDesc" placeholder="What are you building and why?"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Category</label>
        <select id="projCategory">
          <option value="">Select category...</option>
          <option value="tool">Tool</option>
          <option value="game">Game</option>
          <option value="fun">Fun / Creative</option>
          <option value="productivity">Productivity</option>
          <option value="finance">Finance</option>
          <option value="social">Social</option>
          <option value="privacy">Privacy</option>
          <option value="education">Education</option>
          <option value="infrastructure">Infrastructure</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="projStatus">
          <option value="idea">Idea</option>
          <option value="building" selected>Building</option>
          <option value="shipped">Shipped</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Tags (comma-separated)</label>
      <input type="text" id="projTags" placeholder="web, bitcoin, dashboard">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Repo URL (optional)</label>
        <input type="url" id="projRepo" placeholder="https://github.com/…">
      </div>
      <div class="form-group">
        <label>Demo URL (optional)</label>
        <input type="url" id="projDemo" placeholder="https://…">
      </div>
    </div>
    <div class="form-group">
      <label>Attach Presentation (optional)</label>
      <select id="projDeckId"><option value="">None</option></select>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="this.closest('.modal-overlay').classList.remove('open')">Cancel</button>
      <button class="btn btn-primary" onclick="submitProject()">Submit Solution</button>
    </div>
  </div>
</div>

<footer class="footer">LunarPad — Build. Ship. Earn sats.</footer>

<script>
'use strict';

function esc(s) {
  const d = document.createElement('div');
  d.textContent = String(s ?? '');
  return d.innerHTML;
}

function maskLn(addr) {
  if (!addr) return '';
  const [local, domain] = addr.split('@');
  if (!domain) return addr;
  const masked = local.length <= 2 ? local[0] + '***' : local[0] + '***' + local.slice(-1);
  return masked + '@' + domain;
}

function formatDeadline(deadline) {
  if (!deadline) return null;
  const d = new Date(deadline);
  const now = new Date();
  const diff = d - now;
  const overdue = diff < 0;
  const label = d.toLocaleDateString('en', { month: 'short', day: 'numeric', year: 'numeric' });
  if (overdue) return { label: 'Deadline passed: ' + label, overdue: true };
  const days = Math.ceil(diff / 86400000);
  if (days === 0) return { label: 'Due today', overdue: false };
  if (days === 1) return { label: '1 day left', overdue: false };
  return { label: days + ' days left · ' + label, overdue: false };
}

// ─── Timeline ─────────────────────────────────────────────────────────────

function renderTimeline(status, hasSubmissions) {
  // Steps: open → in_review (has submissions) → claimed → completed
  const steps = [
    { key: 'open',      label: 'Open' },
    { key: 'in_review', label: 'In Review' },
    { key: 'claimed',   label: 'Winner Selected' },
    { key: 'completed', label: 'Sats Paid ⚡' },
  ];

  // Map status to step index
  let currentIdx = 0;
  if (status === 'open' && hasSubmissions) currentIdx = 1;
  else if (status === 'claimed') currentIdx = 2;
  else if (status === 'completed') currentIdx = 3;
  else if (status === 'open') currentIdx = 0;

  return `<div class="bounty-timeline">` + steps.map((step, i) => {
    const isGold = i >= 2; // claimed/completed steps use gold
    let cls = '';
    if (i < currentIdx) {
      cls = isGold ? 'gold' : 'done';
    } else if (i === currentIdx) {
      cls = isGold ? 'gold-active' : 'active';
    }
    const checkmark = i < currentIdx ? '✓' : (i + 1);
    return `<div class="timeline-step ${cls}">
      <div class="timeline-dot">${checkmark}</div>
      <div class="timeline-label">${esc(step.label)}</div>
    </div>`;
  }).join('') + `</div>`;
}

// ─── Render Page ──────────────────────────────────────────────────────────

async function loadBounty() {
  const id = window.location.pathname.split('/').pop();
  if (!id) { document.getElementById('bountyContent').innerHTML = '<div class="error-state"><span>⚠️</span><p>Bounty not found.</p></div>'; return; }

  try {
    const [bRes, meRes, lnCfgRes] = await Promise.all([
      fetch('/api/bounties/' + id),
      fetch('/api/me'),
      fetch('/api/config/lightning'),
    ]);

    if (!bRes.ok) {
      document.getElementById('bountyContent').innerHTML = '<div class="error-state"><span>⚠️</span><p>Bounty not found.</p></div>';
      return;
    }

    const b = await bRes.json();
    const me = await meRes.json();
    const lnCfg = await lnCfgRes.json();

    // Fetch submissions, winner LN address, and payments in parallel
    const [projRes, winnerRes, paymentsRes] = await Promise.all([
      fetch('/api/projects?bounty_id=' + encodeURIComponent(id)),
      b.winner_id ? fetch('/api/bounties/' + id + '/winner').catch(() => null) : Promise.resolve(null),
      fetch('/api/bounties/' + id + '/payments').catch(() => null),
    ]);

    const submissions = projRes.ok ? await projRes.json() : [];
    const winnerData = winnerRes && winnerRes.ok ? await winnerRes.json() : null;
    const winnerLn = winnerData ? winnerData.lightning_address || null : null;
    const payments = paymentsRes && paymentsRes.ok ? await paymentsRes.json() : [];
    const confirmedPayments = payments.filter(p => p.payment_type === 'fund' && p.status === 'confirmed');

    const tags = typeof b.tags === 'string' ? b.tags.split(',').map(t => t.trim()).filter(Boolean) : [];
    const participants = b.participants || [];
    const alreadyJoined = me.user && participants.some(p => p.user_name === me.user.name || p.user_id === me.user.id);
    const isAdmin = !!(me.user && me.user.is_admin);
    const isWinner = me.user && b.winner_id && b.winner_id === me.user.id;
    const hasSubmitted = me.user && submissions.some(p => p.user_id === me.user.id);

    // Update page title
    document.title = esc(b.title) + ' — LunarPad';

    // Status label
    const statusLabels = { open: 'Open', claimed: 'Winner Selected', completed: 'Completed' };
    const statusLabel = statusLabels[b.status] || b.status;
    const statusClass = b.status;

    // Deadline
    const dl = b.deadline ? formatDeadline(b.deadline) : null;

    // Tags HTML
    const tagsHtml = tags.length
      ? `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px">${tags.map(t => `<span class="card-tag">${esc(t)}</span>`).join('')}</div>`
      : '';

    // Timeline
    const timeline = renderTimeline(b.status, submissions.length > 0);

    // Participants section
    const participantsHtml = participants.length
      ? participants.map(p => {
          const isWinnerChip = b.winner_id && p.user_id === b.winner_id;
          const pName = p.user_id ? `<a href="/profile/${esc(p.user_id)}" class="profile-link" onclick="event.stopPropagation()">${esc(p.user_name)}</a>` : esc(p.user_name);
          return `<span class="participant-chip ${isWinnerChip ? 'winner-chip' : ''}">${isWinnerChip ? '🏆 ' : ''}${pName}</span>`;
        }).join('')
      : `<span style="font-size:0.82rem;color:var(--muted2)">No one in the hunt yet — be first!</span>`;

    // Submissions section
    const submissionsHtml = submissions.length
      ? `<div class="submission-grid">${submissions.map(p => `
          <a href="/project/${esc(p.id)}" class="submission-card">
            <div class="submission-card-name">${esc(p.name)}</div>
            <div class="submission-card-builder">by ${esc(p.builder)}</div>
            <span class="submission-card-status">${esc(p.status || 'building')}</span>
          </a>`).join('')}</div>`
      : `<div style="font-size:0.82rem;color:var(--muted2);padding:8px 0">No submissions yet</div>`;

    // Winner section (shown when bounty is claimed/completed)
    let winnerSection = '';
    if (b.winner_name && (b.status === 'claimed' || b.status === 'completed')) {
      const winnerProject = submissions.find(p => p.user_id === b.winner_id);
      const paidBadge = b.paid_out
        ? `<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;background:rgba(60,203,218,.1);border:1px solid rgba(60,203,218,.3);border-radius:100px;font-size:0.75rem;font-weight:700;color:var(--cyan);margin-left:10px">⚡ Paid</span>`
        : `<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;background:rgba(242,177,52,.08);border:1px solid rgba(242,177,52,.2);border-radius:100px;font-size:0.75rem;font-weight:700;color:var(--btc-bright);margin-left:10px">⏳ Awaiting payment</span>`;
      winnerSection = `
        <div class="winner-card">
          <div class="winner-card-header">🏆 Winner: ${b.winner_id ? `<a href="/profile/${esc(b.winner_id)}" class="profile-link">${esc(b.winner_name)}</a>` : esc(b.winner_name)} ${paidBadge}</div>
          ${winnerLn ? `<div style="font-size:0.82rem;color:var(--text2);margin-bottom:8px">Lightning address: <span style="font-family:var(--font-mono);color:var(--btc-bright)">${esc(maskLn(winnerLn))}</span></div>` : ''}
          ${winnerProject ? `<div style="font-size:0.82rem;color:var(--text2)">Winning project: <a href="/project/${esc(winnerProject.id)}" style="color:var(--accent)">${esc(winnerProject.name)}</a></div>` : ''}
        </div>`;
    }

    // Claim section — only for the winner
    let claimSection = '';
    if (isWinner && (b.status === 'claimed' || b.status === 'completed')) {
      const adminLn = lnCfg.admin_ln_address || 'lunarpad@21m.lol';
      const myLn = winnerLn;
      const paymentStatus = b.paid_out
        ? `<div style="display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(60,203,218,.08);border:1px solid rgba(60,203,218,.2);border-radius:var(--radius);font-size:0.88rem;font-weight:700;color:var(--cyan)">
            ✅ Paid! Your sats have been sent.
           </div>`
        : `<div style="display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(242,177,52,.06);border:1px solid rgba(242,177,52,.15);border-radius:var(--radius);font-size:0.85rem;color:var(--btc-bright)">
            <span class="pulse-dot"></span> Awaiting payment from admin…
           </div>`;

      claimSection = `
        <div class="claim-card">
          <div class="claim-card-title">🏆 You won this bounty!</div>
          <div class="claim-card-amount">⚡ ${totalPool.toLocaleString()} sats</div>
          ${myLn
            ? `<div class="claim-info-box">Your sats will be sent to: <span class="mono">${esc(myLn)}</span></div>`
            : `<div class="claim-info-box" style="color:var(--muted2)">You haven't set a Lightning address yet. <a href="/profile" style="color:var(--btc-bright)">Set one on your profile →</a></div>`
          }
          <div class="claim-info-box">
            Admin Lightning address:
            <span class="mono" id="adminLnText">${esc(adminLn)}</span>
            <button class="copy-btn" id="copyAdminLn" onclick="copyAdminLn()">Copy</button>
          </div>
          ${paymentStatus}
        </div>`;
    }

    // Admin controls
    let adminSection = '';
    if (isAdmin) {
      const participantOptions = participants.map(p =>
        `<option value="${esc(p.user_id || '')}|${esc(p.user_name)}">${esc(p.user_name)}</option>`
      ).join('');

      if (b.status === 'open' && participants.length) {
        adminSection += `
          <div class="admin-panel">
            <div class="admin-panel-label">Admin — Approve Winner</div>
            <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
              <select id="winnerSelect" style="flex:1;min-width:160px;font-size:0.82rem;padding:6px 10px;background:var(--glass);border:1px solid var(--border);border-radius:var(--radius);color:var(--text)">
                <option value="">Select participant…</option>${participantOptions}
              </select>
              <button class="btn btn-primary" style="font-size:0.8rem;padding:7px 16px" onclick="adminApproveWinner('${esc(b.id)}')">Approve Winner</button>
            </div>
          </div>`;
      }

      if (b.status === 'claimed' && !b.paid_out) {
        const payBtnLabel = winnerLn ? '⚡ Pay Winner via Lightning' : '⚡ Mark as Paid';
        const payBtnAction = winnerLn
          ? `openPayWinnerModal('${esc(b.id)}', ${Number(b.sats_amount || 0)})`
          : `adminMarkPaid('${esc(b.id)}')`;
        adminSection += `
          <div class="admin-panel">
            <div class="admin-panel-label">Admin — Pay Winner</div>
            ${winnerLn ? `<div style="font-size:0.78rem;color:var(--muted2);margin-bottom:8px">Winner's LN address: <span style="font-family:var(--font-mono);color:var(--btc-bright)">${esc(maskLn(winnerLn))}</span></div>` : `<div style="font-size:0.78rem;color:var(--muted2);margin-bottom:8px">Winner has no Lightning address — will just mark as paid</div>`}
            <button class="btn btn-primary" style="font-size:0.82rem;padding:8px 20px" onclick="${payBtnAction}">${payBtnLabel}</button>
          </div>`;
      }

      if (adminSection) {
        adminSection = `<div style="margin-bottom:24px">${adminSection}</div>`;
      }
    }

    // Action buttons
    let actionsHtml = '';
    const addSatsBtn = me.user && b.status === 'open'
      ? `<button class="btn btn-zap" onclick="openFundModal('${esc(b.id)}')" title="Add sats to the prize pool — crowdfund this bounty!">⚡ Add to Prize Pool</button>`
      : '';
    if (b.status === 'open') {
      if (!me.user) {
        actionsHtml = `<a href="/auth/google" class="btn btn-primary" style="padding:10px 24px;font-size:0.88rem">Sign in to Join</a>`;
      } else if (!alreadyJoined) {
        actionsHtml = `<button class="btn btn-primary btn-join-hunt" style="padding:10px 24px;font-size:0.88rem" onclick="joinBounty('${esc(b.id)}')"><span class="bolt-icon">⚡</span> Join the Hunt</button>${addSatsBtn}`;
      } else {
        actionsHtml = `
          <span style="font-size:0.85rem;color:var(--cyan);font-weight:600">✓ You're in the hunt!</span>
          ${!hasSubmitted ? `<button class="btn btn-primary" style="margin-left:10px;padding:10px 24px;font-size:0.88rem" onclick="openSubmitModal('${esc(b.id)}','${esc(b.title)}')">Submit Solution</button>` : '<span style="font-size:0.82rem;color:var(--muted);margin-left:10px">✓ Solution submitted</span>'}
          <button class="btn btn-danger" style="margin-left:8px" onclick="leaveBounty('${esc(b.id)}')">Leave</button>
          ${addSatsBtn}`;
      }
    }

    // Prize pool = base bounty + crowd contributions
    const baseSats = Number(b.sats_amount || 0);
    const crowdSats = Number(b.funded_amount || 0);
    const totalPool = baseSats + crowdSats;
    const usdApprox = (totalPool / 100000000 * 100000).toFixed(2);
    const usdHtml = `<div class="bounty-hero-usd">approx USD ${usdApprox}</div>`;

    // Prize pool breakdown (show if crowd has contributed)
    let fundingProgressHtml = '';
    if (crowdSats > 0) {
      const funderCount = confirmedPayments.length;
      fundingProgressHtml = `
        <div class="prize-pool-breakdown">
          <span class="pool-base">🏦 ${baseSats.toLocaleString()} base bounty</span>
          <span class="pool-sep">+</span>
          <span class="pool-crowd">⚡ ${crowdSats.toLocaleString()} from ${funderCount} contributor${funderCount !== 1 ? 's' : ''}</span>
        </div>`;
    }

    // Recent funders
    let fundersHtml = '';
    if (confirmedPayments.length > 0) {
      fundersHtml = `
        <div style="margin-bottom:24px">
          <div class="bounty-section-label"># Recent Contributors</div>
          <div class="contributors-list">
            ${confirmedPayments.slice(0, 8).map(p => `
              <div class="contributor-chip">
                <span class="contributor-name">${(p.user_id && p.user_name) ? `<a href="/profile/${esc(p.user_id)}" class="profile-link">${esc(p.user_name)}</a>` : esc(p.user_name || 'Anonymous')}</span>
                <span class="contributor-amount">⚡ ${Number(p.amount_sats).toLocaleString()}</span>
              </div>`).join('')}
          </div>
        </div>`;
    }

    // Days since created
    const createdAt = new Date(b.created_at);
    const daysSince = Math.floor((Date.now() - createdAt) / 86400000);
    const daysSinceLabel = daysSince === 0 ? 'today' : daysSince === 1 ? '1 day ago' : daysSince + ' days ago';

    // Build full page
    document.getElementById('bountyContent').innerHTML = `
      ${timeline}

      <div class="bounty-hero">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:10px">
          <div style="display:flex;align-items:flex-start;gap:10px;flex:1;min-width:0">
            <h1 class="bounty-hero-title" style="flex:1;min-width:0">${esc(b.title)}</h1>
            <button class="bounty-share-btn" id="shareBountyBtn" onclick="shareBounty()" title="Copy link">
              &#x1F517; Share
            </button>
          </div>
          <span class="bounty-status ${statusClass}" style="flex-shrink:0;margin-top:4px">${statusLabel}</span>
        </div>
        <div class="bounty-hero-sats">⚡ ${totalPool.toLocaleString()} sats</div>
        ${usdHtml}
        ${fundingProgressHtml}
        <div class="bounty-hero-meta">
          ${dl ? `<span class="deadline-chip ${dl.overdue ? 'overdue' : ''}">⏰ ${esc(dl.label)}</span>` : ''}
          <span style="font-size:0.75rem;color:var(--muted2)">Posted ${esc(new Date(b.created_at).toLocaleDateString('en', {month:'short',day:'numeric',year:'numeric'}))}</span>
        </div>
      </div>

      ${tagsHtml}

      <div style="margin-bottom:24px">
        <div class="bounty-section-label"># About this bounty</div>
        <div class="bounty-desc-block status-${esc(b.status)}">${esc(b.description || 'No description provided.')}</div>
      </div>

      ${fundersHtml}
      ${winnerSection}
      ${claimSection}
      ${isAdmin ? adminSection : ''}

      <div style="margin-bottom:24px">
        <div class="bounty-section-label"># Participants (${participants.length})</div>
        <div class="bounty-participants">${participantsHtml}</div>
        ${actionsHtml ? `<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:12px">${actionsHtml}</div>` : ''}
      </div>

      <div>
        <div class="bounty-section-label"># Submissions (${submissions.length})</div>
        ${submissionsHtml}
      </div>

      <div class="bounty-stat-bar">
        <div class="bounty-stat-item">👥 <span class="bounty-stat-value">${participants.length}</span> participant${participants.length !== 1 ? 's' : ''}</div>
        <div class="bounty-stat-item">📦 <span class="bounty-stat-value">${submissions.length}</span> submission${submissions.length !== 1 ? 's' : ''}</div>
        <div class="bounty-stat-item">📅 Created <span class="bounty-stat-value">${daysSinceLabel}</span></div>
      </div>
    `;

    // Store admin LN for copy button
    window._adminLn = lnCfg.admin_ln_address || 'lunarpad@21m.lol';

  } catch (e) {
    console.error('Failed to load bounty:', e);
    document.getElementById('bountyContent').innerHTML = '<div class="error-state"><span>⚠️</span><p>Failed to load bounty.</p><button onclick="loadBounty()">Retry</button></div>';
  }
}

function shareBounty() {
  const url = window.location.href;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('shareBountyBtn');
    if (btn) { btn.textContent = '✓ Copied!'; btn.classList.add('copied'); setTimeout(() => { btn.innerHTML = '&#x1F517; Share'; btn.classList.remove('copied'); }, 2000); }
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = url; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
  });
}

function copyAdminLn() {
  const text = window._adminLn || document.getElementById('adminLnText')?.textContent || '';
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyAdminLn');
    if (btn) { btn.textContent = 'Copied!'; btn.classList.add('copied'); setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000); }
  }).catch(() => {
    const el = document.getElementById('adminLnText');
    if (el) { const r = document.createRange(); r.selectNode(el); window.getSelection().removeAllRanges(); window.getSelection().addRange(r); }
  });
}

async function joinBounty(id) {
  try {
    const res = await fetch('/api/bounties/' + id + '/join', { method: 'POST', headers: {'Content-Type':'application/json'}, body: '{}' });
    if (res.ok) loadBounty();
    else { const d = await res.json(); alert(d.error || 'Could not join'); }
  } catch { alert('Failed to join bounty'); }
}

async function leaveBounty(id) {
  try {
    const res = await fetch('/api/bounties/' + id + '/leave', { method: 'DELETE' });
    if (res.ok) loadBounty();
  } catch { alert('Failed to leave bounty'); }
}

function openSubmitModal(bountyId, bountyTitle) {
  document.getElementById('projBountyId').value = bountyId;
  document.getElementById('projBountyLabel').textContent = 'Submitting for bounty: ' + bountyTitle;
  document.getElementById('projBountyLabel').style.display = 'block';
  document.getElementById('projectModal').classList.add('open');
}

async function submitProject() {
  const name = document.getElementById('projName').value.trim();
  const builder = document.getElementById('projBuilder').value.trim();
  const description = document.getElementById('projDesc').value.trim();
  const status = document.getElementById('projStatus').value;
  const category = document.getElementById('projCategory').value;
  const tags = document.getElementById('projTags').value.trim();
  const repo_url = document.getElementById('projRepo').value.trim() || null;
  const demo_url = document.getElementById('projDemo').value.trim() || null;
  const deck_id = document.getElementById('projDeckId').value || null;
  const bounty_id = document.getElementById('projBountyId').value || null;
  if (!name) return alert('Project name is required');
  if (!builder) return alert('Builder name is required');
  try {
    const r = await fetch('/api/projects', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ name, builder, description, status, category, tags, repo_url, demo_url, deck_id, bounty_id }),
    });
    if (!r.ok) { const e = await r.json().catch(()=>({})); alert(e.error || 'Submission failed'); return; }
    ['projName','projBuilder','projDesc','projTags','projRepo','projDemo'].forEach(id => { document.getElementById(id).value = ''; });
    document.getElementById('projStatus').value = 'building';
    document.getElementById('projCategory').value = '';
    document.getElementById('projBountyId').value = '';
    document.getElementById('projBountyLabel').style.display = 'none';
    document.getElementById('projectModal').classList.remove('open');
    loadBounty();
  } catch { alert('Submission failed — please try again.'); }
}

async function adminApproveWinner(bountyId) {
  const sel = document.getElementById('winnerSelect');
  if (!sel || !sel.value) return alert('Please select a participant');
  const [winnerId, winnerName] = sel.value.split('|');
  if (!winnerId || !winnerName) return alert('Invalid selection');
  try {
    const r = await fetch('/api/bounties/' + bountyId + '/approve-winner', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ winner_id: winnerId, winner_name: winnerName }),
    });
    if (r.ok) loadBounty();
    else { const e = await r.json(); alert(e.error || 'Failed'); }
  } catch { alert('Failed to approve winner'); }
}

async function adminMarkPaid(bountyId) {
  try {
    const r = await fetch('/api/bounties/' + bountyId + '/mark-paid', { method: 'POST' });
    if (r.ok) loadBounty();
    else { const e = await r.json(); alert(e.error || 'Failed'); }
  } catch { alert('Failed to mark as paid'); }
}

// Load presentation decks into dropdown
async function loadDecksDropdown() {
  try {
    const r = await fetch('/api/decks?limit=48');
    const data = await r.json();
    const sel = document.getElementById('projDeckId');
    if (!sel) return;
    (data.decks || []).forEach(d => {
      const o = document.createElement('option');
      o.value = d.id; o.textContent = d.title;
      sel.appendChild(o);
    });
  } catch {}
}

document.addEventListener('DOMContentLoaded', () => {
  loadBounty();
  loadDecksDropdown();
});

// ─── Payment Modal ─────────────────────────────────────────────────────────

let _pollInterval = null;
let _pollTimeout = null;
let _currentBountyId = null;

function closePaymentModal() {
  document.getElementById('paymentModal').classList.remove('open');
  if (_pollInterval) { clearInterval(_pollInterval); _pollInterval = null; }
  if (_pollTimeout) { clearTimeout(_pollTimeout); _pollTimeout = null; }
}

function showZap() {
  const el = document.getElementById('zapOverlay');
  el.classList.add('active');
  setTimeout(() => el.classList.remove('active'), 1600);
}

// ─── Fund Modal ────────────────────────────────────────────────────────────

function openFundModal(bountyId) {
  _currentBountyId = bountyId;
  document.getElementById('paymentModalBody').innerHTML = renderAmountSelector(bountyId);
  document.getElementById('paymentModal').classList.add('open');
}

function renderAmountSelector(bountyId) {
  return `
    <div style="margin-bottom:18px">
      <div style="font-size:1rem;font-weight:800;color:var(--btc-bright);margin-bottom:4px">⚡ Add to Prize Pool</div>
      <div style="font-size:0.78rem;color:var(--muted2)">Add sats to the prize pool</div>
    </div>
    <div class="sats-preset-row">
      ${[1000,5000,10000,21000,50000,100000].map(v =>
        `<button class="sats-preset-btn" onclick="setFundAmount(${v})">${v >= 1000 ? (v/1000)+'k' : v}</button>`
      ).join('')}
    </div>
    <div style="margin:12px 0 18px">
      <input type="number" id="fundAmountInput" placeholder="Custom amount in sats" min="1"
        style="width:100%;padding:10px 14px;background:transparent;border:1px solid var(--border);color:var(--text);font-size:0.9rem;outline:none;font-family:var(--font);border-radius:var(--radius);text-align:center">
    </div>
    <button class="btn btn-primary" style="width:100%;padding:12px;font-size:0.88rem" onclick="generateFundInvoice('${esc(bountyId)}')">Generate Invoice</button>
    <div id="fundError" style="margin-top:10px;font-size:0.78rem;color:#e05a5a;display:none"></div>`;
}

function setFundAmount(v) {
  document.getElementById('fundAmountInput').value = v;
  document.querySelectorAll('.sats-preset-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

async function generateFundInvoice(bountyId) {
  const amount = parseInt(document.getElementById('fundAmountInput').value);
  const errEl = document.getElementById('fundError');
  if (!amount || amount < 1) { errEl.textContent = 'Enter a valid amount'; errEl.style.display = 'block'; return; }
  errEl.style.display = 'none';
  document.getElementById('paymentModalBody').innerHTML = `<div style="padding:40px 0;color:var(--muted2);font-size:0.85rem">Generating invoice…</div>`;
  try {
    const r = await fetch('/api/bounties/' + bountyId + '/fund', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ amount_sats: amount }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Failed to generate invoice');
    showQrModal(data, amount, bountyId, 'fund');
  } catch (e) {
    document.getElementById('paymentModalBody').innerHTML = `
      <div style="padding:20px 0">
        <div style="color:#e05a5a;margin-bottom:16px;font-size:0.85rem">⚠️ ${esc(e.message)}</div>
        <button class="btn" onclick="openFundModal('${esc(bountyId)}')">← Try Again</button>
      </div>`;
  }
}

// ─── QR Display ────────────────────────────────────────────────────────────

function showQrModal(invoiceData, amount, bountyId, type) {
  const { payment_id, payment_request, qr_data_url } = invoiceData;
  document.getElementById('paymentModalBody').innerHTML = `
    <div style="margin-bottom:12px">
      <div style="font-size:0.95rem;font-weight:800;color:var(--btc-bright)">⚡ ${Number(amount).toLocaleString()} sats</div>
      <div style="font-size:0.75rem;color:var(--muted2);margin-top:2px">${type === 'fund' ? 'Scan to fund this bounty' : 'Scan to pay winner'}</div>
    </div>
    <div class="qr-container">
      <img src="${qr_data_url}" alt="Lightning QR" style="width:260px;height:260px;border-radius:8px;display:block;margin:0 auto">
    </div>
    <div style="margin:14px 0 8px">
      <div style="font-family:var(--font-mono);font-size:0.62rem;color:var(--muted2);word-break:break-all;background:var(--surface);padding:8px 10px;border-radius:var(--radius);border:1px solid var(--border);text-align:left;max-height:56px;overflow:hidden">${esc(payment_request)}</div>
      <button class="btn btn-sm" style="margin-top:6px;width:100%" onclick="copyInvoice('${esc(payment_request)}', this)">Copy Invoice</button>
    </div>
    <div id="paymentStatus" class="payment-waiting">
      <span class="waiting-dots">Waiting for payment<span class="dot-anim">...</span></span>
    </div>
    <button class="btn btn-primary" style="margin-top:10px;width:100%;display:none" id="confirmPaymentBtn" onclick="manualConfirm('${esc(payment_id)}','${esc(bountyId)}','${esc(type)}')">✅ I've Paid — Confirm</button>`;
  startPolling(payment_id, bountyId, type);
}

function copyInvoice(invoice, btn) {
  navigator.clipboard.writeText(invoice).then(() => {
    btn.textContent = '✓ Copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy Invoice'; btn.classList.remove('copied'); }, 2000);
  }).catch(() => {});
}

async function manualConfirm(paymentId, bountyId, type) {
  const btn = document.getElementById('confirmPaymentBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Confirming…'; }
  try {
    const r = await fetch('/api/lightning/confirm/' + paymentId, { method: 'POST' });
    const data = await r.json();
    if (data.settled) {
      const el = document.getElementById('paymentStatus');
      if (el) el.innerHTML = '<div class="payment-confirmed">⚡ Payment confirmed!</div>';
      if (btn) btn.style.display = 'none';
      showZap();
      setTimeout(() => { closePaymentModal(); loadBounty(); }, 2800);
    } else {
      if (btn) { btn.disabled = false; btn.textContent = '✅ I\'ve Paid — Confirm'; }
      alert('Could not confirm — try again');
    }
  } catch {
    if (btn) { btn.disabled = false; btn.textContent = '✅ I\'ve Paid — Confirm'; }
    alert('Confirmation failed');
  }
}

// ─── Poll for payment ──────────────────────────────────────────────────────

function startPolling(paymentId, bountyId, type) {
  if (_pollInterval) clearInterval(_pollInterval);
  if (_pollTimeout) clearTimeout(_pollTimeout);
  const TIMEOUT_MS = 5 * 60 * 1000; // 5 min
  _pollTimeout = setTimeout(() => {
    clearInterval(_pollInterval);
    const el = document.getElementById('paymentStatus');
    if (el) el.innerHTML = '<span style="color:var(--muted2);font-size:0.78rem">Payment not detected — it may still arrive later.</span>';
  }, TIMEOUT_MS);

  _pollInterval = setInterval(async () => {
    try {
      const r = await fetch('/api/lightning/verify/' + paymentId);
      const data = await r.json();
      if (data.settled) {
        clearInterval(_pollInterval); clearTimeout(_pollTimeout);
        const el = document.getElementById('paymentStatus');
        if (el) el.innerHTML = '<div class="payment-confirmed">⚡ Payment received!</div>';
        showZap();
        setTimeout(() => {
          closePaymentModal();
          loadBounty();
        }, 2800);
      } else if (data.no_verify) {
        // No verify URL — show manual confirm button after first poll
        clearInterval(_pollInterval); clearTimeout(_pollTimeout);
        const el = document.getElementById('paymentStatus');
        if (el) el.innerHTML = '<span style="font-size:0.78rem;color:var(--muted2)">Auto-verification not available for this address.<br>Click below after you\'ve paid.</span>';
        const btn = document.getElementById('confirmPaymentBtn');
        if (btn) btn.style.display = '';
      }
    } catch {}
  }, 3000);
}

// ─── Admin: Pay Winner ─────────────────────────────────────────────────────

async function openPayWinnerModal(bountyId, satsAmount) {
  _currentBountyId = bountyId;
  document.getElementById('paymentModalBody').innerHTML = `<div style="padding:40px 0;color:var(--muted2);font-size:0.85rem">Generating payout invoice…</div>`;
  document.getElementById('paymentModal').classList.add('open');
  try {
    const r = await fetch('/api/bounties/' + bountyId + '/pay-winner', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ amount_sats: satsAmount }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Failed to generate payout invoice');
    showQrModal(data, satsAmount, bountyId, 'payout');
  } catch (e) {
    document.getElementById('paymentModalBody').innerHTML = `
      <div style="padding:20px 0">
        <div style="font-size:0.95rem;font-weight:700;color:var(--btc-bright);margin-bottom:10px">Pay Winner</div>
        <div style="color:#e05a5a;margin-bottom:16px;font-size:0.85rem">⚠️ ${esc(e.message)}</div>
        <button class="btn" onclick="closePaymentModal()">Close</button>
      </div>`;
  }
}
</script>

<script>
async function initAuth() {
  try {
    const res = await fetch('/api/me');
    const data = await res.json();
    const area = document.getElementById('userArea');
    if (!area) return;
    if (data.user) {
      const bi = document.getElementById('projBuilder');
      if (bi && !bi.value) bi.value = data.user.name || data.user.email || '';
      area.innerHTML = `
        <div class="user-menu">
          <div class="user-pill" onclick="this.parentElement.querySelector('.user-dropdown').classList.toggle('open')">
            <img src="${data.user.avatar || ''}" alt="" onerror="this.style.display='none'">
            <span>${data.user.name || data.user.email}</span>
          </div>
          <div class="user-dropdown">
            <a href="/profile">My Profile</a>
            <a href="/auth/logout">Sign out</a>
          </div>
        </div>`;
      document.addEventListener('click', e => {
        if (!e.target.closest('.user-menu')) {
          document.querySelectorAll('.user-dropdown').forEach(d => d.classList.remove('open'));
        }
      });
    } else {
      area.innerHTML = '<a href="/welcome" class="sign-in-btn">Sign in</a>';
    }
  } catch(e) { console.warn('Auth check failed'); }
}
initAuth();
</script>
