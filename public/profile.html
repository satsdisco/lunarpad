<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile — LunarPad</title>
<link rel="stylesheet" href="/css/style.css">
<link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.css'>
<script src='https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.js'></script>
<style>
.cropper-modal { background: rgba(0,0,0,0.7) !important; }
.cropper-view-box { outline: 2px solid var(--accent) !important; outline-color: rgba(124,92,252,0.75) !important; }
.cropper-line { background-color: var(--accent) !important; }
.cropper-point { background-color: var(--accent) !important; width: 8px !important; height: 8px !important; }
.cropper-dashed { border-color: rgba(255,255,255,0.2) !important; }
</style>
</head>
<body>

<header class="header">
  <a href="/" class="logo">Lunar<span class="logo-slash">\</span><span class="logo-accent">Pad</span></a>
  <nav class="nav-tabs">
    <a href="/" class="nav-tab">Build in Public</a>
    <a href="/decks" class="nav-tab">Decks</a>
  </nav>
  <div class="header-actions" id="authArea">
    <div id="userArea"></div>
  </div>
</header>

<div class="container" style="padding:24px 2rem 64px">
  <a href="javascript:history.back()" class="viewer-back">Back</a>
  <div id="profileContent">
    <div id="profileLoadingSkele">
      <div class="profile-header skeleton-card" style="margin-bottom:16px">
        <div style="display:flex;align-items:center;gap:16px;padding:8px">
          <div class="skeleton sk-circle" style="width:72px;height:72px;flex-shrink:0"></div>
          <div style="flex:1">
            <div class="skeleton sk-line sk-w-60" style="height:18px;margin-bottom:8px"></div>
            <div class="skeleton sk-line sk-w-40" style="height:12px;margin-bottom:6px"></div>
            <div class="skeleton sk-line sk-w-80" style="height:10px"></div>
          </div>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:16px">
        <div class="skeleton" style="height:56px;flex:1;border-radius:var(--radius)"></div>
        <div class="skeleton" style="height:56px;flex:1;border-radius:var(--radius)"></div>
        <div class="skeleton" style="height:56px;flex:1;border-radius:var(--radius)"></div>
        <div class="skeleton" style="height:56px;flex:1;border-radius:var(--radius)"></div>
      </div>
      <div class="skeleton-card">
        <div class="skeleton sk-line sk-w-40" style="height:14px;margin-bottom:12px"></div>
        <div style="display:flex;flex-wrap:wrap;gap:8px">
          <div class="skeleton" style="width:80px;height:28px;border-radius:100px"></div>
          <div class="skeleton" style="width:100px;height:28px;border-radius:100px"></div>
          <div class="skeleton" style="width:70px;height:28px;border-radius:100px"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<footer class="footer">LunarPad — Build. Ship. Earn sats.</footer>

<script>
function esc(s) { const d=document.createElement('div'); d.textContent=String(s??''); return d.innerHTML; }
function safeUrl(u) { try { const p = new URL(u).protocol; return (p==='http:'||p==='https:') ? u : ''; } catch { return ''; } }

const ALL_BADGES = [
  { id: 'first_build',   emoji: '🔨', name: 'First Build',        desc: 'Submitted your first project' },
  { id: 'first_sats',    emoji: '⚡', name: 'First Sats',         desc: 'Won your first bounty' },
  { id: 'demo_champ',    emoji: '🏆', name: 'Demo Day Champion',  desc: 'Won a demo day bounty' },
  { id: 'streak',        emoji: '🔥', name: 'On a Streak',        desc: 'Submitted projects in 2+ events' },
  { id: 'zap_master',    emoji: '⚡', name: 'Zap Master',         desc: 'Zapped 5+ projects' },
  { id: 'generous',      emoji: '💰', name: 'Big Spender',         desc: 'Added to 3+ bounty prize pools' },
  { id: 'popular',       emoji: '🌟', name: 'Popular Project',    desc: 'Received 10+ votes on a project' },
  { id: 'early_adopter', emoji: '🚀', name: 'Early Adopter',      desc: 'Joined in the first month' },
  { id: 'presenter',     emoji: '🎤', name: 'Presenter',          desc: 'Presented at a demo day' },
  { id: 'bounty_hunter', emoji: '🎯', name: 'Bounty Hunter',      desc: 'Completed 3+ bounties' },
];

const pathParts = window.location.pathname.split('/').filter(Boolean);
let profileId = pathParts.length > 1 ? pathParts[1] : null;

function showAchievementToast(badge) {
  const toast = document.createElement('div');
  toast.className = 'achievement-toast';
  toast.innerHTML = `<span class="achievement-toast-emoji">${badge.emoji}</span><div><div class="achievement-toast-title">Achievement Unlocked!</div><div class="achievement-toast-name">${esc(badge.name)}</div></div>`;
  document.body.appendChild(toast);
  requestAnimationFrame(() => toast.classList.add('achievement-toast-visible'));
  setTimeout(() => {
    toast.classList.remove('achievement-toast-visible');
    toast.addEventListener('transitionend', () => toast.remove(), { once: true });
  }, 5000);
}

function triggerAvatarUpload() {
  document.getElementById('avatarFileInput').click();
}

function handleAvatarUpload(input) {
  if (!input.files[0]) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    openCropModal(e.target.result, 'avatar');
  };
  reader.readAsDataURL(input.files[0]);
}

let _cropper = null;
let _cropTarget = null;

function openCropModal(imageSrc, target) {
  _cropTarget = target;
  const img = document.getElementById('cropImage');
  img.src = imageSrc;
  document.getElementById('cropModal').classList.add('open');
  if (_cropper) { _cropper.destroy(); _cropper = null; }
  img.onload = () => {
    _cropper = new Cropper(img, {
      aspectRatio: 1,
      viewMode: 1,
      dragMode: 'move',
      cropBoxResizable: true,
      cropBoxMovable: true,
      background: false,
      guides: false,
      center: true,
      highlight: false,
      autoCropArea: 0.8,
    });
  };
}

function closeCropModal() {
  document.getElementById('cropModal').classList.remove('open');
  if (_cropper) { _cropper.destroy(); _cropper = null; }
}

async function saveCrop() {
  if (!_cropper) return;
  const btn = document.getElementById('cropSaveBtn');
  btn.disabled = true; btn.textContent = 'Saving...';
  const canvas = _cropper.getCroppedCanvas({ width: 400, height: 400 });
  canvas.toBlob(async (blob) => {
    const fd = new FormData();
    fd.append('avatar', blob, 'avatar.jpg');
    try {
      const r = await fetch('/api/profile/avatar', { method: 'POST', body: fd });
      if (r.ok) {
        const data = await r.json();
        const ts = '?t=' + Date.now();
        const img = document.getElementById('profileAvatarImg');
        const placeholder = document.getElementById('profileAvatarPlaceholder');
        if (img) {
          img.src = data.avatar + ts;
        } else if (placeholder) {
          const newImg = document.createElement('img');
          newImg.id = 'profileAvatarImg';
          newImg.className = placeholder.className.replace('profile-avatar-placeholder', 'profile-avatar');
          newImg.src = data.avatar + ts;
          newImg.alt = '';
          newImg.style.cssText = 'width:80px;height:80px;border-radius:50%;object-fit:cover;';
          newImg.onerror = function() { this.style.display='none'; placeholder.style.display='flex'; };
          placeholder.parentNode.insertBefore(newImg, placeholder);
          placeholder.style.display = 'none';
        }
      } else { alert('Upload failed'); }
    } catch { alert('Upload failed'); }
    btn.disabled = false; btn.textContent = 'Save';
    closeCropModal();
  }, 'image/jpeg', 0.9);
}

function enterLnEditMode() {
  const display = document.getElementById('lnDisplay');
  const edit = document.getElementById('lnEdit');
  if (display) display.style.display = 'none';
  if (edit) { edit.style.display = ''; }
  const input = document.getElementById('lnInput');
  if (input) { input.focus(); input.select(); }
}

function cancelLnEdit() {
  const display = document.getElementById('lnDisplay');
  const edit = document.getElementById('lnEdit');
  if (display) display.style.display = '';
  if (edit) edit.style.display = 'none';
}

async function saveLightningAddress() {
  const val = document.getElementById('lnInput')?.value.trim() ?? '';
  try {
    const r = await fetch('/api/profile/lightning', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ lightning_address: val || null }),
    });
    if (r.ok) {
      const addressText = document.getElementById('lnAddressText');
      if (addressText) {
        addressText.textContent = val ? '⚡ ' + val : '⚡ No Lightning address set';
        addressText.className = val ? 'ln-display-value' : 'ln-display-empty';
      }
      cancelLnEdit();
      const check = document.getElementById('lnCheckmark');
      if (check) {
        check.style.display = '';
        setTimeout(() => { check.style.display = 'none'; }, 2000);
      }
    }
  } catch { alert('Failed to save Lightning address'); }
}

function enterBioEditMode() {
  const display = document.getElementById('bioDisplay');
  const edit = document.getElementById('bioEdit');
  if (display) display.style.display = 'none';
  if (edit) edit.style.display = '';
  const input = document.getElementById('bioInput');
  if (input) { input.focus(); input.setSelectionRange(input.value.length, input.value.length); }
}

function cancelBioEdit() {
  const display = document.getElementById('bioDisplay');
  const edit = document.getElementById('bioEdit');
  if (display) display.style.display = '';
  if (edit) edit.style.display = 'none';
  const input = document.getElementById('bioInput');
  if (input) input.value = (window.__profileData && window.__profileData.bio) || '';
}

async function saveBio() {
  const val = document.getElementById('bioInput')?.value.trim() ?? '';
  try {
    const d = window.__profileData || {};
    const r = await fetch('/api/profile', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ bio: val || null, website_url: d.website_url || null, github_url: d.github_url || null }),
    });
    if (r.ok) {
      if (window.__profileData) window.__profileData.bio = val || null;
      const bioText = document.getElementById('bioText');
      if (bioText) {
        bioText.textContent = val || 'Add a bio...';
        bioText.className = val ? 'bio-display-value' : 'bio-display-empty';
      }
      cancelBioEdit();
    }
  } catch { alert('Failed to save bio'); }
}

function enterLinksEditMode() {
  const display = document.getElementById('linksDisplay');
  const edit = document.getElementById('linksEdit');
  if (display) display.style.display = 'none';
  if (edit) edit.style.display = '';
  const input = document.getElementById('websiteInput');
  if (input) input.focus();
}

function cancelLinksEdit() {
  const display = document.getElementById('linksDisplay');
  const edit = document.getElementById('linksEdit');
  if (display) display.style.display = '';
  if (edit) edit.style.display = 'none';
  const d = window.__profileData || {};
  const wi = document.getElementById('websiteInput');
  const gi = document.getElementById('githubInput');
  if (wi) wi.value = d.website_url || '';
  if (gi) gi.value = d.github_url || '';
}

async function saveLinks() {
  const w = document.getElementById('websiteInput')?.value.trim() ?? '';
  const g = document.getElementById('githubInput')?.value.trim() ?? '';
  try {
    const d = window.__profileData || {};
    const r = await fetch('/api/profile', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ bio: d.bio || null, website_url: w || null, github_url: g || null }),
    });
    if (r.ok) {
      if (window.__profileData) { window.__profileData.website_url = w || null; window.__profileData.github_url = g || null; }
      const linksDisplayEl = document.getElementById('linksDisplay');
      if (linksDisplayEl) {
        const btn = linksDisplayEl.querySelector('.ln-edit-btn');
        linksDisplayEl.innerHTML = '';
        if (w) linksDisplayEl.insertAdjacentHTML('beforeend', `<a href="${esc(w)}" target="_blank" rel="noopener noreferrer" class="profile-link-chip">🌐 Website</a>`);
        if (g) linksDisplayEl.insertAdjacentHTML('beforeend', `<a href="${esc(g)}" target="_blank" rel="noopener noreferrer" class="profile-link-chip github-chip">GH GitHub</a>`);
        if (btn) linksDisplayEl.appendChild(btn);
      }
      cancelLinksEdit();
    }
  } catch { alert('Failed to save links'); }
}

async function loadProfile() {
  const content = document.getElementById('profileContent');

  const meRes = await fetch('/api/me');
  const me = await meRes.json();

  if (!profileId && me.user) profileId = me.user.id;
  if (!profileId) { content.innerHTML = '<div class="empty-state"><h3>Please sign in</h3></div>'; return; }

  const isOwn = me.user && me.user.id === profileId;

  try {
    const [userRes, decksRes, projRes, activityRes, chartRes] = await Promise.all([
      fetch('/api/users/' + profileId).then(r => r.json()),
      fetch('/api/users/' + profileId + '/decks').then(r => r.json()),
      fetch('/api/users/' + profileId + '/projects').then(r => r.json()),
      fetch('/api/users/' + profileId + '/activity').then(r => r.json()),
      fetch('/api/users/' + profileId + '/activity-chart').then(r => r.json()).catch(() => ({ days: [] })),
    ]);

    const user = userRes;
    if (user.error) { content.innerHTML = '<div class="empty-state"><h3>User not found</h3></div>'; return; }

    document.title = user.name + ' — LunarPad';
    const memberSince = new Date(user.created_at).toLocaleDateString('en', {month:'long', year:'numeric'});
    const earnedBadges = Array.isArray(user.badges) ? user.badges : [];
    window.__profileEarnedBadges = earnedBadges;
    window.__profileData = { bio: user.bio || null, website_url: user.website_url || null, github_url: user.github_url || null };

    // ── Stats bar ──
    const statsBar = `
      <div class="profile-stats-bar">
        <div class="profile-stat-item stat-sats">
          <div class="profile-stat-value gold stat-countup" data-target="${Number(user.total_sats_earned || 0)}">⚡ 0</div>
          <div class="profile-stat-label">Sats Earned</div>
        </div>
        <div class="profile-stat-item stat-bounties">
          <div class="profile-stat-value stat-countup" data-target="${user.bounties_won || 0}" data-prefix="🏆 ">🏆 0</div>
          <div class="profile-stat-label">Bounties Won</div>
        </div>
        <div class="profile-stat-item stat-projects">
          <div class="profile-stat-value stat-countup" data-target="${user.project_count || 0}" data-prefix="📦 ">📦 0</div>
          <div class="profile-stat-label">Projects</div>
        </div>
        <div class="profile-stat-item stat-decks">
          <div class="profile-stat-value stat-countup" data-target="${user.deck_count || 0}" data-prefix="🎭 ">🎭 0</div>
          <div class="profile-stat-label">Decks</div>
        </div>
        <div class="profile-stat-item stat-zaps">
          <div class="profile-stat-value orange stat-countup" data-target="${Number(user.total_zaps_sent || 0)}" data-prefix="🤙 ">🤙 0</div>
          <div class="profile-stat-label">Sats Zapped</div>
        </div>
      </div>`;

    // ── Activity chart ──
    const chartDays = (chartRes.days && chartRes.days.length) ? chartRes.days : [];
    const totalActivity = chartDays.reduce((s, d) => s + d.count, 0);
    const CELL = 13, GAP = 3, STEP = CELL + GAP;  // 16px step — premium cells
    const LEFT = 36, TOP = 20;                      // space for day/month labels
    const svgH = 7 * STEP + TOP + 4;
    const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const DAYS   = ['','Mon','','Wed','','Fri',''];

    // Build cells: pad front so first day aligns to correct weekday
    const firstDate = chartDays.length ? new Date(chartDays[0].date + 'T12:00:00Z') : new Date();
    const startDow  = firstDate.getUTCDay(); // 0=Sun
    const totalCells = startDow + chartDays.length;
    const numCols = Math.ceil(totalCells / 7);
    const svgW = numCols * STEP + LEFT;

    let cells = '';
    let monthLabels = '';
    let lastMonth = -1;
    for (let col = 0; col < numCols; col++) {
      for (let row = 0; row < 7; row++) {
        const idx = col * 7 + row - startDow;
        const x = col * STEP + LEFT;
        const y = row * STEP + TOP;
        if (idx < 0 || idx >= chartDays.length) {
          cells += `<rect class="ac-cell ac-cell-0" x="${x}" y="${y}" width="${CELL}" height="${CELL}" rx="2"/>`;
        } else {
          const d = chartDays[idx];
          const c = d.count === 0 ? 0 : d.count === 1 ? 1 : d.count <= 3 ? 2 : d.count <= 6 ? 3 : 4;
          cells += `<rect class="ac-cell ac-cell-${c}" x="${x}" y="${y}" width="${CELL}" height="${CELL}" rx="2" data-date="${d.date}" data-count="${d.count}"/>`;
          if (row === 0 && idx >= 0) {
            const month = new Date(d.date + 'T12:00:00Z').getUTCMonth();
            if (month !== lastMonth) {
              monthLabels += `<text class="ac-month-label" x="${x}" y="${TOP - 6}">${MONTHS[month]}</text>`;
              lastMonth = month;
            }
          }
        }
      }
    }

    let dayLabels = '';
    DAYS.forEach((label, i) => {
      if (label) dayLabels += `<text class="ac-day-label" x="2" y="${i * STEP + TOP + CELL - 1}">${label}</text>`;
    });

    const activityChart = `
      <div class="activity-chart-section">
        <div class="activity-chart-header">
          <span class="activity-chart-title">ACTIVITY</span>
          <span class="activity-chart-count">${totalActivity} contributions this year</span>
          <div class="ac-legend">
            <span class="ac-legend-label">Less</span>
            <span class="ac-legend-cell ac-legend-0"></span>
            <span class="ac-legend-cell ac-legend-1"></span>
            <span class="ac-legend-cell ac-legend-2"></span>
            <span class="ac-legend-cell ac-legend-3"></span>
            <span class="ac-legend-cell ac-legend-4"></span>
            <span class="ac-legend-label">More</span>
          </div>
        </div>
        <div class="activity-chart-wrap">
          <svg class="activity-chart-svg" width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}">
            ${monthLabels}
            ${dayLabels}
            ${cells}
          </svg>
        </div>
      </div>`;

    // ── Badges ──
    const earnedCount = ALL_BADGES.filter(b => earnedBadges.includes(b.id)).length;
    const badgesHtml = ALL_BADGES.map(b => {
      const earned = earnedBadges.includes(b.id);
      if (earned) {
        return `
          <div class="badge-card badge-earned" title="${esc(b.desc)}">
            <div class="badge-emoji-wrap">
              <div class="badge-emoji">${b.emoji}</div>
              <div class="badge-earned-check">✓</div>
            </div>
            <div class="badge-name">${esc(b.name)}</div>
            <div class="badge-desc">${esc(b.desc)}</div>
          </div>`;
      } else {
        return `
          <div class="badge-card badge-locked" title="Unlock: ${esc(b.desc)}">
            <div class="badge-emoji-wrap">
              <div class="badge-emoji">${b.emoji}</div>
            </div>
            <div class="badge-name">${esc(b.name)}</div>
            <div class="badge-desc">${esc(b.desc)}</div>
          </div>`;
      }
    }).join('');

    // ── Activity feed ──
    const activityTypeIcon = { bounty_won: '⚡', project: '📦', bounty_joined: '🎯' };
    const activityHtml = activityRes.length
      ? activityRes.map(item => {
          const icon = activityTypeIcon[item.type] || '•';
          const timeAgo = formatTimeAgo(item.created_at);
          return `<div class="activity-item"><span class="activity-icon">${icon}</span><span class="activity-text">${esc(item.text)}</span><span class="activity-time">${timeAgo}</span></div>`;
        }).join('')
      : `<div class="empty-state" style="padding:24px 0"><p>No activity yet</p></div>`;

    // ── Lightning field ──
    const lightningHtml = isOwn
      ? `<div class="profile-ln-field">
          <div id="lnDisplay" class="ln-display-row">
            <span id="lnAddressText" class="${user.lightning_address ? 'ln-display-value' : 'ln-display-empty'}">${user.lightning_address ? '⚡ ' + esc(user.lightning_address) : '⚡ No Lightning address set'}</span>
            <button class="ln-edit-btn" onclick="enterLnEditMode()" title="Edit Lightning address"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
            <span id="lnCheckmark" class="ln-saved-check" style="display:none">✓ Saved</span>
          </div>
          <div id="lnEdit" style="display:none" class="ln-edit-row">
            <input id="lnInput" type="text" value="${esc(user.lightning_address || '')}" placeholder="you@getalby.com" class="ln-input">
            <button onclick="saveLightningAddress()" class="ln-save-btn">Save</button>
            <button onclick="cancelLnEdit()" class="ln-cancel-btn">Cancel</button>
          </div>
        </div>`
      : (user.lightning_address
          ? `<div class="profile-lightning-readonly">⚡ ${esc(user.lightning_address)}</div>`
          : '');

    const adminTabs = user.is_admin ? `
      <button class="profile-tab" onclick="switchProfileTab('events', event)">Events</button>
    ` : '';

    const avatarRingClass = (user.bounties_won > 0) ? 'ring-gold' : (user.project_count > 0) ? 'ring-accent' : '';

    // ── Badge pills (earned only, shown in header for all) ──
    const earnedBadgeObjects = ALL_BADGES.filter(b => earnedBadges.includes(b.id));
    const badgePillsHtml = earnedBadgeObjects.length
      ? `<div class="profile-badges-pills">${earnedBadgeObjects.map(b =>
          `<span class="profile-badge-pill earned" title="${esc(b.desc)}">${b.emoji} ${esc(b.name)}</span>`
        ).join('')}</div>`
      : '';

    // ── Avatar with initials fallback ──
    const avatarInitials = (user.name || '?').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
    const uploadableAttr = isOwn ? ' avatar-uploadable" onclick="triggerAvatarUpload()' : '';
    const avatarHtml = `<div class="profile-avatar-wrap${uploadableAttr}">
      ${user.avatar
        ? `<img id="profileAvatarImg" class="profile-avatar ${avatarRingClass}" src="${esc(user.avatar)}" alt=""${isOwn ? '' : ' onclick="openLightbox(this.src)" style="cursor:zoom-in"'} onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div id="profileAvatarPlaceholder" class="profile-avatar-placeholder ${avatarRingClass}" style="display:none">${esc(avatarInitials)}</div>`
        : `<div id="profileAvatarPlaceholder" class="profile-avatar-placeholder ${avatarRingClass}">${esc(avatarInitials)}</div>`}

function formatTimeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  if (days < 30) return `${days}d ago`;
  return new Date(dateStr).toLocaleDateString('en', {month:'short', year:'numeric'});
}

function renderDeckCard(d) {
  const thumb = d.thumbnail
    ? `<img class="card-thumb" src="/thumbnails/${d.thumbnail}" alt="${esc(d.title)}" loading="lazy">`
    : `<div class="card-thumb-placeholder">🎭</div>`;
  const date = new Date(d.created_at).toLocaleDateString('en', {month:'short',day:'numeric',year:'numeric'});
  return `
    <div class="card" onclick="location.href='/deck/${d.id}'">
      ${thumb}
      <div class="card-body">
        <div class="card-title">${esc(d.title)}</div>
        <div class="card-meta">
          <span>${date}</span>
          <span>${d.views||0} view${d.views!==1?'s':''}</span>
        </div>
      </div>
    </div>`;
}

function projectVisual(name, category, width, height) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = ((hash << 5) - hash + name.charCodeAt(i)) | 0;
  const h = Math.abs(hash);
  const hue2 = (h * 7 + 120) % 360;
  const catHues = { game: 270, tool: 190, finance: 40, fun: 330, social: 200, privacy: 160, education: 220, infrastructure: 250, other: 280 };
  const baseHue = catHues[category] || (h % 360);
  const c1 = `hsla(${baseHue}, 60%, 25%, 1)`;
  const c2 = `hsla(${(baseHue + 40) % 360}, 50%, 15%, 1)`;
  const c3 = `hsla(${(baseHue + 80) % 360}, 40%, 8%, 1)`;
  const shapes = [];
  for (let i = 0; i < 5; i++) {
    const x = (h * (i + 3) * 17) % width;
    const y = (h * (i + 7) * 23) % height;
    const r = 20 + ((h * (i + 11)) % 60);
    const opacity = 0.05 + ((h * (i + 5)) % 10) / 100;
    shapes.push(`<circle cx='${x}' cy='${y}' r='${r}' fill='hsla(${(hue2 + i * 30) % 360}, 50%, 50%, ${opacity})'/>`);  }
  const initials = name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  return `data:image/svg+xml,${encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' width='${width}' height='${height}'><defs><linearGradient id='g' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' stop-color='${c1}'/><stop offset='50%' stop-color='${c2}'/><stop offset='100%' stop-color='${c3}'/></linearGradient></defs><rect width='${width}' height='${height}' fill='url(#g)'/>${shapes.join('')}<text x='50%' y='50%' dominant-baseline='central' text-anchor='middle' font-family='Space Grotesk,system-ui' font-size='${Math.min(width, height) * 0.25}' font-weight='800' fill='rgba(255,255,255,0.08)'>${initials}</text></svg>`)}`;
}

function renderProjectCard(p) {
  const statusMap = { idea: ['open','Idea'], building: ['open','Building'], shipped: ['completed','Shipped'] };
  const [statusCls, statusLabel] = statusMap[p.status] || ['open', p.status];
  const tags = typeof p.tags === 'string' ? p.tags.split(',').map(t => t.trim()).filter(Boolean).map(t => `<span class="card-tag">${esc(t)}</span>`).join('') : Array.isArray(p.tags) ? p.tags.map(t => `<span class="card-tag">${esc(t)}</span>`).join('') : '';
  const bountyTag = p.bounty_title ? `<span class="bounty-status open" style="font-size:0.6rem">⚡ ${esc(p.bounty_title)}</span>` : '';
  const catTag = p.category ? `<span class="card-tag cat-${esc(p.category)}">${esc(p.category)}</span>` : '';
  const links = [
    (p.repo_url||p.repo) ? `<a href="${esc(p.repo_url||p.repo)}" target="_blank" rel="noopener" class="spk-link" onclick="event.stopPropagation()">⌥ Repo</a>` : '',
    (p.demo_url||p.demo) ? `<a href="${esc(p.demo_url||p.demo)}" target="_blank" rel="noopener" class="spk-link" onclick="event.stopPropagation()">↗ Demo</a>` : ''
  ].filter(Boolean).join('');
  const satsLabel = p.total_sats_received > 0
    ? `<span style="font-family:var(--font-mono);font-size:0.68rem;color:var(--btc-bright);opacity:.85">⚡${Number(p.total_sats_received).toLocaleString()}</span>`
    : '';
  const visualSrc = p.thumbnail_url || p.banner_url || projectVisual(p.name, p.category, 400, 120);
  return `
    <div class="project-card" onclick="if(!event.target.closest('.project-upvote')&&!event.target.closest('.spk-link'))window.location='/project/${p.id}'" style="cursor:pointer">
      <img class="project-card-visual" src="${visualSrc}" alt="">
      <div class="project-card-body">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
          <div class="project-name">${esc(p.name)}</div>
          <span class="card-tag cat-${p.status === 'shipped' ? 'productivity' : 'tool'}" style="font-size:0.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0">${statusLabel}</span>
        </div>
        <div class="project-desc">${esc(p.description)}</div>
        <div class="card-tags" style="margin-bottom:10px">${catTag}${bountyTag}${tags}</div>
        ${links ? `<div class="spk-links" style="margin-bottom:8px">${links}</div>` : ''}
        <div class="project-footer">
          <div style="display:flex;align-items:center;gap:6px">
            ${satsLabel}
          </div>
          <button class="project-upvote" onclick="event.stopPropagation()">
            ▲ <span>${p.votes || 0}</span>
          </button>
        </div>
      </div>
    </div>`;
}

function switchProfileTab(name, ev) {
  document.querySelectorAll('.profile-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.profile-tab-view').forEach(v => v.classList.remove('active'));
  if (ev) ev.target.classList.add('active');
  const view = document.getElementById('ptab-' + name);
  if (view) {
    view.classList.add('active');
    if (name === 'bounties' && view.dataset.loaded === 'false') {
      view.dataset.loaded = 'true';
      loadBountiesTab(view);
    }
  }
}

async function loadBountiesTab(view) {
  const uid = view.dataset.uid;
  view.innerHTML = '<p style="color:var(--muted);font-size:0.85rem;padding:16px 0">Loading...</p>';
  try {
    const meRes = await fetch('/api/me').then(r => r.json());
    const isOwn = meRes.user && meRes.user.id === uid;
    const bounties = await fetch('/api/users/' + uid + '/bounties').then(r => r.json());
    if (!bounties.length) {
      view.innerHTML = '<div class="empty-state" style="padding:32px 0"><p>Join a bounty hunt to get started!</p></div>';
      return;
    }
    view.innerHTML = '<div class="bounty-hunt-list">' + bounties.map(b => renderBountyItem(b, isOwn)).join('') + '</div>';
  } catch(e) {
    view.innerHTML = '<p style="color:var(--muted);font-size:0.85rem;padding:16px 0">Failed to load bounties</p>';
  }
}

function renderBountyItem(b, isOwn) {
  const statusColor = b.status === 'open' ? 'var(--btc-bright)' : b.status === 'claimed' ? '#a78bfa' : 'var(--muted)';
  const joinedDays = Math.floor((Date.now() - new Date(b.joined_at).getTime()) / 86400000);
  const joinedLabel = joinedDays === 0 ? 'today' : joinedDays === 1 ? '1 day ago' : joinedDays + ' days ago';
  const submitBtn = (isOwn && b.status === 'open')
    ? ` <a href="/bounty/${esc(b.id)}" style="margin-left:8px;font-size:0.72rem;color:var(--btc-bright);text-decoration:none;border:1px solid rgba(242,177,52,.3);border-radius:100px;padding:2px 10px;white-space:nowrap">Submit →</a>`
    : '';
  return `<div style="display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06);flex-wrap:wrap">
    <span style="color:var(--btc-bright);font-size:0.8rem;font-family:var(--font-mono);white-space:nowrap">⚡ ${Number(b.sats_amount).toLocaleString()} sats</span>
    <a href="/bounty/${esc(b.id)}" style="font-size:0.85rem;color:var(--text);text-decoration:none;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(b.title)}</a>
    <span style="font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:${statusColor}">${esc(b.status)}</span>
    <span style="font-size:0.72rem;color:var(--muted);white-space:nowrap">Joined ${joinedLabel}</span>
    ${submitBtn}
  </div>`;
}


loadProfile().then(() => {
  // Generate profile banner gradient from user name
  const banner = document.getElementById('profileBanner');
  if (banner) {
    const name = document.title.replace(' — LunarPad', '') || 'User';
    let hash = 0;
    for (let i = 0; i < name.length; i++) hash = ((hash << 5) - hash + name.charCodeAt(i)) | 0;
    const h = Math.abs(hash);
    const hue1 = h % 360;
    const hue2 = (h * 7 + 60) % 360;
    const hue3 = (h * 13 + 180) % 360;
    banner.style.background = `linear-gradient(135deg, hsla(${hue1},50%,15%,1), hsla(${hue2},40%,10%,1), hsla(${hue3},30%,8%,1))`;
    // Add subtle SVG pattern overlay
    const circles = Array.from({length: 6}, (_, i) => {
      const cx = (h * (i+3) * 17) % 800;
      const cy = (h * (i+7) * 11) % 120;
      const r = 30 + ((h * (i+11)) % 80);
      const opacity = 0.03 + ((h * (i+5)) % 5) / 100;
      return `<circle cx='${cx}' cy='${cy}' r='${r}' fill='hsla(${(hue1 + i*40)%360},40%,50%,${opacity})'/>`;
    }).join('');
    banner.style.backgroundImage = `url("data:image/svg+xml,${encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' width='800' height='120'>${circles}</svg>`)}"), ${banner.style.background}`;
  }

  // CountUp animation for stat numbers
  const SATS_TARGET = document.querySelector('.profile-stat-value.gold[data-target]');
  document.querySelectorAll('.stat-countup[data-target]').forEach(el => {
    const target = parseInt(el.dataset.target, 10);
    const prefix = el.dataset.prefix || '⚡ ';
    const isSats = el.classList.contains('gold');
    if (target === 0) { el.textContent = (isSats ? '⚡ ' : prefix) + '0'; return; }
    const duration = Math.min(900, 200 + target * 0.4);
    const start = performance.now();
    function tick(now) {
      const t = Math.min(1, (now - start) / duration);
      const eased = 1 - Math.pow(1 - t, 3);
      const val = Math.round(eased * target);
      el.textContent = (isSats ? '⚡ ' : prefix) + val.toLocaleString();
      if (t < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  });

  // Activity chart tooltip
  const tooltip = document.createElement('div');
  tooltip.className = 'ac-tooltip';
  document.body.appendChild(tooltip);

  document.querySelectorAll('.ac-cell[data-date]').forEach(cell => {
    cell.addEventListener('mouseenter', () => {
      const count = parseInt(cell.dataset.count, 10);
      const date = new Date(cell.dataset.date + 'T12:00:00Z');
      const label = date.toLocaleDateString('en', { month: 'short', day: 'numeric', year: 'numeric' });
      tooltip.textContent = count === 0
        ? `No contributions on ${label}`
        : `${count} contribution${count !== 1 ? 's' : ''} on ${label}`;
      tooltip.classList.add('visible');
    });
    cell.addEventListener('mousemove', (e) => {
      const rect = cell.getBoundingClientRect();
      tooltip.style.left = e.clientX + 'px';
      tooltip.style.top  = (rect.top - 38) + 'px';
    });
    cell.addEventListener('mouseleave', () => {
      tooltip.classList.remove('visible');
    });
  });

  // ── Achievement toasts ──
  const seenKey = 'lunarpad_seen_badges';
  const seenRaw = localStorage.getItem(seenKey);
  const seen = seenRaw ? JSON.parse(seenRaw) : [];
  const allEarned = document.querySelectorAll('.badge-earned');
  // Collect earned badge IDs from DOM data on ALL_BADGES
  const earnedIds = ALL_BADGES.filter(b => document.querySelector(`.badge-earned [data-badge-id="${b.id}"]`)).map(b => b.id);
  // Simpler: re-check earnedBadges from closure (already have it)
  const newBadges = (window.__profileEarnedBadges || []).filter(id => !seen.includes(id));
  if (newBadges.length) {
    const updated = [...seen, ...newBadges];
    localStorage.setItem(seenKey, JSON.stringify(updated));
    newBadges.forEach((id, i) => {
      const badge = ALL_BADGES.find(b => b.id === id);
      if (!badge) return;
      setTimeout(() => showAchievementToast(badge), i * 1200);
    });
  }
});
