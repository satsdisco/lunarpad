<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Build in Public — LunarPad</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="header">
  <a href="/" class="logo">Lunar<span class="logo-slash">\</span><span class="logo-accent">Pad</span></a>
  <nav class="nav-tabs">
    <a href="/" class="nav-tab">Decks</a>
    <a href="/build" class="nav-tab active">Build in Public</a>
    
  </nav>
  <div class="header-actions" id="authArea">
    
    <div id="userArea"></div>
  </div>
</header>

<div class="build-page container">
  <div class="build-layout">

    <!-- Sidebar -->
    <aside class="build-sidebar">
      <div class="sidebar-title">Build in Public</div>
      <nav class="sidebar-nav">
        <button class="sidebar-link active" data-view="events">Events</button>
        <button class="sidebar-link" data-view="projects">Projects</button>
        <button class="sidebar-link" data-view="bounties">Bounties</button>
      </nav>
    </aside>

    <!-- Content -->
    <main class="build-content">

      <!-- Events View -->
      <div class="build-view active" id="view-events">

        <div class="section-block" id="section-events">
          <div class="section-header">
            <span class="section-title">Upcoming Events</span>
            <button class="btn btn-sm" id="createEventBtn" style="display:none" onclick="document.getElementById('eventCreateModal').classList.add('open')">+ Create Event</button>
          </div>
          <div class="event-carousel-wrap">
            <button class="carousel-nav prev" onclick="scrollCarousel(-1)">‹</button>
            <div class="event-carousel" id="eventsGrid"></div>
            <button class="carousel-nav next" onclick="scrollCarousel(1)">›</button>
          </div>
          <div class="mini-cal" id="miniCal"></div>
        </div>

        <div class="section-block" id="section-speakers" style="display:none">
          <div class="section-header">
            <span class="section-title">Lineup</span>
            <button class="btn btn-sm" onclick="document.getElementById('speakerModal').classList.add('open')">+ Present</button>
          </div>
          <div class="demo-day-info" id="demoDayInfo" style="display:none"></div>
          <div class="speaker-rows" id="speakerList"></div>
        </div>

      </div><!-- end #view-events -->

      <!-- Projects View -->
      <div class="build-view" id="view-projects">

        <div class="section-block" id="section-projects">
          <div class="section-header">
            <span class="section-title">Projects</span>
            <button class="btn btn-sm" onclick="document.getElementById('projectModal').classList.add('open')">+ Submit</button>
          </div>
          <div class="tag-bar" id="projectTagBar"></div>
          <div class="project-grid" id="projectsGrid"></div>
        </div>

      </div><!-- end #view-projects -->

      <!-- Bounties View -->
      <div class="build-view" id="view-bounties">

        <div class="section-block" id="section-bounties">
          <div class="section-header">
            <span class="section-title">Bounties</span>
            <button class="btn btn-sm" id="createBountyBtn" style="display:none" onclick="document.getElementById('bountyCreateModal').classList.add('open')">+ Create Bounty</button>
          </div>
          <div class="bounty-grid" id="bountiesGrid">
            <div class="empty-state" style="grid-column:1/-1">
              <div class="icon">⚡</div>
              <h3>Loading bounties…</h3>
            </div>
          </div>
        </div>

      </div><!-- end #view-bounties -->

    </main>
  </div>
</div><!-- end .build-page -->

<!-- Speaker Signup Modal -->
<div class="modal-overlay" id="speakerModal">
  <div class="modal-content">
    <button class="modal-close" onclick="this.closest('.modal-overlay').classList.remove('open')">&times;</button>
    <div class="modal-title">Sign Up to Present</div>
    <div class="form-row">
      <div class="form-group">
        <label>Your Name</label>
        <input type="text" id="spkName" placeholder="Jane Smith">
      </div>
      <div class="form-group">
        <label>Project Title</label>
        <input type="text" id="spkProject" placeholder="My awesome project">
      </div>
    </div>
    <div class="form-group">
      <label>Short Description</label>
      <textarea id="spkDesc" placeholder="What will you be presenting?"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>GitHub URL <span style="font-weight:400;color:var(--muted2)">(optional)</span></label>
        <input type="url" id="spkGithub" placeholder="https://github.com/you/project">
      </div>
      <div class="form-group">
        <label>Live Demo URL <span style="font-weight:400;color:var(--muted2)">(optional)</span></label>
        <input type="url" id="spkDemo" placeholder="https://yourproject.app">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Duration</label>
        <select id="spkDuration">
          <option value="5">5 minutes</option>
          <option value="10" selected>10 minutes</option>
          <option value="15">15 minutes</option>
        </select>
      </div>
      <div class="form-group">
        <label>Attach Presentation <span style="font-weight:400;color:var(--muted2)">(optional)</span></label>
        <select id="spkDeckId">
          <option value="">— None —</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="this.closest('.modal-overlay').classList.remove('open')">Cancel</button>
      <button class="btn btn-primary" onclick="submitSpeaker()">Submit</button>
    </div>
  </div>
</div>

<!-- Project Submit Modal -->
<div class="modal-overlay" id="projectModal">
  <div class="modal-content">
    <button class="modal-close" onclick="this.closest('.modal-overlay').classList.remove('open')">&times;</button>
    <div class="modal-title">Submit a Project</div>
    <div id="projBountyLabel" style="display:none;font-size:0.8rem;color:var(--btc-gold);margin-bottom:12px;padding:8px 12px;border:1px solid rgba(242,177,52,.2);border-radius:var(--radius);background:rgba(242,177,52,.05)"></div>
    <input type="hidden" id="projBountyId" value="">
    <div class="form-row">
      <div class="form-group">
        <label>Project Name</label>
        <input type="text" id="projName" placeholder="My cool project">
      </div>
      <div class="form-group">
        <label>Builder Name</label>
        <input type="text" id="projBuilder" placeholder="Your name">
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="projDesc" placeholder="What are you building and why?"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Category</label>
        <select id="projCategory">
          <option value="">Select category...</option>
          <option value="tool">Tool</option>
          <option value="game">Game</option>
          <option value="fun">Fun / Creative</option>
          <option value="productivity">Productivity</option>
          <option value="finance">Finance</option>
          <option value="social">Social</option>
          <option value="privacy">Privacy</option>
          <option value="education">Education</option>
          <option value="infrastructure">Infrastructure</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="projStatus">
          <option value="idea">Idea</option>
          <option value="building" selected>Building</option>
          <option value="shipped">Shipped</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Tags (comma-separated)</label>
      <input type="text" id="projTags" placeholder="web, bitcoin, dashboard">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Repo URL (optional)</label>
        <input type="url" id="projRepo" placeholder="https://github.com/…">
      </div>
      <div class="form-group">
        <label>Demo URL (optional)</label>
        <input type="url" id="projDemo" placeholder="https://…">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="this.closest('.modal-overlay').classList.remove('open')">Cancel</button>
      <button class="btn btn-primary" onclick="submitProject()">Submit</button>
    </div>
  </div>
</div>

<!-- Bounty Detail Modal -->
<div class="modal-overlay" id="bountyModal">
  <div class="modal-content" style="max-width:560px">
    <button class="modal-close" onclick="this.closest('.modal-overlay').classList.remove('open')">&times;</button>
    <div id="bountyModalBody"></div>
  </div>
</div>

<!-- Create Event Modal -->
<div class="modal-overlay" id="eventCreateModal">
  <div class="modal-content">
    <button class="modal-close" onclick="this.closest('.modal-overlay').classList.remove('open')">&times;</button>
    <div class="modal-title">Create Event</div>
    <div class="form-group"><label>Event Name</label><input type="text" id="newEventName" placeholder="Demo Day #2"></div>
    <div class="form-group"><label>Description</label><textarea id="newEventDesc" placeholder="What's this event about?"></textarea></div>
    <div class="form-row">
      <div class="form-group"><label>Type</label><select id="newEventType"><option value="demo-day">Demo Day</option><option value="hackathon">Hackathon</option><option value="workshop">Workshop</option><option value="meetup">Meetup</option></select></div>
      <div class="form-group"><label>Date</label><input type="date" id="newEventDate"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Time</label><input type="time" id="newEventTime"></div>
      <div class="form-group"><label>Location</label><input type="text" id="newEventLocation" placeholder="Virtual or address"></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="this.closest('.modal-overlay').classList.remove('open')">Cancel</button>
      <button class="btn btn-primary" onclick="createEvent()">Create Event</button>
    </div>
  </div>
</div>

<!-- Create Bounty Modal -->
<div class="modal-overlay" id="bountyCreateModal">
  <div class="modal-content">
    <button class="modal-close" onclick="this.closest('.modal-overlay').classList.remove('open')">&times;</button>
    <div class="modal-title">Create Bounty</div>
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="newBountyTitle" placeholder="What needs to be built?">
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="newBountyDesc" placeholder="Describe the requirements, deliverables, and success criteria..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Reward (sats)</label>
        <input type="number" id="newBountySats" placeholder="50000">
      </div>
      <div class="form-group">
        <label>Deadline (optional)</label>
        <input type="date" id="newBountyDeadline">
      </div>
    </div>
    <div class="form-group">
      <label>Tags (comma-separated)</label>
      <input type="text" id="newBountyTags" placeholder="frontend, bitcoin, tool">
    </div>
    <div class="form-group">
      <label>Link to Event (optional)</label>
      <select id="newBountyEvent"><option value="">None</option></select>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="this.closest('.modal-overlay').classList.remove('open')">Cancel</button>
      <button class="btn btn-primary" onclick="createBounty()">Create Bounty</button>
    </div>
  </div>
</div>

<footer class="footer">LunarPad — Build. Ship. Earn sats.</footer>

<script>
function esc(s) {
  const d = document.createElement('div');
  d.textContent = String(s ?? '');
  return d.innerHTML;
}

// ─── State ────────────────────────────────────────────────────────────────
let eventsData = [];
let speakersData = [];
let nextDemoDay = null;
let countdownTimers = {};

// ─── Sidebar Navigation ───────────────────────────────────────────────────
document.querySelectorAll('.sidebar-link').forEach(link => {
  link.addEventListener('click', () => {
    document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
    document.querySelectorAll('.build-view').forEach(v => v.classList.remove('active'));
    link.classList.add('active');
    document.getElementById('view-' + link.dataset.view).classList.add('active');
  });
});

// ─── Bounties ─────────────────────────────────────────────────────────────
async function loadBounties() {
  const grid = document.getElementById('bountiesGrid');
  try {
    const res = await fetch('/api/bounties');
    const bounties = await res.json();
    if (!bounties.length) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="icon">⚡</div><h3>No active bounties</h3><p>Check back soon for new opportunities</p></div>`;
      return;
    }
    grid.innerHTML = bounties.map(b => {
      const statusClass = { open: 'open', claimed: 'claimed', completed: 'completed' }[b.status] || 'open';
      const statusLabel = { open: 'Open', claimed: 'Claimed', completed: 'Completed' }[b.status] || b.status;
      const tags = typeof b.tags === 'string' ? b.tags.split(',').map(t => t.trim()).filter(Boolean).map(t => `<span class="card-tag">${esc(t)}</span>`).join('') : '';
      const deadline = b.deadline ? `<span class="bounty-deadline">Deadline: ${esc(new Date(b.deadline).toLocaleDateString('en', {month:'short',day:'numeric',year:'numeric'}))}</span>` : '';
      return `
        <div class="bounty-card" onclick="expandBounty('${esc(b.id)}')" style="cursor:pointer">
          <div class="bounty-header">
            <div class="bounty-title">${esc(b.title)}</div>
            <span class="bounty-status ${statusClass}">${statusLabel}</span>
          </div>
          <div class="bounty-sats">⚡ ${Number(b.sats_amount || 0).toLocaleString()} sats</div>
          ${tags ? `<div class="card-tags" style="margin-top:8px">${tags}</div>` : ''}
        </div>`;
    }).join('');
  } catch {
    grid.innerHTML = `<div style="grid-column:1/-1;font-size:0.8rem;color:var(--muted2);padding:12px 0;">No bounties available right now.</div>`;
  }
}

// ─── Events ───────────────────────────────────────────────────────────────
async function loadEvents() {
  const grid = document.getElementById('eventsGrid');
  try {
    const res = await fetch('/api/events');
    eventsData = await res.json();
    if (!eventsData.length) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="icon">📅</div><h3>No upcoming events</h3><p>Nothing scheduled yet — stay tuned</p></div>`;
      return;
    }
    grid.innerHTML = eventsData.map(ev => renderEventCard(ev)).join('');
    startCountdowns();
    renderMiniCal();
    eventsData.forEach(ev => loadEventBounties(ev.id));

    // Find next demo-day for speaker section
    const now = new Date();
    const demoDays = eventsData.filter(ev =>
      (ev.event_type || ev.type || '').toLowerCase().includes('demo') &&
      new Date(ev.date) > now
    ).sort((a, b) => new Date(a.date) - new Date(b.date));
    if (demoDays.length) {
      nextDemoDay = demoDays[0];
      loadSpeakers();
      loadDecksForDropdown();
    }
  } catch {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="icon">📅</div><h3>Could not load events</h3><p>API unavailable</p></div>`;
  }
}

function renderEventCard(ev) {
  const dateStr = ev.date
    ? new Date(ev.date).toLocaleDateString('en', { weekday:'short', month:'short', day:'numeric', year:'numeric' })
    : 'TBD';
  const evType = ev.event_type || ev.type || 'Event';
  const speakerCount = (ev.speakers || []).length;
  return `
    <div class="event-card" onclick="window.location='/event/${ev.id}'" style="cursor:pointer">
      <div class="event-card-body">
        <div class="event-type-badge">${esc(evType)}</div>
        <div class="event-name">${esc(ev.name)}</div>
        <div class="event-details">
          <span>🗓 ${dateStr}</span>
          ${ev.location ? `<span>📍 ${esc(ev.location)}</span>` : ''}
        </div>
        <div style="display:flex;gap:12px;margin-top:8px;font-size:0.8rem;color:var(--muted)">
          <span>${speakerCount} speaker${speakerCount !== 1 ? 's' : ''}</span>
        </div>
        <div class="event-countdown" id="countdown-${esc(ev.id)}">
          <div class="countdown-chip"><div class="countdown-chip-val" id="cd-d-${esc(ev.id)}">--</div><div class="countdown-chip-label">Days</div></div>
          <div class="countdown-chip"><div class="countdown-chip-val" id="cd-h-${esc(ev.id)}">--</div><div class="countdown-chip-label">Hrs</div></div>
          <div class="countdown-chip"><div class="countdown-chip-val" id="cd-m-${esc(ev.id)}">--</div><div class="countdown-chip-label">Min</div></div>
          <div class="countdown-chip"><div class="countdown-chip-val" id="cd-s-${esc(ev.id)}">--</div><div class="countdown-chip-label">Sec</div></div>
        </div>
      </div>
    </div>`;
}

function toggleRsvp(id) {
  const wrap = document.getElementById('rsvp-' + id);
  if (wrap) wrap.classList.toggle('open');
}

async function submitRsvp(id) {
  const name = document.getElementById('rsvp-name-' + id)?.value.trim();
  const email = document.getElementById('rsvp-email-' + id)?.value.trim();
  if (!name || !email) return alert('Please fill in your name and email.');
  try {
    await fetch('/api/events/' + id + '/rsvp', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email })
    });
    toggleRsvp(id);
    const btn = document.querySelector(`#event-${id} .btn-ghost`);
    if (btn) { btn.textContent = '✅ RSVP\'d'; btn.disabled = true; }
  } catch {
    alert('RSVP failed — please try again.');
  }
}

// ─── Countdown Timers ─────────────────────────────────────────────────────
function updateCountdowns() {
  const now = Date.now();
  eventsData.forEach(ev => {
    if (!ev.date) return;
    const target = new Date(ev.date).getTime();
    const diff = target - now;
    const id = ev.id;
    if (diff <= 0) {
      ['d','h','m','s'].forEach(u => {
        const el = document.getElementById('cd-' + u + '-' + id);
        if (el) el.textContent = '0';
      });
      return;
    }
    const days = Math.floor(diff / 86400000);
    const hrs  = Math.floor((diff % 86400000) / 3600000);
    const mins = Math.floor((diff % 3600000) / 60000);
    const secs = Math.floor((diff % 60000) / 1000);
    const set = (u, v) => { const el = document.getElementById('cd-' + u + '-' + id); if (el) el.textContent = String(v).padStart(2,'0'); };
    set('d', days); set('h', hrs); set('m', mins); set('s', secs);
  });
}

function startCountdowns() {
  updateCountdowns();
  setInterval(updateCountdowns, 1000);
}

// ─── Carousel ───
function scrollCarousel(dir) {
  const c = document.getElementById('eventsGrid');
  c.scrollBy({ left: dir * 320, behavior: 'smooth' });
}

// ─── Mini Calendar ───
let calMonth, calYear;

function renderMiniCal() {
  const now = new Date();
  if (!calMonth) { calMonth = now.getMonth(); calYear = now.getFullYear(); }
  const el = document.getElementById('miniCal');
  const first = new Date(calYear, calMonth, 1);
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  let startDay = first.getDay() - 1; if (startDay < 0) startDay = 6;
  const monthName = first.toLocaleString('en', { month: 'long', year: 'numeric' });

  // Find event dates
  const eventDates = new Set();
  const eventDateMap = {};
  eventsData.forEach(ev => {
    if (!ev.date) return;
    const d = new Date(ev.date);
    if (d.getMonth() === calMonth && d.getFullYear() === calYear) {
      const day = d.getDate();
      eventDates.add(day);
      eventDateMap[day] = ev.id;
    }
  });

  const todayDate = now.getDate();
  const isCurrentMonth = now.getMonth() === calMonth && now.getFullYear() === calYear;

  let days = '';
  for (let i = 0; i < startDay; i++) days += '<div class="mini-cal-day empty"></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const cls = [];
    if (isCurrentMonth && d === todayDate) cls.push('today');
    if (eventDates.has(d)) cls.push('has-event');
    const click = eventDateMap[d] ? ` onclick="window.location='/event/${eventDateMap[d]}'"` : '';
    days += `<div class="mini-cal-day ${cls.join(' ')}"${click}>${d}</div>`;
  }

  el.innerHTML = `
    <div class="mini-cal-header">
      <div class="mini-cal-title">${monthName}</div>
      <div class="mini-cal-nav">
        <button onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderMiniCal()">‹</button>
        <button onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderMiniCal()">›</button>
      </div>
    </div>
    <div class="mini-cal-grid">
      <div class="mini-cal-day-label">Mo</div><div class="mini-cal-day-label">Tu</div><div class="mini-cal-day-label">We</div>
      <div class="mini-cal-day-label">Th</div><div class="mini-cal-day-label">Fr</div><div class="mini-cal-day-label">Sa</div><div class="mini-cal-day-label">Su</div>
      ${days}
    </div>`;
}

// ─── Speakers ─────────────────────────────────────────────────────────────
async function loadSpeakers() {
  if (!nextDemoDay) return;
  // Speaker lineup now lives on event page, not here

  const infoEl = document.getElementById('demoDayInfo');
  const dateStr = new Date(nextDemoDay.date).toLocaleDateString('en', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
  // Info already shown in events section
  infoEl.style.display = 'none';

  try {
    const res = await fetch('/api/speakers?event=' + encodeURIComponent(nextDemoDay.id));
    speakersData = await res.json();
    renderSpeakerList();
  } catch {
    document.getElementById('speakerList').innerHTML = '<p style="color:var(--muted);font-size:13px">Could not load speaker lineup.</p>';
  }
}

function renderSpeakerList() {
  const list = document.getElementById('speakerList');
  if (!speakersData.length) {
    list.innerHTML = '<p style="color:var(--muted);font-size:13px;padding:8px 0">No speakers yet — be the first to sign up!</p>';
    return;
  }
  list.innerHTML = speakersData.map(sp => {
    const links = [
      sp.github_url ? `<a href="${esc(sp.github_url)}" target="_blank" rel="noopener" class="spk-link">⌥ GitHub</a>` : '',
      sp.demo_url   ? `<a href="${esc(sp.demo_url)}"   target="_blank" rel="noopener" class="spk-link">↗ Demo</a>` : '',
      sp.deck_id    ? `<a href="/deck/${esc(sp.deck_id)}" target="_blank" rel="noopener" class="spk-link">📽 View Deck</a>` : '',
    ].filter(Boolean).join('');
    return `
    <div class="speaker-row" id="spk-${esc(sp.id)}" ${sp.deck_id ? `onclick="window.location='/deck/${sp.deck_id}'" style="cursor:pointer"` : ''}>
      <div class="speaker-info">
        <div class="speaker-name">${esc(sp.name)}</div>
        <div class="speaker-project">${sp.deck_id ? `<a href="/deck/${esc(sp.deck_id)}" class="project-link" onclick="event.stopPropagation()">${esc(sp.project || sp.project_title)} →</a>` : esc(sp.project || sp.project_title)}</div>
        ${sp.description ? `<div class="speaker-desc">${esc(sp.description)}</div>` : ''}
        ${links ? `<div class="spk-links">${links}</div>` : ''}
      </div>
      <span class="speaker-duration">${esc(sp.duration)} min</span>
      <button class="vote-btn" id="spk-vote-${esc(sp.id)}" onclick="voteSpeaker('${esc(sp.id)}')">
        <span class="arrow">▲</span><span id="spk-count-${esc(sp.id)}">${sp.votes || 0}</span>
      </button>

async function toggleVote(type, id, btn, countElId) {
  if (!btn) return;
  try {
    const res = await fetch('/api/vote', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type, id }),
    });
    const data = await res.json();
    const countEl = document.getElementById(countElId);
    if (countEl) countEl.textContent = data.votes;

async function loadProjects() {

  try {
    const res = await fetch('/api/projects');

    renderProjects(projects);
  } catch {

  }

let allProjects = [];
let activeProjectTag = null;

function renderProjectTags(projects) {
  const tagBar = document.getElementById('projectTagBar');
  const tagSet = new Set();
  projects.forEach(p => {
    if (p.category) tagSet.add(p.category);
    if (typeof p.tags === 'string') p.tags.split(',').forEach(t => { if(t.trim()) tagSet.add(t.trim()); });
  });
  const tags = [...tagSet].sort();
  tagBar.innerHTML = `<div class="tag-chip ${!activeProjectTag ? 'active' : ''}" onclick="filterProjects(null)">All</div>` +
    tags.map(t => `<div class="tag-chip ${activeProjectTag === t ? 'active' : ''}" onclick="filterProjects('${t}')">${t}</div>`).join('');
}

function filterProjects(tag) {
  activeProjectTag = tag;
  const filtered = tag ? allProjects.filter(p => {
    const ptags = typeof p.tags === 'string' ? p.tags.split(',').map(t=>t.trim()) : [];
    return p.category === tag || ptags.includes(tag);
  }) : allProjects;
  renderProjectCards(filtered);
  renderProjectTags(allProjects);
}

function renderProjects(projects) {
  allProjects = projects;
  renderProjectTags(projects);
  renderProjectCards(projects);
}

function renderProjectCards(projects) {
  const grid = document.getElementById('projectsGrid');
  if (!projects.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="icon">🛠</div><h3>No projects yet</h3><p>Submit yours and build in public!</p></div>`;
    return;
  }
  grid.innerHTML = projects.map(p => {
    const statusMap = { idea: ['open','Idea'], building: ['open','Building'], shipped: ['completed','Shipped'] };
    const [statusCls, statusLabel] = statusMap[p.status] || ['open', p.status];
    const tags = typeof p.tags === 'string' ? p.tags.split(',').map(t => t.trim()).filter(Boolean).map(t => `<span class="card-tag">${esc(t)}</span>`).join('') : Array.isArray(p.tags) ? p.tags.map(t => `<span class="card-tag">${esc(t)}</span>`).join('') : '';
    const bountyTag = p.bounty_title ? `<span class="bounty-status open" style="font-size:0.6rem">⚡ ${esc(p.bounty_title)}</span>` : '';
    const catTag = p.category ? `<span class="card-tag cat-${esc(p.category)}">${esc(p.category)}</span>` : '';
    const links = [
      (p.repo_url||p.repo) ? `<a href="${esc(p.repo_url||p.repo)}" target="_blank" rel="noopener" class="spk-link" onclick="event.stopPropagation()">⌥ Repo</a>` : '',
      (p.demo_url||p.demo) ? `<a href="${esc(p.demo_url||p.demo)}" target="_blank" rel="noopener" class="spk-link" onclick="event.stopPropagation()">↗ Demo</a>` : ''
    ].filter(Boolean).join('');
    return `
      <div class="project-card" id="proj-${esc(p.id)}" onclick="if(!event.target.closest('.project-upvote')&&!event.target.closest('.spk-link'))window.location='/project/'+this.id.replace('proj-','')" style="cursor:pointer">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
          <div class="project-name">${esc(p.name)}</div>
          <span class="card-tag cat-${p.status === 'shipped' ? 'productivity' : 'tool'}" style="font-size:0.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0">${statusLabel}</span>
        </div>
        <div class="project-builder">by ${esc(p.builder)}</div>
        <div class="project-desc">${esc(p.description)}</div>
        <div class="card-tags" style="margin-bottom:10px">${catTag}${bountyTag}${tags}</div>
        ${links ? `<div class="spk-links" style="margin-bottom:8px">${links}</div>` : ''}
        <div class="project-footer">
          <span></span>
          <button class="project-upvote" id="proj-vote-${esc(p.id)}" onclick="event.stopPropagation(); voteProject('${esc(p.id)}')">
            ▲ <span id="proj-count-${esc(p.id)}">${p.votes || 0}</span>
          </button>
        </div>
      </div>`;
  }).join('');
}

async function expandBounty(id) {
  try {
    const res = await fetch('/api/bounties/' + id);
    const b = await res.json();
    const tags = typeof b.tags === 'string' ? b.tags.split(',').map(t => t.trim()).filter(Boolean) : [];
    const statusClass = { open: 'open', claimed: 'claimed', completed: 'completed' }[b.status] || 'open';
    const statusLabel = { open: 'Open', claimed: 'Claimed', completed: 'Completed' }[b.status] || b.status;
    const participants = b.participants || [];
    let meRes = await fetch('/api/me');
    let me = await meRes.json();
    let alreadyJoined = me.user && participants.some(p => p.user_name === me.user.name);
    const modal = document.getElementById('bountyModal');
    document.getElementById('bountyModalBody').innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
        <div style="font-size:1.1rem;font-weight:700;color:var(--text);flex:1">${esc(b.title)}</div>
        <span class="bounty-status ${statusClass}" style="margin-left:12px">${statusLabel}</span>
      </div>
      <div style="font-family:var(--font-mono);font-size:1.3rem;font-weight:800;color:var(--btc-gold);margin-bottom:16px">&#9889; ${Number(b.sats_amount || 0).toLocaleString()} sats</div>
      <div style="font-size:0.88rem;color:var(--text2);line-height:1.6;padding:16px;background:var(--glass);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px">${esc(b.description)}</div>
      ${tags.length ? '<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px">' + tags.map(t => '<span class="card-tag">' + esc(t) + '</span>').join('') + '</div>' : ''}
      <div style="padding-top:16px;border-top:1px solid var(--border)">
        <div style="font-family:var(--font-mono);font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);margin-bottom:12px"># Participants (${participants.length})</div>
        ${participants.length ? participants.map(p => '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)"><span style="font-size:0.85rem;color:var(--text)">' + esc(p.user_name) + '</span></div>').join('') : '<div style="font-size:0.82rem;color:var(--muted2);padding:8px 0">No participants yet</div>'}
      </div>
      <div style="margin-top:16px;display:flex;gap:8px;justify-content:flex-end;align-items:center">
        ${b.status === 'open' && me.user && !alreadyJoined ? '<button class="btn btn-primary" style="padding:10px 24px;font-size:0.85rem" onclick="joinBounty(\'' + esc(b.id) + '\')">⚡ Join the Hunt</button>' : ''}
        ${b.status === 'open' && !me.user ? '<a href="/auth/google" class="btn btn-primary" style="padding:10px 24px;font-size:0.85rem">Sign in to Join</a>' : ''}
        ${alreadyJoined ? '<button class="btn btn-danger" onclick="leaveBounty(\'' + esc(b.id) + '\')">✗ Leave Hunt</button><span style="font-size:0.85rem;color:var(--accent);font-weight:600">&#10003; You\'re in the hunt!</span>' : ''}
        ${alreadyJoined ? '<button class="btn" style="margin-left:8px" onclick="openProjectForBounty(\'' + esc(b.id) + '\', \'' + esc(b.title) + '\')">Submit Project</button>' : ''}
        ${b.status !== 'open' ? '<span style="font-size:0.85rem;color:var(--muted2)">This bounty is ' + b.status + '</span>' : ''}
      </div>`;
    modal.classList.add('open');
  } catch(e) { console.error('Failed to load bounty:', e); }
}

}
