<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vote — DeckPad</title>
<style>/* ─── DeckPad Design System v3 — Terminal Aesthetic ──────────────────────── */

@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@400;500;600;700&display=swap');

:root {
  --bg: #0c0e14;
  --surface: rgba(255,255,255,.04);
  --surface2: rgba(255,255,255,.07);
  --border: rgba(255,255,255,.08);
  --border2: rgba(255,255,255,.12);
  --text: #edf0f5;
  --text2: #c8cdd6;
  --muted: #8b93a3;
  --muted2: #5c6478;
  --dim: #3a4050;
  --accent: #4ae3b5;
  --accent-hover: #6aedc8;
  --accent-dim: rgba(74,227,181,.10);
  --accent-glow: rgba(74,227,181,.06);
  --danger: #e5484d;
  --success: #3dd68c;
  --radius: 10px;
  --radius-lg: 14px;
  --glass: rgba(255,255,255,.03);
  --glass2: rgba(255,255,255,.06);
  --font-mono: 'JetBrains Mono', monospace;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --btc-gold: #f2b134;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text2);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  font-size: 15px;
  line-height: 1.6;
}



::selection { background: var(--accent); color: #fff; }

a { color: var(--text); text-decoration: none; transition: color .15s; }
a:hover { color: var(--accent); }

/* ─── Layout ─────────────────────────────────────────────────────────────── */
.container { max-width: 900px; margin: 0 auto; padding: 0 2rem; }

/* ─── Header ─────────────────────────────────────────────────────────────── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 2rem; height: 56px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
  background: rgba(12,14,20,.85);
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
}

.header-left { display: flex; align-items: center; gap: 24px; }

.logo {
  font-family: var(--font-mono);
  font-size: 0.85rem; font-weight: 800; color: var(--text);
  display: flex; align-items: center; gap: 6px;
}
.logo .mark { color: var(--accent); }

.nav-tabs { display: flex; gap: 0; height: 52px; align-items: stretch; }
.nav-tab {
  display: flex; align-items: center; padding: 0 14px;
  font-size: 0.8rem; font-weight: 400;
  color: var(--muted); text-decoration: none;
  border-bottom: 1px solid transparent;
  transition: color .15s, border-color .15s;
}
.nav-tab:hover { color: var(--muted); }
.nav-tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

.header-actions { display: flex; gap: 8px; align-items: center; }

/* ─── Buttons ────────────────────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px; font-size: 0.75rem;
  font-family: var(--font); font-weight: 400;
  cursor: pointer; border: 1px solid var(--border);
  transition: all .15s ease; text-decoration: none;
  background: transparent; color: var(--muted);
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn-primary {
  background: var(--accent); color: #fff;
  border-color: var(--accent); font-weight: 600;
  border-radius: var(--radius);
}
.btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); color: #fff; transform: translateY(-1px); }
.btn-ghost { background: transparent; }
.btn-danger { color: var(--danger); border-color: #4a2020; }
.btn-danger:hover { border-color: var(--danger); color: var(--danger); }
.btn-sm { padding: 4px 10px; font-size: 0.7rem; }
.btn:disabled { opacity: .3; cursor: default; pointer-events: none; }

/* ─── Search & Filters ───────────────────────────────────────────────────── */
.toolbar {
  display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
  padding: 24px 0 12px;
}

.search-box { flex: 1; min-width: 200px; position: relative; }
.search-box input {
  width: 100%; padding: 9px 14px 9px 32px;
  background: transparent; border: 1px solid var(--border);
  color: var(--text); font-size: 0.85rem;
  font-family: var(--font); outline: none; transition: border-color .2s;
}
.search-box input:focus { border-color: var(--accent); }
.search-box input::placeholder { color: var(--dim); }
.search-box::before {
  content: '>'; position: absolute; left: 12px; top: 50%;
  transform: translateY(-50%); font-size: 0.8rem; color: var(--accent);
  pointer-events: none; font-weight: 700; font-family: var(--font-mono);
}

.sort-select {
  padding: 8px 12px; background: transparent; border: 1px solid var(--border);
  color: var(--muted); font-size: 0.75rem;
  font-family: var(--font); cursor: pointer; outline: none;
}
.sort-select:focus { border-color: var(--accent); }
.sort-select option { background: var(--bg); }

/* ─── Tags ───────────────────────────────────────────────────────────────── */
.tag-bar { display: flex; gap: 6px; flex-wrap: wrap; padding-bottom: 8px; }
.tag-chip {
  padding: 4px 11px; font-size: 0.75rem; font-weight: 400;
  background: transparent; border: 1px solid var(--border);
  color: var(--muted); cursor: pointer; transition: all .15s;
  user-select: none; font-family: var(--font);
}
.tag-chip:hover { border-color: var(--accent); color: var(--muted); }
.tag-chip.active {
  background: var(--accent-dim); border-color: var(--accent);
  color: var(--accent);
}

/* ─── Gallery Grid ───────────────────────────────────────────────────────── */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px; padding: 12px 0 48px;
}

.card {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden; cursor: pointer;
  transition: all .2s ease;
  backdrop-filter: blur(8px);
}
.card:hover {
  border-color: var(--border2);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0,0,0,.3);
}
.card-thumb {
  width: 100%; aspect-ratio: 16/9; object-fit: cover;
  background: #0e0e0e; display: block;
}
.card-thumb-placeholder {
  width: 100%; aspect-ratio: 16/9;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; color: var(--dim);
  background: rgba(255,255,255,.02);
}
.card-body { padding: 14px 16px; }
.card-title {
  font-size: 0.9rem; font-weight: 700; color: var(--text);
  margin-bottom: 4px; line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.card-meta {
  font-size: 0.75rem; color: var(--muted); display: flex;
  align-items: center; gap: 10px;
}
.card-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
.card-tag {
  font-size: 0.7rem; padding: 2px 7px;
  background: transparent; color: var(--muted);
  border: 1px solid var(--border); font-family: var(--font-mono);
}

/* ─── Empty State ────────────────────────────────────────────────────────── */
.empty-state {
  text-align: center; padding: 80px 20px; grid-column: 1 / -1;
}
.empty-state .icon { font-size: 40px; margin-bottom: 12px; opacity: .3; }
.empty-state h3 { font-size: 0.9rem; font-weight: 700; margin-bottom: 6px; color: var(--text); }
.empty-state p { color: var(--muted2); margin-bottom: 20px; font-size: 0.8rem; }

/* ─── Pagination ─────────────────────────────────────────────────────────── */
.pagination { display: flex; justify-content: center; gap: 4px; padding: 0 0 48px; }
.page-btn {
  padding: 6px 12px; font-size: 0.75rem;
  background: transparent; border: 1px solid var(--border);
  color: var(--muted2); cursor: pointer; transition: all .15s;
  font-family: var(--font);
}
.page-btn:hover { border-color: var(--accent); color: var(--muted); }
.page-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 700; border-radius: var(--radius); }
.page-btn:disabled { opacity: .2; cursor: default; }

/* ─── Upload Page ────────────────────────────────────────────────────────── */
.upload-page { max-width: 560px; margin: 0 auto; padding: 40px 2rem 80px; }
.upload-page h1 { font-size: 1.1rem; font-weight: 800; margin-bottom: 4px; color: var(--text); }
.upload-page .subtitle { color: var(--muted2); margin-bottom: 28px; font-size: 0.8rem; }

.drop-zone {
  border: 1px dashed var(--border2); padding: 48px 20px; text-align: center;
  transition: border-color .2s, background .2s; cursor: pointer;
  margin-bottom: 24px;
}
.drop-zone:hover, .drop-zone.drag-over {
  border-color: var(--accent); background: var(--accent-dim);
}
.drop-zone .icon { font-size: 28px; margin-bottom: 10px; opacity: .4; }
.drop-zone .label { font-size: 0.82rem; font-weight: 700; margin-bottom: 4px; color: var(--text); }
.drop-zone .hint { font-size: 0.75rem; color: var(--muted2); }
.drop-zone .file-name {
  margin-top: 10px; font-size: 0.8rem; color: var(--accent);
  font-weight: 700; display: none;
}

.form-group { margin-bottom: 16px; }
.form-group label {
  font-family: var(--font-mono);
  display: block; font-size: 0.7rem; font-weight: 700;
  color: var(--muted); margin-bottom: 5px;
  text-transform: uppercase; letter-spacing: .06em;
}
.form-group label::before { content: '# '; color: var(--dim); }
.form-group input, .form-group textarea, .form-group select {
  width: 100%; padding: 8px 12px;
  background: transparent; border: 1px solid var(--border);
  color: var(--text); font-size: 0.82rem;
  outline: none; font-family: var(--font); transition: border-color .2s;
}
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--accent); }
.form-group textarea { resize: vertical; min-height: 70px; }

.upload-progress { display: none; margin-top: 16px; text-align: center; }
.progress-bar-bg {
  width: 100%; height: 2px; background: var(--border);
  overflow: hidden; margin-bottom: 6px;
}
.progress-bar-fill {
  height: 100%; background: var(--accent);
  width: 0%; transition: width .3s ease;
}
.progress-text { font-size: 0.75rem; color: var(--muted2); }

/* ─── Deck Viewer ────────────────────────────────────────────────────────── */
.viewer-page { padding-bottom: 48px; }
.viewer-back {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 16px 0; font-size: 0.75rem; color: var(--muted2);
}
.viewer-back::before { content: '← '; }
.viewer-back:hover { color: var(--accent); }

.viewer-frame-wrap {
  position: relative; width: 100%; aspect-ratio: 16/9;
  overflow: hidden; border: 1px solid var(--border);
  background: #000;
}
.viewer-frame { width: 100%; height: 100%; border: none; }
.viewer-fullscreen {
  position: absolute; top: 8px; right: 8px;
  background: rgba(10,10,10,.8); border: 1px solid var(--border);
  color: var(--muted); padding: 5px 10px; font-size: 0.7rem;
  cursor: pointer; opacity: 0; transition: opacity .2s;
  font-family: var(--font);
}
.viewer-frame-wrap:hover .viewer-fullscreen { opacity: 1; }
.viewer-fullscreen:hover { border-color: var(--accent); color: var(--accent); }

.viewer-info { padding: 20px 0; }
.viewer-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 6px; color: var(--text); }
.viewer-meta { font-size: 0.75rem; color: var(--muted2); display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 10px; }
.viewer-desc {
  font-size: 0.88rem; color: var(--text2); line-height: 1.6; margin-bottom: 16px;
  background: var(--glass); border: 1px solid var(--border);
  padding: 16px 18px; border-radius: var(--radius-lg);
  backdrop-filter: blur(8px);
}
.viewer-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 16px; }
.viewer-tag {
  padding: 2px 8px; font-size: 0.65rem;
  background: transparent; color: var(--muted2);
  border: 1px solid var(--border); font-family: var(--font-mono);
}
.viewer-actions { display: flex; gap: 8px; flex-wrap: wrap; }

.embed-box {
  margin-top: 16px; padding: 12px; background: var(--surface);
  border: 1px solid var(--border); display: none;
}
.embed-box label { font-size: 0.7rem; color: var(--muted2); margin-bottom: 4px; display: block; }
.embed-box code {
  display: block; padding: 8px; background: var(--bg);
  font-size: 0.7rem; color: var(--accent);
  word-break: break-all; font-family: var(--font-mono);
}

/* ─── Build in Public Page ───────────────────────────────────────────────── */
.build-page { padding: 28px 0 64px; }
.build-page .page-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 4px; color: var(--text); }
.build-page .page-subtitle { color: var(--muted2); margin-bottom: 32px; font-size: 0.8rem; }
.build-page .page-subtitle::before { content: '> '; color: var(--accent); }

.section-header {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 12px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.section-title { font-family: var(--font-mono); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .15em; color: var(--accent); }
.section-title::before { content: '# '; color: var(--dim); }
.section-count {
  font-family: var(--font-mono);
  font-size: 0.65rem; color: var(--muted2);
  border: 1px solid var(--border); padding: 2px 8px;
}

.section-block { margin-bottom: 32px; }

/* Bounty cards */
.bounty-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
.bounty-card {
  background: var(--glass); border: 1px solid var(--border);
  padding: 18px; border-radius: var(--radius-lg);
  transition: all .2s; backdrop-filter: blur(8px);
}
.bounty-card:hover { border-color: var(--border2); transform: translateY(-1px); }
.bounty-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.bounty-title { font-size: 0.88rem; font-weight: 700; color: var(--text); flex: 1; }
.bounty-sats { font-family: var(--font-mono); font-size: 0.82rem; font-weight: 700; color: var(--btc-gold); white-space: nowrap; margin-left: 12px; }
.bounty-desc {
  font-size: 0.8rem; color: var(--muted); line-height: 1.5; margin-bottom: 10px;
  background: rgba(255,255,255,.02); padding: 10px 12px; border-radius: var(--radius);
  border: 1px solid var(--border);
}
.bounty-footer { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.bounty-status {
  font-family: var(--font-mono);
  font-size: 0.65rem; font-weight: 700; padding: 2px 8px;
  text-transform: uppercase; letter-spacing: .05em;
  border: 1px solid;
}
.bounty-status.open { border-color: var(--accent); color: var(--accent); }
.bounty-status.claimed { border-color: #f7931a; color: #f7931a; }
.bounty-status.completed { border-color: var(--success); color: var(--success); }
.bounty-deadline { font-size: 0.65rem; color: var(--dim); }

/* Event cards */
.event-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px; }
.event-card {
  background: var(--glass); border: 1px solid var(--border);
  padding: 20px; display: flex; flex-direction: column; gap: 0;
  border-radius: var(--radius-lg);
  transition: all .2s; backdrop-filter: blur(8px);
}
.event-card:hover { border-color: var(--border2); }
.event-card-body { display: flex; flex-direction: column; gap: 10px; }
.event-details { font-size: 0.82rem; color: var(--muted); display: flex; gap: 12px; flex-wrap: wrap; }
.event-type-badge {
  font-family: var(--font-mono); font-size: 0.6rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .08em; color: var(--accent);
  border: 1px solid var(--accent); padding: 3px 10px;
  border-radius: 100px; display: inline-block; width: fit-content;
}
.form-submit-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
.rsvp-form-wrap {
  display: none; margin-top: 16px; padding-top: 16px;
  border-top: 1px solid var(--border);
}
.rsvp-form-wrap.open { display: block; }
.rsvp-form-title { font-size: 0.85rem; font-weight: 600; color: var(--text); margin-bottom: 12px; }
.event-date-badge {
  flex-shrink: 0; width: 48px; height: 48px;
  border: 1px solid var(--accent);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.event-date-badge .day { font-family: var(--font-mono); font-size: 1rem; font-weight: 800; color: var(--accent); line-height: 1; }
.event-date-badge .month { font-family: var(--font-mono); font-size: 0.6rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: .05em; }
.event-info { flex: 1; min-width: 0; }
.event-name { font-size: 0.88rem; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.event-meta { font-size: 0.7rem; color: var(--muted2); margin-bottom: 6px; display: flex; gap: 10px; }
.event-desc { font-size: 0.75rem; color: var(--muted); line-height: 1.5; margin-bottom: 8px; }
.event-countdown { font-family: var(--font-mono); font-size: 0.7rem; font-weight: 700; color: var(--accent); }
.event-type {
  font-family: var(--font-mono);
  font-size: 0.6rem; font-weight: 700; padding: 1px 6px;
  text-transform: uppercase; letter-spacing: .05em;
  border: 1px solid var(--accent); color: var(--accent);
  display: inline-block; margin-bottom: 6px;
}

/* Speaker lineup */
.speaker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
.speaker-card {
  background: var(--glass); border: 1px solid var(--border);
  padding: 14px; border-radius: var(--radius);
  display: flex; justify-content: space-between; align-items: flex-start;
  transition: all .2s; backdrop-filter: blur(8px);
}
.speaker-card:hover { border-color: var(--border2); }
.speaker-info { flex: 1; min-width: 0; }
.speaker-name { font-size: 0.88rem; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.speaker-project { font-size: 0.75rem; color: var(--accent); font-weight: 400; margin-bottom: 4px; }
.speaker-desc { font-size: 0.7rem; color: var(--muted); line-height: 1.4; }
.speaker-duration { font-size: 0.65rem; color: var(--dim); margin-top: 4px; }

.vote-btn {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 8px 14px; cursor: pointer;
  background: var(--glass); border: 1px solid var(--border2);
  border-radius: var(--radius); color: var(--muted); font-size: 0.8rem; font-weight: 700;
  transition: all .2s; min-width: 44px;
  font-family: var(--font-mono);
}
.vote-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
.vote-btn.voted { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); box-shadow: 0 0 12px rgba(74,227,181,.15); }
.vote-btn .arrow { font-size: 0.8rem; line-height: 1; }

/* Project showcase */
.project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
.project-card {
  background: var(--glass); border: 1px solid var(--border);
  padding: 18px; border-radius: var(--radius-lg);
  transition: all .2s; backdrop-filter: blur(8px);
}
.project-card:hover { border-color: var(--border2); transform: translateY(-1px); }
.project-name { font-size: 0.82rem; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.project-builder { font-size: 0.7rem; color: var(--muted2); margin-bottom: 6px; }
.project-desc { font-size: 0.75rem; color: var(--muted); line-height: 1.5; margin-bottom: 10px; }
.project-footer { display: flex; align-items: center; justify-content: space-between; }
.project-status {
  font-family: var(--font-mono);
  font-size: 0.6rem; font-weight: 700; padding: 2px 8px;
  text-transform: uppercase; letter-spacing: .05em;
  border: 1px solid;
}
.project-status.idea { border-color: var(--accent); color: var(--accent); }
.project-status.building { border-color: var(--accent); color: var(--accent); }
.project-status.shipped { border-color: var(--success); color: var(--success); }
.project-links { display: flex; gap: 6px; }
.project-links a {
  font-size: 0.7rem; color: var(--muted2); padding: 3px 8px;
  border: 1px solid var(--border); transition: all .15s;
}
.project-links a:hover { border-color: var(--accent); color: var(--accent); }

/* ─── Vote Page ──────────────────────────────────────────────────────────── */
.vote-page { padding: 28px 0 64px; }
.vote-page .page-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 4px; color: var(--text); }
.vote-page .page-subtitle { color: var(--muted2); margin-bottom: 32px; font-size: 0.8rem; }
.vote-page .page-subtitle::before { content: '> '; color: var(--accent); }

.leaderboard { display: flex; flex-direction: column; gap: 6px; }
.leaderboard-item {
  display: flex; align-items: center; gap: 14px;
  background: var(--glass); border: 1px solid var(--border);
  padding: 14px 18px; border-radius: var(--radius);
  transition: all .2s; backdrop-filter: blur(8px);
}
.leaderboard-item:hover { border-color: var(--border2); background: var(--glass2); }
.leaderboard-rank {
  font-family: var(--font-mono);
  font-size: 0.9rem; font-weight: 800;
  width: 28px; text-align: center; color: var(--dim);
}
.leaderboard-item:nth-child(1) .leaderboard-rank { color: var(--accent); }

/* ─── Vote Page — Event Sections ─────────────────────────────────────────── */
.event-section { margin-bottom: 48px; }
.event-section-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 24px; background: var(--glass); border: 1px solid var(--border);
  border-radius: var(--radius-lg); margin-bottom: 20px; gap: 24px; flex-wrap: wrap;

}
.event-section-heading { font-size: 1.2rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }

}

/* Speaker rows */

<body>

<header class="header">
  <a href="/" class="logo"><span class="mark">◆</span> DeckPad</a>
  <nav class="nav-tabs">
    <a href="/" class="nav-tab">Decks</a>
    <a href="/build" class="nav-tab">Build in Public</a>
    <a href="/vote" class="nav-tab active">Vote</a>
  </nav>
  <div class="header-actions" id="authArea">
    <a href="/upload" class="btn btn-primary">⬆ Upload Deck</a>
    <div id="userArea"></div>
  </div>
</header>

<div class="vote-page container">
  <div id="voteContent">
    <!-- Loaded dynamically -->
  </div>
</div>

<footer class="footer">DeckPad — Your stage for HTML presentations</footer>

<script>
function esc(s) {
  const d = document.createElement('div');
  d.textContent = String(s ?? '');
  return d.innerHTML;
}

let allEvents = [];

// ─── Countdown helpers ────────────────────────────────────────────────────
function getCountdownParts(targetDate) {
  const diff = new Date(targetDate).getTime() - Date.now();
  if (diff <= 0) return { days: 0, hrs: 0, mins: 0, secs: 0, expired: true };
  return {
    days: Math.floor(diff / 86400000),
    hrs:  Math.floor((diff % 86400000) / 3600000),
    mins: Math.floor((diff % 3600000) / 60000),
    secs: Math.floor((diff % 60000) / 1000),
    expired: false
  };
}

function updateAllCountdowns() {
  allEvents.forEach(ev => {
    if (!ev.date) return;
    const p = getCountdownParts(ev.date);
    const set = (u, v) => {
      const el = document.getElementById('vcd-' + u + '-' + ev.id);
      if (el) el.textContent = p.expired ? '0' : String(v).padStart(2, '0');
    };
    set('d', p.days); set('h', p.hrs); set('m', p.mins); set('s', p.secs);
  });
}

// ─── Load and render ──────────────────────────────────────────────────────
async function loadVotePage() {
  const content = document.getElementById('voteContent');
  try {
    const [evRes, allBounties] = await Promise.all([
      fetch('/api/events').then(r => r.json()),
      fetch('/api/bounties').then(r => r.json()).catch(() => []),
    ]);
    allEvents = evRes;

    // Filter to demo-day type events (upcoming or current)
    const demoDays = allEvents.filter(ev => {
      const type = (ev.event_type || ev.type || '').toLowerCase();
      return type.includes('demo');
    }).sort((a, b) => new Date(a.date) - new Date(b.date));

    if (!demoDays.length) {
      content.innerHTML = renderEmptyState();
      return;
    }

    // Build event_id → bounties map
    const bountyMap = {};
    for (const b of allBounties) {
      if (b.event_id) {
        if (!bountyMap[b.event_id]) bountyMap[b.event_id] = [];
        bountyMap[b.event_id].push(b);
      }
    }

    content.innerHTML = demoDays.map(ev => renderEventSection(ev, bountyMap[ev.id] || [])).join('') +
      `<div class="vote-note">
        <strong>How voting works:</strong> Votes help organizers plan the lineup. Top voted speakers present first.
        You can vote once per speaker.
      </div>`;

    setInterval(updateAllCountdowns, 1000);
    updateAllCountdowns();

  } catch (e) {
    content.innerHTML = renderEmptyState();
  }
}

function renderEventSection(ev, bounties) {
  const dateStr = ev.date
    ? new Date(ev.date).toLocaleDateString('en', { weekday:'long', month:'long', day:'numeric', year:'numeric' })
    : 'Date TBD';

  const speakers = [...(ev.speakers || [])].sort((a, b) => (b.votes || 0) - (a.votes || 0));

  // Prize pool from linked bounties
  const prizePool = bounties.reduce((s, b) => s + (b.sats_amount || 0), 0);
  const prizeHtml = prizePool > 0 ? `
    <div class="event-prize-pool">
      <span class="prize-label">Prize Pool</span>
      <span class="prize-amount">⚡ ${prizePool.toLocaleString()} sats</span>
    </div>
    <div class="event-bounty-pills">
      ${bounties.map(b => `<span class="bounty-pill">⚡ ${(b.sats_amount||0).toLocaleString()} · ${esc(b.title)}</span>`).join('')}
    </div>` : '';

  const speakersHtml = speakers.length
    ? speakers.map((sp, idx) => renderSpeakerRow(sp, idx + 1)).join('')
    : `<div class="no-speakers">No speakers signed up yet — <a href="/build">be the first</a></div>`;

  return `
    <div class="event-section">
      <div class="event-section-header">
        <div class="event-section-meta">
          <div class="event-section-type">${esc(ev.event_type || ev.type || 'Event')}</div>
          <div class="event-section-heading">${esc(ev.name)}</div>
          <div class="event-section-date">🗓 ${dateStr}${ev.location ? ' · 📍 ' + esc(ev.location) : ''}</div>
          ${prizeHtml}
        </div>
        <div class="event-countdown">
          <div class="countdown-chip"><div class="countdown-chip-val" id="vcd-d-${esc(ev.id)}">--</div><div class="countdown-chip-label">Days</div></div>
          <div class="countdown-chip"><div class="countdown-chip-val" id="vcd-h-${esc(ev.id)}">--</div><div class="countdown-chip-label">Hrs</div></div>
          <div class="countdown-chip"><div class="countdown-chip-val" id="vcd-m-${esc(ev.id)}">--</div><div class="countdown-chip-label">Min</div></div>
          <div class="countdown-chip"><div class="countdown-chip-val" id="vcd-s-${esc(ev.id)}">--</div><div class="countdown-chip-label">Sec</div></div>
        </div>
      </div>
      <div class="speaker-rows" id="speakers-${esc(ev.id)}">
        ${speakersHtml}
      </div>
    </div>`;
}

function renderSpeakerRow(sp, rank) {
  const medals = ['🥇', '🥈', '🥉'];
  const rankLabel = rank <= 3 ? medals[rank - 1] : '#' + rank;
  const rankClass = rank <= 3 ? 'rank-' + rank : 'rank-other';

  const desc = sp.description ? `<div class="speaker-desc">${esc(sp.description)}</div>` : '';
  const links = [
    sp.github_url ? `<a href="${esc(sp.github_url)}" target="_blank" rel="noopener" class="spk-link" onclick="event.stopPropagation()">⌥ GitHub</a>` : '',
    sp.demo_url   ? `<a href="${esc(sp.demo_url)}"   target="_blank" rel="noopener" class="spk-link" onclick="event.stopPropagation()">↗ Demo</a>` : '',
    sp.deck_id    ? `<a href="/deck/${esc(sp.deck_id)}" class="spk-link" onclick="event.stopPropagation()">📽 View Deck</a>` : '',
  ].filter(Boolean).join('');

  const rowClick = sp.deck_id ? `onclick="window.location='/deck/${sp.deck_id}'" style="cursor:pointer;"` : '';

  return `
    <div class="speaker-row ${rank <= 3 ? 'rank-' + rank : ''}" id="sprow-${esc(sp.id)}" ${rowClick}>
      <div class="rank-badge ${rankClass}">${rankLabel}</div>
      <div class="speaker-info">
        <div class="speaker-name">${esc(sp.name)}</div>
        <div class="speaker-project">${sp.deck_id ? `<a href="/deck/${esc(sp.deck_id)}" class="project-link">${esc(sp.project || sp.project_title)} →</a>` : esc(sp.project || sp.project_title)}</div>
        ${desc}
        ${links ? `<div class="spk-links">${links}</div>` : ''}
      </div>
      <div class="duration-badge">${esc(sp.duration)} min</div>
      <button class="vote-btn" id="vbtn-${esc(sp.id)}" onclick="event.stopPropagation(); toggleVote('speaker', '${esc(sp.id)}', this, 'vcount-${esc(sp.id)}')">
        <span class="arrow">▲</span>
        <span id="vcount-${esc(sp.id)}">${sp.votes || 0}</span>
      </button>
    </div>`;
}

function renderEmptyState() {
  return `
    <div class="empty-state" style="padding:80px 20px;text-align:center">
      <div style="font-size:56px;margin-bottom:16px;opacity:.5">🗓</div>
      <h2 style="font-family:var(--font-display);font-size:22px;margin-bottom:8px">No active demo days</h2>
      <p style="color:var(--muted);font-size:15px">Check back when the next demo day lineup is announced.</p>
      <a href="/build" class="btn btn-ghost" style="margin-top:20px">View Events →</a>
    </div>`;
}

// ─── Unified voting ───────────────────────────────────────────────────────
async function toggleVote(type, id, btn, countElId) {
  try {
    const res = await fetch('/api/vote', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type, id }),
    });
    const data = await res.json();
    const countEl = document.getElementById(countElId);
    if (countEl) countEl.textContent = data.votes;
    btn.classList.toggle('voted', data.voted);

    // Re-sort speakers if it's a speaker vote
    if (type === 'speaker') resortSpeakers(btn);
  } catch {
    const countEl = document.getElementById(countElId);
    if (countEl) countEl.textContent = parseInt(countEl.textContent || '0') + 1;
    btn.classList.add('voted');
  }
}

function resortSpeakers(btn) {
  const row = btn.closest('.speaker-row');
  if (!row) return;
  const container = row.closest('.speaker-rows');
  if (!container) return;

  const rows = [...container.querySelectorAll('.speaker-row')];
  rows.sort((a, b) => {
    const av = parseInt(a.querySelector('[id^="vcount-"]')?.textContent || '0', 10);
    const bv = parseInt(b.querySelector('[id^="vcount-"]')?.textContent || '0', 10);
    return bv - av;
  });

  rows.forEach((r, idx) => {
    container.appendChild(r);
    const rank = idx + 1;
    const rankEl = r.querySelector('.rank-badge');
    const medals = ['🥇','🥈','🥉'];
    if (rankEl) {
      rankEl.textContent = rank <= 3 ? medals[rank - 1] : '#' + rank;
      rankEl.className = 'rank-badge ' + (rank <= 3 ? 'rank-' + rank : 'rank-other');
    }
    r.className = 'speaker-row' + (rank <= 3 ? ' rank-' + rank : '');
  });
}

// ─── Init ─────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', loadVotePage);
</script>
<script>
// Auth
async function initAuth() {
  try {
    const res = await fetch('/api/me');
    const data = await res.json();
    const area = document.getElementById('userArea');
    if (!area) return;
    if (data.user) {
      area.innerHTML = `
        <div class="user-menu">
          <div class="user-pill" onclick="this.parentElement.querySelector('.user-dropdown').classList.toggle('open')">
            <img src="${data.user.avatar || ''}" alt="" onerror="this.style.display='none'">
            <span>${data.user.name || data.user.email}</span>
          </div>
          <div class="user-dropdown">
            <a href="/">My Profile</a>
            <a href="/auth/logout">Sign out</a>
          </div>
        </div>`;
      document.addEventListener('click', e => {
        if (!e.target.closest('.user-menu')) {
          document.querySelectorAll('.user-dropdown').forEach(d => d.classList.remove('open'));
        }
      });
    } else {
      area.innerHTML = '<a href="/auth/google" class="sign-in-btn">Sign in with Google</a>';
    }
  } catch(e) { console.warn('Auth check failed'); }
}
initAuth();
</script>
</body>
</html>
