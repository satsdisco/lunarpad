<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project — LunarPad</title>
<link rel="stylesheet" href="/css/style.css">
<link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.css'>
<script src='https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.js'></script>
<style>
.cropper-modal { background: rgba(0,0,0,0.7) !important; }
.cropper-view-box { outline: 2px solid var(--accent) !important; outline-color: rgba(124,92,252,0.75) !important; }

.cropper-point { background-color: var(--accent) !important; width: 8px !important; height: 8px !important; }

</head>
<body>

<header class="header">
  <a href="/" class="logo">Lunar <span class="logo-slash"> \ </span><span class="logo-accent">Pad</span></a>
  <nav class="nav-tabs">
    <a href="/" class="nav-tab active">Build in Public</a>
    <a href="/decks" class="nav-tab">Decks</a>
  </nav>
  <div class="header-actions" id="authArea">
    <div id="userArea"></div>
  </div>
</header>

<div class="container viewer-page">
  <a href="javascript:history.back()" class="viewer-back">Back</a>

  <div id="projectContent">
    <div class="empty-state"><p>Loading...</p></div>
  </div>
</div>

<div class="modal-overlay" id="editProjectModal">
  <div class="modal-content">
    <button class="modal-close" onclick="this.closest('.modal-overlay').classList.remove('open')">&times;</button>
    <div class="modal-title">Edit Project</div>
    <div class="form-group"><label>Name</label><input type="text" id="editProjName"></div>
    <div class="form-group"><label>Description</label><textarea id="editProjDesc"></textarea></div>
    <div class="form-row">
      <div class="form-group"><label>Status</label><select id="editProjStatus"><option value="idea">Idea</option><option value="building">Building</option><option value="shipped">Shipped</option></select></div>
      <div class="form-group"><label>Category</label><select id="editProjCategory"><option value="">None</option><option value="tool">Tool</option><option value="game">Game</option><option value="fun">Fun</option><option value="productivity">Productivity</option><option value="finance">Finance</option><option value="social">Social</option><option value="privacy">Privacy</option><option value="education">Education</option></select></div>
    </div>
    <div class="form-group"><label>Tags</label><input type="text" id="editProjTags"></div>
    <div class="form-row">
      <div class="form-group"><label>Repo URL</label><input type="url" id="editProjRepo"></div>
      <div class="form-group"><label>Demo URL</label><input type="url" id="editProjDemo"></div>
    </div>
    <div class="form-group"><p style="font-size:0.8rem;color:var(--muted2);margin:4px 0 0">Presentation versions are managed from the project page.</p></div>
    <div class="modal-actions">
      <button class="btn" onclick="this.closest('.modal-overlay').classList.remove('open')">Cancel</button>
      <button class="btn btn-primary" onclick="saveProject()">Save</button>
    </div>
  </div>
</div>

<!-- Upload Version Modal -->
<div class="modal-overlay" id="uploadVersionModal">
  <div class="modal-content" style="max-width:440px">
    <button class="modal-close" onclick="this.closest('.modal-overlay').classList.remove('open')">&times;</button>
    <div class="modal-title">Upload New Version</div>
    <div class="form-group">
      <label>Presentation File (.html or .zip)</label>
      <div id="versionDropZone" onclick="document.getElementById('versionFileInput').click()"
        style="border:2px dashed var(--border);border-radius:var(--radius);padding:24px 16px;text-align:center;cursor:pointer;transition:border-color .15s"
        onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">
        <div style="font-size:1.4rem;margin-bottom:6px">📽</div>
        <div id="versionFileName" style="font-size:0.82rem;color:var(--muted2)">Drop file or click to browse</div>
        <input type="file" id="versionFileInput" accept=".html,.htm,.zip" style="display:none" onchange="handleVersionFileSelect(this)">
      </div>
    </div>
    <div class="form-group">
      <label>Version Label <span style="color:var(--muted2);font-weight:400">(optional)</span></label>
      <input type="text" id="versionLabel" placeholder="e.g. Demo Day v2, Final Pitch…">
    </div>
    <div id="versionUploadProgress" style="display:none;margin-bottom:12px">
      <div style="height:4px;background:var(--border);border-radius:2px;overflow:hidden">
        <div id="versionProgressBar" style="height:100%;width:0;background:var(--accent);transition:width .2s"></div>
      </div>
      <div id="versionUploadStatus" style="font-size:0.75rem;color:var(--muted2);margin-top:4px">Uploading…</div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="this.closest('.modal-overlay').classList.remove('open')">Cancel</button>
      <button class="btn btn-primary" id="uploadVersionBtn" onclick="submitVersionUpload()">Upload</button>
    </div>
  </div>
</div>

<!-- Project Zap Modal -->
<div class="modal-overlay" id="zapModal">
  <div class="modal-content" style="max-width:440px;text-align:center">
    <button class="modal-close" onclick="closeZapModal()">&times;</button>
    <div id="zapModalBody"></div>
  </div>
</div>

<div id="zapOverlay" class="zap-overlay">⚡</div>

<!-- Hidden banner file input -->
<input type="file" id="bannerFileInput" accept="image/*" style="display:none" onchange="handleBannerUpload(this)">

<footer class="footer">LunarPad — Build. Ship. Earn sats.</footer>

<script>
const projectId = window.location.pathname.split('/').pop();

function esc(s) { const d = document.createElement('div'); d.textContent = String(s ?? ''); return d.innerHTML; }

function projectVisual(name, category, width, height) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = ((hash << 5) - hash + name.charCodeAt(i)) | 0;
  const h = Math.abs(hash);
  const hue1 = h % 360;
  const hue2 = (h * 7 + 120) % 360;
  const catHues = { game: 270, tool: 190, finance: 40, fun: 330, social: 200, privacy: 160, education: 220, infrastructure: 250, other: 280 };
  const baseHue = catHues[category] || (h % 360);
  const c1 = `hsla(${baseHue}, 60%, 25%, 1)`;
  const c2 = `hsla(${(baseHue + 40) % 360}, 50%, 15%, 1)`;
  const c3 = `hsla(${(baseHue + 80) % 360}, 40%, 8%, 1)`;
  const shapes = [];
  for (let i = 0; i < 5; i++) {
    const x = (h * (i + 3) * 17) % width;
    const y = (h * (i + 7) * 23) % height;
    const r = 20 + ((h * (i + 11)) % 60);
    const opacity = 0.05 + ((h * (i + 5)) % 10) / 100;
    shapes.push(`<circle cx='${x}' cy='${y}' r='${r}' fill='hsla(${(hue2 + i * 30) % 360}, 50%, 50%, ${opacity})'/>`);
  }
  const initials = name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  return `data:image/svg+xml,${encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' width='${width}' height='${height}'><defs><linearGradient id='g' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' stop-color='${c1}'/><stop offset='50%' stop-color='${c2}'/><stop offset='100%' stop-color='${c3}'/></linearGradient></defs><rect width='${width}' height='${height}' fill='url(#g)'/>${shapes.join('')}<text x='50%' y='50%' dominant-baseline='central' text-anchor='middle' font-family='Space Grotesk,system-ui' font-size='${Math.min(width, height) * 0.25}' font-weight='800' fill='rgba(255,255,255,0.08)'>${initials}</text></svg>`)}`;
}

function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  if (days < 30) return days + 'd ago';
  return Math.floor(days / 30) + 'mo ago';
}

function shortUrl(url) {
  try { const u = new URL(url); return (u.hostname + u.pathname).replace(/^www\./,'').replace(/\/$/,''); } catch { return url; }
}

function daysAgo(dateStr) {
  const days = Math.floor((Date.now() - new Date(dateStr).getTime()) / 86400000);
  if (days === 0) return 'today';
  if (days === 1) return '1 day ago';
  return days + ' days ago';
}

let currentProject = null;

// ─── Tab switching ────────────────────────────────────────────────────────────

function switchProjectTab(name, ev) {
  document.querySelectorAll('.project-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.project-tab-view').forEach(v => v.classList.remove('active'));
  if (ev) ev.target.classList.add('active');
  const view = document.getElementById('ptab-' + name);
  if (view) view.classList.add('active');
}

// ─── Load project ─────────────────────────────────────────────────────────────

async function loadProject() {
  try {
    const res = await fetch('/api/projects/' + projectId);
    if (!res.ok) { document.getElementById('projectContent').innerHTML = '<div class="empty-state"><h3>Project not found</h3></div>'; return; }
    const p = await res.json();
    currentProject = p;

    document.title = p.name + ' — LunarPad';

    const tags = typeof p.tags === 'string' ? p.tags.split(',').map(t => t.trim()).filter(Boolean) : [];
    const catClass = p.category ? 'cat-' + p.category : 'cat-default';
    const statusMap = { idea: 'Idea', building: 'Building', shipped: 'Shipped' };

    // Project image (small icon, not full banner)
    const projectImg = p.thumbnail_url || p.banner_url || projectVisual(p.name, p.category, 120, 120);

    document.getElementById('projectContent').innerHTML = `

      <div style="display:flex;align-items:flex-start;gap:16px;margin:16px 0 12px">
        <div style="position:relative;flex-shrink:0;cursor:pointer" id="projectImgWrap">
          <img src="${esc(projectImg)}" alt="" id="projectImgEl" style="width:72px;height:72px;border-radius:var(--radius-lg);object-fit:cover;border:2px solid var(--border);background:var(--glass);display:block">
          <div id="projImgOverlay" style="display:none;position:absolute;inset:0;border-radius:var(--radius-lg);background:rgba(0,0,0,0.5);cursor:pointer;align-items:center;justify-content:center;font-size:1.2rem">📷</div>
          <input type="file" id="projImgInput" accept="image/*" style="display:none" onchange="uploadProjectImage(this)">
        </div>
        <div style="flex:1;min-width:0">
          <h1 class="viewer-title" style="margin-bottom:4px">${esc(p.name)}</h1>
          <div style="font-size:0.85rem;color:var(--muted);margin-bottom:8px">by <strong style="color:var(--text)">${p.user_id ? `<a href="/profile/${esc(p.user_id)}" class="profile-link">${esc(p.builder)}</a>` : esc(p.builder)}</strong></div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
            <span class="card-tag ${p.category ? 'cat-' + p.category : ''}" style="font-size:0.7rem">${esc(p.category || 'project')}</span>
            <span class="card-tag" style="font-size:0.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em">${statusMap[p.status] || p.status}</span>
            ${p.bounty_title ? `<a href="/bounty/${esc(p.bounty_id || '')}" style="text-decoration:none"><span style="color:var(--btc-bright);border:1px solid rgba(242,177,52,.25);border-radius:100px;padding:2px 8px;font-size:0.75rem;background:rgba(242,177,52,.06)">🏆 ${esc(p.bounty_title)}</span></a>` : ''}
          </div>
        </div>
        <div style="display:flex;gap:6px;align-items:flex-start;flex-shrink:0">
          <button class="btn btn-ghost btn-sm" id="editProjectBtn" style="display:none;font-size:0.7rem;color:var(--muted)" onclick="openEditProject()">✏️ Edit</button>
          <button class="btn btn-sm" id="deleteProjectBtn" style="display:none;font-size:0.7rem;color:#a04040;border-color:transparent" onclick="deleteProject()">🗑</button>
        </div>
      </div>

      <div class="project-tabs">
        <button class="project-tab active" onclick="switchProjectTab('overview', event)">Overview</button>
        <button class="project-tab" onclick="switchProjectTab('presentations', event)">Presentations</button>
      </div>

      <!-- Overview Tab -->
      <div class="project-tab-view active" id="ptab-overview">
        <div id="overviewDeckEmbed"></div>
        <div class="project-desc-full">${esc(p.description).replace(/\n/g, '<br>')}</div>

        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:${(p.repo_url || p.demo_url) ? '12px' : '16px'}">
          ${tags.map(t => `<span class="card-tag">${esc(t)}</span>`).join('')}
        </div>

        ${(p.repo_url || p.demo_url) ? `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px">
          ${p.repo_url ? `<a href="${esc(p.repo_url)}" target="_blank" class="project-link-card">⌥ Repository <span class="project-link-domain">→ ${esc(shortUrl(p.repo_url))}</span></a>` : ''}
          ${p.demo_url ? `<a href="${esc(p.demo_url)}" target="_blank" class="project-link-card">↗ Live Demo <span class="project-link-domain">→ ${esc(shortUrl(p.demo_url))}</span></a>` : ''}
        </div>` : ''}

        <div style="padding:20px;margin-top:4px;border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--glass)">
          <div class="project-stats-bar" style="margin-bottom:12px;padding:0">
            <span id="statsZaps" style="font-family:var(--font-mono);font-weight:800;font-size:0.95rem;color:var(--btc-bright)">⚡ — sats</span>
            <span id="statsComments">💬 — comments</span>
            <span>▲ <span id="projVoteCountBtn">${p.votes || 0}</span> votes</span>
          </div>
          <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:${(p.repo_url || p.demo_url) ? '14px' : '0'}">
            <button class="vote-btn vote-pill" id="projVoteBtn" onclick="voteProject()" style="font-size:0.85rem;padding:8px 18px">▲ Upvote</button>
            <button class="btn btn-zap" id="zapProjectBtn" onclick="openZapModal()" style="font-size:0.82rem;padding:7px 16px">⚡ Zap sats</button>
          </div>
          ${(p.repo_url || p.demo_url) ? `<div style="padding-top:14px;border-top:1px solid var(--border);display:flex;gap:16px;flex-wrap:wrap;align-items:center;font-size:0.78rem;color:var(--muted2)">
            ${p.repo_url ? `<a href="${esc(p.repo_url)}" target="_blank" style="color:var(--muted2);text-decoration:none;display:flex;align-items:center;gap:4px" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted2)'">⌥ Repo</a>` : ''}
            ${p.demo_url ? `<a href="${esc(p.demo_url)}" target="_blank" style="color:var(--muted2);text-decoration:none;display:flex;align-items:center;gap:4px" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted2)'">↗ Demo</a>` : ''}
            <span style="margin-left:auto">🕐 Created ${daysAgo(p.created_at)}</span>
          </div>` : `<div style="padding-top:14px;border-top:1px solid var(--border);font-size:0.78rem;color:var(--muted2);text-align:right">🕐 Created ${daysAgo(p.created_at)}</div>`}
        </div>

        <div class="comments-section" id="comments" style="border:none;padding:0;margin-top:16px">
          <div id="commentFormArea"></div>
          <div id="commentList"></div>
        </div>
      </div>

      <!-- Presentations Tab -->
      <div class="project-tab-view" id="ptab-presentations">
        <div id="deckEmbedSection"></div>
        <div id="deckVersionsSection"></div>
      </div>
    `;

    loadVoteState();
    checkOwnership();
    loadZaps();
    loadDeckVersions(p);
    loadCommentCount();
    loadZapTotal();
    loadComments();
  } catch(e) {
    document.getElementById('projectContent').innerHTML = '<div class="empty-state"><h3>Failed to load project</h3></div>';
  }
}

// ─── Stats helpers ─────────────────────────────────────────────────────────────

async function loadCommentCount() {
  try {
    const res = await fetch('/api/projects/' + projectId + '/comments');
    const comments = await res.json();
    const el = document.getElementById('statsComments');
    if (el) el.textContent = '💬 ' + comments.length + ' comment' + (comments.length !== 1 ? 's' : '');
  } catch {}
}

async function loadZapTotal() {
  try {
    const res = await fetch('/api/projects/' + projectId + '/zaps');
    const data = await res.json();
    const el = document.getElementById('statsZaps');
    if (el) el.textContent = '⚡ ' + (data.total_sats ? Number(data.total_sats).toLocaleString() : '0') + ' sats';
  } catch {}
}

// ─── Vote ─────────────────────────────────────────────────────────────────────

async function loadVoteState() {
  try {
    const res = await fetch('/api/vote/count?type=project&id=' + projectId);
    const data = await res.json();
    document.querySelectorAll('#projVoteCount, #projVoteCountBtn').forEach(el => el.textContent = data.votes);
    if (data.voted) document.getElementById('projVoteBtn').classList.add('voted');
  } catch {}
}

async function voteProject() {
  try {
    const res = await fetch('/api/vote', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({type:'project',id:projectId}) });
    const data = await res.json();
    document.querySelectorAll('#projVoteCount, #projVoteCountBtn').forEach(el => el.textContent = data.votes);
    document.getElementById('projVoteBtn').classList.toggle('voted', data.voted);
  } catch {}
}

// ─── Comments ─────────────────────────────────────────────────────────────────

let _projCurrentUser = null;

async function loadComments() {
  const formArea = document.getElementById('commentFormArea');
  const list = document.getElementById('commentList');
  try {
    const meRes = await fetch('/api/me');
    const me = await meRes.json();
    _projCurrentUser = me.user;
    if (me.user) {
      formArea.innerHTML = `
        <div class="comment-form">
          <textarea id="commentText" placeholder="Add a comment..." onkeydown="if((event.metaKey||event.ctrlKey)&&event.key==='Enter')postComment()"></textarea>
          <div class="comment-form-actions">
            <button class="btn btn-primary btn-sm" onclick="postComment()">Comment</button>
          </div>
        </div>`;
    } else {
      formArea.innerHTML = '<p class="sign-in-prompt"><a href="/auth/google">Sign in</a> to comment</p>';
    }

    const res = await fetch('/api/projects/' + projectId + '/comments');
    const comments = await res.json();
    if (!comments.length) { list.innerHTML = '<p class="sign-in-prompt">No comments yet.</p>'; return; }

    // Build threaded structure
    const byId = {};
    const roots = [];
    const replies = {};
    for (const c of comments) {
      byId[c.id] = c;
      const effectiveParent = c.parent_id ? (byId[c.parent_id]?.parent_id || c.parent_id) : null;
      if (!effectiveParent) {
        roots.push(c);
      } else {
        (replies[effectiveParent] = replies[effectiveParent] || []).push(c);
      }
    }
    roots.reverse();
    list.innerHTML = roots.map(c => renderProjThread(c, replies[c.id] || [])).join('');
  } catch { list.innerHTML = '<p class="sign-in-prompt">Could not load comments.</p>'; }
}

function renderProjThread(root, kids) {
  const replyBtn = _projCurrentUser && !kids.length ? `<button class="reply-btn" onclick="focusProjThreadReply('${esc(root.id)}')">Reply</button>` : '';
  const authorHtml = root.user_id ? `<a href="/profile/${esc(root.user_id)}" class="profile-link" onclick="event.stopPropagation()">${esc(root.author_name)}</a>` : esc(root.author_name);
  const threadReplies = kids.map(r => {
    const rAuthor = r.user_id ? `<a href="/profile/${esc(r.user_id)}" class="profile-link" onclick="event.stopPropagation()">${esc(r.author_name)}</a>` : esc(r.author_name);
    return `
      <div class="thread-reply" id="comment-${esc(r.id)}">
        <div class="thread-reply-body">
          <span class="comment-author">${rAuthor}</span>
          <span class="comment-time">${timeAgo(r.created_at)}</span>
          <div class="comment-text">${esc(r.content)}</div>
        </div>
        <button class="vote-btn btn-sm ${r.voted ? 'voted' : ''}" onclick="voteComment('${esc(r.id)}', this)">
          <span class="arrow">▲</span>
          <span>${r.votes || 0}</span>
        </button>
      </div>`;
  }).join('');
  const replyCount = kids.length ? `<span class="thread-count">${kids.length} ${kids.length === 1 ? 'reply' : 'replies'}</span>` : '';
  const quickReply = _projCurrentUser && kids.length ? `
    <div class="thread-reply-input">
      <input id="quickReply-${esc(root.id)}" placeholder="Add a reply..." onkeydown="if(event.key==='Enter'){postProjReply('${esc(root.id)}',true);event.preventDefault()}">
      <button class="btn btn-primary btn-sm" onclick="postProjReply('${esc(root.id)}',true)">Reply</button>
    </div>` : '';
  return `
    <div class="comment-item" id="comment-${esc(root.id)}">
      <div class="comment-body">
        <span class="comment-author">${authorHtml}</span>
        <span class="comment-time">${timeAgo(root.created_at)}</span>
        <div class="comment-text">${esc(root.content)}</div>
        <div class="comment-actions">${replyBtn} ${replyCount}</div>
      </div>
      <button class="vote-btn btn-sm ${root.voted ? 'voted' : ''}" onclick="voteComment('${esc(root.id)}', this)">
        <span class="arrow">▲</span>
        <span>${root.votes || 0}</span>
      </button>
      ${kids.length ? `<div class="thread-replies">${threadReplies}${quickReply}</div>` : ''}
      <div id="reply-form-${esc(root.id)}"></div>
    </div>`;
}

function focusProjThreadReply(parentId) {
  const container = document.getElementById('reply-form-' + parentId);
  if (!container) return;
  container.innerHTML = `
    <div class="thread-replies" style="margin-top:8px">
      <div class="thread-reply-input">
        <input id="quickReply-${parentId}" placeholder="Add a reply..." onkeydown="if(event.key==='Enter'){postProjReply('${parentId}',true);event.preventDefault()}">
        <button class="btn btn-primary btn-sm" onclick="postProjReply('${parentId}',true)">Reply</button>
      </div>
    </div>`;
  document.getElementById('quickReply-' + parentId).focus();
}

async function postProjReply(parentId, useQuickInput) {
  const input = document.getElementById(useQuickInput ? 'quickReply-' + parentId : 'replyInput-' + parentId);
  if (!input) return;
  const content = input.value.trim();
  if (!content) return;
  try {
    const res = await fetch('/api/projects/' + projectId + '/comments', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ content, parent_id: parentId })
    });
    if (res.ok) { loadComments(); loadCommentCount(); }
    else { const e = await res.json(); alert(e.error || 'Failed'); }
  } catch { alert('Failed to post reply'); }
}

async function postComment() {
  const text = document.getElementById('commentText').value.trim();
  if (!text) return;
  try {
    const res = await fetch('/api/projects/' + projectId + '/comments', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ content: text })
    });
    if (res.ok) { document.getElementById('commentText').value = ''; loadComments(); loadCommentCount(); }
    else { const e = await res.json(); alert(e.error || 'Failed'); }
  } catch { alert('Failed to post comment'); }
}

async function voteComment(id, btn) {
  try {
    const res = await fetch('/api/vote', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({type:'comment',id}) });
    const data = await res.json();
    btn.classList.toggle('voted', data.voted);
    btn.querySelector('span:last-child').textContent = data.votes;
  } catch {}
}

// ─── Zap ─────────────────────────────────────────────────────────────────────

let _zapPollInterval = null;
let _zapPollTimeout = null;

function showZap() {
  const el = document.getElementById('zapOverlay');
  el.classList.add('active');
  setTimeout(() => el.classList.remove('active'), 1600);
}

function closeZapModal() {
  document.getElementById('zapModal').classList.remove('open');
  if (_zapPollInterval) { clearInterval(_zapPollInterval); _zapPollInterval = null; }
  if (_zapPollTimeout) { clearTimeout(_zapPollTimeout); _zapPollTimeout = null; }
}

async function loadZaps() {
  try {
    const res = await fetch('/api/projects/' + projectId + '/zaps');
    const data = await res.json();
    const el = document.getElementById('zapStats');
    if (!el) return;
    if (!data.total_sats && !data.zaps.length) { el.innerHTML = ''; return; }
    const zapList = data.zaps.slice(0, 5).map(z =>
      `<span style="font-size:0.75rem;color:var(--muted2)">${z.user_id ? `<a href="/profile/${esc(z.user_id)}" class="profile-link">${esc(z.user_name)}</a>` : esc(z.user_name)} <span style="color:var(--btc-bright)">⚡${Number(z.amount_sats).toLocaleString()}</span></span>`
    ).join('<span style="color:var(--border2);margin:0 4px">·</span>');
    el.innerHTML = `
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:12px 16px;background:rgba(242,177,52,.06);border:1px solid rgba(242,177,52,.15);border-radius:var(--radius);margin-bottom:4px">
        <span style="font-family:var(--font-mono);font-size:0.9rem;font-weight:800;color:var(--btc-bright)">⚡ ${Number(data.total_sats).toLocaleString()} sats</span>
        ${zapList ? `<span style="font-size:0.72rem;color:var(--muted2)">from</span> ${zapList}` : ''}
      </div>`;
  } catch {}
}

function openZapModal() {
  const presets = [1000, 5000, 10000, 21000, 50000, 100000];
  document.getElementById('zapModalBody').innerHTML = `
    <div style="font-size:1.05rem;font-weight:800;color:var(--btc-bright);margin-bottom:4px">⚡ Zap Builder</div>
    <div style="font-size:0.8rem;color:var(--muted2);margin-bottom:20px">Tip the builder directly via Lightning</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:16px">
      ${presets.map(s => `<button class="sats-preset-btn" onclick="setZapAmount(${s}, this)">${s >= 1000 ? (s/1000)+'k' : s}</button>`).join('')}
    </div>
    <div style="margin-bottom:16px">
      <input type="number" id="zapAmountInput" min="1" placeholder="Custom amount (sats)"
        style="width:100%;padding:10px 14px;background:var(--glass);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:0.9rem;text-align:center">
    </div>
    <button class="btn btn-primary" style="width:100%;padding:12px" onclick="generateZapInvoice()">Generate Invoice</button>
    <div id="zapError" style="color:#e05;font-size:0.8rem;margin-top:8px"></div>
  `;
  document.getElementById('zapModal').classList.add('open');
}

function setZapAmount(val, btn) {
  document.getElementById('zapAmountInput').value = val;
  document.querySelectorAll('.sats-preset-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

async function generateZapInvoice() {
  const amount = parseInt(document.getElementById('zapAmountInput').value);
  if (!amount || amount < 1) { document.getElementById('zapError').textContent = 'Enter an amount'; return; }
  document.getElementById('zapError').textContent = '';
  document.getElementById('zapModalBody').innerHTML = `<div style="padding:32px 0;color:var(--muted2);font-size:0.85rem">Generating invoice...</div>`;
  try {
    const r = await fetch('/api/projects/' + projectId + '/zap', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ amount_sats: amount }),
    });
    if (!r.ok) { const e = await r.json(); openZapModal(); document.getElementById('zapError').textContent = e.error || 'Failed'; return; }
    const data = await r.json();
    document.getElementById('zapModalBody').innerHTML = `
      <div style="margin-bottom:12px">
        <div style="font-size:0.95rem;font-weight:800;color:var(--btc-bright)">⚡ ${Number(amount).toLocaleString()} sats</div>
        <div style="font-size:0.75rem;color:var(--muted2);margin-top:2px">→ ${esc(data.recipient)}</div>
      </div>
      <div class="qr-container">
        <img src="${data.qr_data_url}" alt="Lightning QR" style="width:260px;height:260px;border-radius:8px">
      </div>
      <div style="margin:14px 0 8px">
        <div style="font-family:var(--font-mono);font-size:0.62rem;color:var(--muted2);word-break:break-all;padding:8px;background:rgba(0,0,0,.3);border-radius:var(--radius);margin-bottom:6px;max-height:56px;overflow:hidden">${esc(data.payment_request)}</div>
        <button class="btn btn-sm" style="width:100%" onclick="navigator.clipboard.writeText('${esc(data.payment_request)}').then(()=>this.textContent='Copied!').catch(()=>{})">Copy Invoice</button>
      </div>
      <div id="zapPaymentStatus" class="payment-waiting">
        <span class="waiting-dots">Waiting for payment<span class="dot-anim">...</span></span>
      </div>
      <button class="btn btn-primary" style="margin-top:10px;width:100%;display:none" id="confirmZapBtn" onclick="manualConfirmZap('${esc(data.zap_id)}')">✅ I've Paid — Confirm</button>
    `;
    startZapPolling(data.zap_id);
  } catch (e) {
    openZapModal();
    document.getElementById('zapError').textContent = 'Error: ' + e.message;
  }
}

function startZapPolling(zapId) {
  const TIMEOUT_MS = 5 * 60 * 1000;
  _zapPollTimeout = setTimeout(() => {
    clearInterval(_zapPollInterval);
    const el = document.getElementById('zapPaymentStatus');
    if (el) el.innerHTML = 'Payment not detected — it may still arrive later.';
  }, TIMEOUT_MS);
  _zapPollInterval = setInterval(async () => {
    try {
      const r = await fetch('/api/zaps/verify/' + zapId);
      const data = await r.json();
      if (data.settled) {
        clearInterval(_zapPollInterval); clearTimeout(_zapPollTimeout);
        const el = document.getElementById('zapPaymentStatus');
        if (el) el.innerHTML = '<div class="payment-confirmed">⚡ Zap sent!</div>';
        showZap();
        setTimeout(() => { closeZapModal(); loadZaps(); loadZapTotal(); }, 2800);
      } else if (data.no_verify) {
        clearInterval(_zapPollInterval); clearTimeout(_zapPollTimeout);
        const el = document.getElementById('zapPaymentStatus');
        if (el) el.innerHTML = '<span style="font-size:0.78rem;color:var(--muted2)">Auto-verification not available.<br>Click below after you\'ve paid.</span>';
        const btn = document.getElementById('confirmZapBtn');
        if (btn) btn.style.display = '';
      }
    } catch {}
  }, 3000);
}

async function manualConfirmZap(zapId) {
  const btn = document.getElementById('confirmZapBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Confirming…'; }
  try {
    const r = await fetch('/api/zaps/confirm/' + zapId, { method: 'POST' });
    const data = await r.json();
    if (data.settled) {
      const el = document.getElementById('zapPaymentStatus');
      if (el) el.innerHTML = '<div class="payment-confirmed">⚡ Zap confirmed!</div>';
      if (btn) btn.style.display = 'none';
      showZap();
      setTimeout(() => { closeZapModal(); loadZaps(); loadZapTotal(); }, 2800);
    } else {
      if (btn) { btn.disabled = false; btn.textContent = '✅ I\'ve Paid — Confirm'; }
    }
  } catch {
    if (btn) { btn.disabled = false; btn.textContent = '✅ I\'ve Paid — Confirm'; }
  }
}

async function deleteProject() {
  if (!confirm('Delete this project permanently?')) return;
  const r = await fetch('/api/projects/' + projectId, { method: 'DELETE' });
  if (r.ok) window.location.href = '/build';
  else alert('Failed to delete');
}

async function checkOwnership() {
  try {
    const r = await fetch('/api/me');
    const me = await r.json();
    if (me.user && currentProject) {
      const isOwner = currentProject.user_id === me.user.id || !currentProject.user_id;
      if (isOwner || me.user.is_admin) {
        document.getElementById('editProjectBtn').style.display = '';
        document.getElementById('deleteProjectBtn').style.display = '';
        // Show project image upload overlay on hover
        const imgOverlay = document.getElementById('projImgOverlay');
        if (imgOverlay) {
          imgOverlay.style.display = 'flex';
          imgOverlay.style.opacity = '0';
          imgOverlay.style.transition = 'opacity 0.2s';

          if (wrap) {
            wrap.onclick = () => document.getElementById('projImgInput')?.click();
            wrap.onmouseenter = () => imgOverlay.style.opacity = '1';
            wrap.onmouseleave = () => imgOverlay.style.opacity = '0';
          }
        }
      } else {
        const wrap = document.getElementById('projectImgWrap');
        if (wrap) {
          wrap.style.cursor = 'zoom-in';
          wrap.onclick = () => {
            const img = document.getElementById('projectImgEl');
            if (img) openLightbox(img.src);
          };
        }
      }

}

  const p = currentProject;

  document.getElementById('editProjDesc').value = p.description || '';
  document.getElementById('editProjStatus').value = p.status || 'building';

    status: document.getElementById('editProjStatus').value,

// ─── Deck Versions ────────────────────────────────────────────────────────────

function switchPresentationsView(deckId, entryPoint) {
  const iframe = document.querySelector('#deckEmbedSection iframe');
  if (iframe) iframe.src = `/presentations/${deckId}/${entryPoint}`;
}

async function loadDeckVersions(project) {
  const section = document.getElementById('deckVersionsSection');
  const embedSection = document.getElementById('deckEmbedSection');
  if (!section) return;
  try {
    const res = await fetch('/api/projects/' + project.id + '/decks');
    if (!res.ok) { section.innerHTML = ''; return; }
    const versions = await res.json();
    if (!versions.length && !project.deck_id) { section.innerHTML = ''; embedSection.innerHTML = ''; return; }

    // Check ownership for upload button
    const meRes = await fetch('/api/me');
    const me = await meRes.json();
    const canManage = me.user && (me.user.id === project.user_id || me.user.is_admin);

    // Find current deck for embed
    let embedDeckId = null;
    let embedEntryPoint = null;

    let items = '';
    if (versions.length) {
      const currentVer = versions.find(v => v.is_current) || versions[0];
      embedDeckId = currentVer.deck_id;
      embedEntryPoint = currentVer.entry_point || 'index.html';

      items = versions.map(v => {
        const thumb = v.thumbnail
          ? `<img src="/thumbnails/${esc(v.thumbnail)}" style="width:60px;height:34px;border-radius:4px;object-fit:cover">`
          : `<div style="width:60px;height:34px;border-radius:4px;background:var(--glass);display:flex;align-items:center;justify-content:center;font-size:0.7rem;color:var(--muted2)">🎭</div>`;
        const label = v.label || ('v' + v.version);
        const ep = esc(v.entry_point || 'index.html');
        const starBtn = canManage
          ? `<button class="btn btn-sm" style="font-size:0.9rem;padding:2px 6px;background:none;border-color:transparent;color:${v.is_current ? 'var(--btc-bright)' : 'var(--muted2)'}" title="${v.is_current ? 'Featured' : 'Set as featured'}" onclick="event.stopPropagation();setCurrentVersion('${esc(project.id)}','${esc(v.id)}')">${v.is_current ? '⭐' : '☆'}</button>`
          : (v.is_current ? '<span style="font-size:0.6rem;padding:2px 6px;background:rgba(124,92,252,0.15);border:1px solid rgba(124,92,252,0.3);border-radius:100px;color:var(--accent);font-weight:600">Current</span>' : '');
        return `<div style="display:flex;align-items:center;gap:10px;padding:8px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:border-color .15s" onclick="switchPresentationsView('${esc(v.deck_id)}','${ep}')" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">
          ${thumb}
          <div style="flex:1;min-width:0">
            <div style="font-size:0.8rem;font-weight:600;color:var(--text)">${esc(label)}</div>
            <div style="font-size:0.7rem;color:var(--muted2)">${new Date(v.created_at).toLocaleDateString('en',{month:'short',day:'numeric'})}</div>
          </div>
          <button class="btn btn-sm" style="font-size:0.65rem;padding:3px 8px" onclick="event.stopPropagation();window.open('/deck/${esc(v.deck_id)}','_blank')">View</button>
          ${starBtn}
        </div>`;
      }).join('');
    } else if (project.deck_id) {
      // Legacy: fetch deck data and show card
      try {
        const deckRes = await fetch('/api/decks/' + project.deck_id);
        if (deckRes.ok) {
          const deck = await deckRes.json();
          embedDeckId = project.deck_id;
          embedEntryPoint = deck.entry_point || 'index.html';
          const thumb = deck.thumbnail
            ? `<img src="/thumbnails/${esc(deck.thumbnail)}" style="width:60px;height:34px;border-radius:4px;object-fit:cover">`
            : `<div style="width:60px;height:34px;border-radius:4px;background:var(--glass);display:flex;align-items:center;justify-content:center;font-size:0.7rem;color:var(--muted2)">🎭</div>`;
          items = `<div style="display:flex;align-items:center;gap:10px;padding:8px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:border-color .15s" onclick="window.open('/deck/${esc(project.deck_id)}','_blank')" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">
            ${thumb}
            <div style="flex:1;min-width:0">
              <div style="font-size:0.8rem;font-weight:600;color:var(--text)">${esc(deck.title || 'Presentation')}</div>
              <div style="font-size:0.7rem;color:var(--muted2)">v1</div>
            </div>
            <button class="btn btn-sm" style="font-size:0.65rem;padding:3px 8px" onclick="event.stopPropagation();window.open('/deck/${esc(project.deck_id)}','_blank')">View</button>
            <span style="font-size:0.6rem;padding:2px 6px;background:rgba(124,92,252,0.15);border:1px solid rgba(124,92,252,0.3);border-radius:100px;color:var(--accent);font-weight:600">Current</span>
          </div>`;
        } else {
          items = `<div style="font-size:0.78rem;color:var(--muted2);padding:8px"><a href="/deck/${esc(project.deck_id)}" target="_blank" style="color:var(--accent)">View attached presentation →</a></div>`;
          embedDeckId = project.deck_id;
          embedEntryPoint = 'index.html';
        }
      } catch {
        items = `<div style="font-size:0.78rem;color:var(--muted2);padding:8px"><a href="/deck/${esc(project.deck_id)}" target="_blank" style="color:var(--accent)">View attached presentation →</a></div>`;
        embedDeckId = project.deck_id;
        embedEntryPoint = 'index.html';
      }
    }

    // Embed viewer
    if (embedDeckId) {
      window._currentDeck = { deck_id: embedDeckId, entry_point: embedEntryPoint };
      const embedSrc = `/presentations/${esc(embedDeckId)}/${esc(embedEntryPoint)}`;
      const fullscreenUrl = `/deck/${esc(embedDeckId)}`;
      const embedHtml = `
        <div class="project-embed-wrap">
          <iframe src="${embedSrc}" title="Presentation preview" allowfullscreen></iframe>
          <div class="project-embed-fullscreen">
            <a href="${fullscreenUrl}" target="_blank" class="btn btn-sm" style="font-size:0.7rem;padding:4px 10px">↗ Fullscreen</a>
          </div>
        </div>`;
      if (embedSection) embedSection.innerHTML = embedHtml;
      const overviewEmbed = document.getElementById('overviewDeckEmbed');
      if (overviewEmbed) overviewEmbed.innerHTML = `<div style="margin-bottom:20px">${embedHtml}</div>`;
    }

    const uploadBtn = canManage
      ? `<button class="btn btn-sm" style="font-size:0.7rem" onclick="document.getElementById('uploadVersionModal').classList.add('open')">+ New Version</button>`
      : '';

    const count = versions.length || (project.deck_id ? 1 : 0);
    section.innerHTML = `
      <div style="margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <span style="font-family:var(--font-mono);font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--accent)">Version History (${count})</span>
          ${uploadBtn}
        </div>
        <div style="display:flex;flex-direction:column;gap:6px">${items}</div>
      </div>`;
  } catch(e) {
    console.warn('Failed to load deck versions:', e);
    section.innerHTML = '';
  }
}

function handleVersionFileSelect(input) {
  if (input.files[0]) {
    document.getElementById('versionFileName').textContent = input.files[0].name;
  }
}

async function submitVersionUpload() {
  const fileInput = document.getElementById('versionFileInput');
  const label = document.getElementById('versionLabel').value.trim();
  if (!fileInput.files[0]) return alert('Please select a file');
  const btn = document.getElementById('uploadVersionBtn');
  btn.disabled = true; btn.textContent = 'Uploading…';
  document.getElementById('versionUploadProgress').style.display = '';
  try {
    const fd = new FormData();
    fd.append('file', fileInput.files[0]);
    fd.append('title', label || fileInput.files[0].name);
    if (label) fd.append('label', label);
    const r = await fetch('/api/projects/' + projectId + '/decks/upload', { method: 'POST', body: fd });
    if (!r.ok) { const e = await r.json().catch(()=>({})); alert(e.error || 'Upload failed'); return; }
    document.getElementById('uploadVersionModal').classList.remove('open');
    fileInput.value = ''; document.getElementById('versionLabel').value = '';
    document.getElementById('versionFileName').textContent = 'Drop file or click to browse';
    loadDeckVersions(currentProject);
  } catch(e) { alert('Upload failed: ' + e.message); }
  finally { btn.disabled = false; btn.textContent = 'Upload'; document.getElementById('versionUploadProgress').style.display = 'none'; }
}

async function setCurrentVersion(projId, versionId) {
  try {
    const r = await fetch('/api/projects/' + projId + '/decks/' + versionId + '/set-current', { method: 'PATCH' });
    if (r.ok) loadDeckVersions(currentProject);
    else { const e = await r.json().catch(()=>({})); alert(e.error || 'Failed'); }
  } catch { alert('Failed to set version'); }
}

function uploadProjectImage(input) {
  if (!input.files[0]) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    openCropModal(e.target.result, 'project');
  };
  reader.readAsDataURL(input.files[0]);
}

let _cropper = null;
let _cropTarget = null;

function openCropModal(imageSrc, target) {
  _cropTarget = target;
  const img = document.getElementById('cropImage');
  img.src = imageSrc;
  document.getElementById('cropModal').classList.add('open');
  if (_cropper) { _cropper.destroy(); _cropper = null; }
  img.onload = () => {
    _cropper = new Cropper(img, {
      aspectRatio: NaN, // free crop — CSS handles display (square icon on page, wide banner on cards)
      viewMode: 1,
      dragMode: 'move',
      cropBoxResizable: true,
      cropBoxMovable: true,
      background: false,
      guides: false,
      center: true,
      highlight: false,
      autoCropArea: 0.8,
    });
  };
}

function closeCropModal() {
  document.getElementById('cropModal').classList.remove('open');
  if (_cropper) { _cropper.destroy(); _cropper = null; }
}

async function saveCrop() {
  if (!_cropper) return;
  const btn = document.getElementById('cropSaveBtn');
  btn.disabled = true; btn.textContent = 'Saving...';
  const canvas = _cropper.getCroppedCanvas({ maxWidth: 800, maxHeight: 800 });
  canvas.toBlob(async (blob) => {
    const fd = new FormData();
    fd.append('banner', blob, 'project.jpg');
    try {
      const r = await fetch('/api/projects/' + projectId + '/banner', { method: 'POST', body: fd });
      if (r.ok) {
        const data = await r.json();
        const img = document.getElementById('projectImgEl');
        if (img) img.src = data.banner_url + '?t=' + Date.now();
      } else { alert('Upload failed'); }
    } catch { alert('Upload failed'); }
    btn.disabled = false; btn.textContent = 'Save';
    closeCropModal();
  }, 'image/jpeg', 0.9);
}
