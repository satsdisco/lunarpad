<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload — LunarPad</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="header">
  <a href="/" class="logo">Lunar <span class="logo-slash">\</span> <span class="logo-accent">Pad</span></a>
  <nav class="nav-tabs">
    <a href="/" class="nav-tab">Decks</a>
    <a href="/build" class="nav-tab">Build in Public</a>
    
  </nav>
  <div class="header-actions" id="authArea">
    
    <div id="userArea"></div>
  </div>
</header>

<div class="upload-page">
  <h1>Upload a Presentation</h1>
  <p class="subtitle">Drop an .html file or .zip archive — we'll handle the rest</p>

  <form id="uploadForm">
    <div class="drop-zone" id="dropZone">
      <div class="icon">📂</div>
      <div class="label">Drop your file here</div>
      <div class="hint">or click to browse &nbsp;·&nbsp; .html or .zip up to 50MB</div>
      <div class="file-name" id="fileName"></div>
      <input type="file" id="fileInput" accept=".html,.htm,.zip" hidden>
    </div>

    <div class="form-group">
      <label>Title *</label>
      <input type="text" id="title" placeholder="My Amazing Presentation" required>
    </div>

    <div class="form-group">
      <label>Author</label>
      <input type="text" id="author" placeholder="Your name or handle">
    </div>

    <div class="form-group">
      <label>Tags</label>
      <input type="text" id="tags" placeholder="design, tech, keynote (comma-separated)">
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea id="description" placeholder="What's this presentation about?"></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>GitHub URL <span style="font-weight:400;color:var(--muted2)">(optional)</span></label>
        <input type="url" id="github_url" placeholder="https://github.com/you/project">
      </div>
      <div class="form-group">
        <label>Live Demo URL <span style="font-weight:400;color:var(--muted2)">(optional)</span></label>
        <input type="url" id="demo_url" placeholder="https://yourproject.app">
      </div>
    </div>

    <button type="submit" class="btn btn-primary" id="submitBtn" style="width:100%;justify-content:center;padding:14px;" disabled>
      Upload Deck
    </button>

    <div class="upload-progress" id="progress">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">Uploading...</div>
    </div>
  </form>
</div>

<script>
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const fileName = document.getElementById('fileName');
  const submitBtn = document.getElementById('submitBtn');
  let selectedFile = null;

  // Drag & drop
  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files.length) setFile(e.dataTransfer.files[0]);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files.length) setFile(fileInput.files[0]);
  });

  function setFile(file) {
    const ext = file.name.split('.').pop().toLowerCase();
    if (!['html', 'htm', 'zip'].includes(ext)) {
      alert('Only .html, .htm, or .zip files accepted');
      return;
    }
    selectedFile = file;
    fileName.textContent = `📄 ${file.name} (${(file.size / 1024).toFixed(0)} KB)`;
    fileName.style.display = 'block';
    submitBtn.disabled = false;

    // Auto-fill title from filename if empty
    const titleInput = document.getElementById('title');
    if (!titleInput.value) {
      titleInput.value = file.name.replace(/\.(html|htm|zip)$/i, '').replace(/[-_]/g, ' ');
    }
  }

  // Submit
  document.getElementById('uploadForm').addEventListener('submit', async e => {
    e.preventDefault();
    if (!selectedFile) {
      document.querySelector('.drop-zone').style.borderColor = 'var(--danger)';
      alert('Please select an .html or .zip file first');
      return;
    }

    const title = document.getElementById('title').value.trim();
    if (!title) {
      document.getElementById('title').style.borderColor = 'var(--danger)';
      alert('Title is required');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Uploading...';
    const progress = document.getElementById('progress');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    progress.style.display = 'block';

    const formData = new FormData();
    formData.append('file', selectedFile);
    formData.append('title', title);
    formData.append('author', document.getElementById('author').value.trim());
    formData.append('tags', document.getElementById('tags').value.trim());
    formData.append('description', document.getElementById('description').value.trim());
    formData.append('github_url', document.getElementById('github_url').value.trim());
    formData.append('demo_url', document.getElementById('demo_url').value.trim());

    try {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', '/api/upload');

      xhr.upload.addEventListener('progress', e => {
        if (e.lengthComputable) {
          const pct = Math.round((e.loaded / e.total) * 100);
          progressFill.style.width = pct + '%';
          progressText.textContent = pct < 100 ? `Uploading... ${pct}%` : 'Processing...';
        }
      });

      xhr.addEventListener('load', () => {
        if (xhr.status >= 200 && xhr.status < 300) {
          const data = JSON.parse(xhr.responseText);
          progressFill.style.width = '100%';
          progressText.textContent = 'Done! Redirecting...';
          setTimeout(() => { window.location.href = '/deck/' + data.id; }, 500);
        } else {
          const err = JSON.parse(xhr.responseText);
          alert(err.error || 'Upload failed');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Upload Deck';
          progress.style.display = 'none';
        }
      });

      xhr.addEventListener('error', () => {
        alert('Upload failed — check your connection');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Upload Deck';
        progress.style.display = 'none';
      });

      xhr.send(formData);
    } catch (err) {
      alert(err.message);
      submitBtn.disabled = false;
      submitBtn.textContent = 'Upload Deck';
      progress.style.display = 'none';
    }
  });
</script>
<script>
// Auth
async function initAuth() {
  try {
    const res = await fetch('/api/me');
    const data = await res.json();
    const area = document.getElementById('userArea');
    if (!area) return;
    if (data.user) {
      area.innerHTML = `
        <div class="user-menu">
          <div class="user-pill" onclick="this.parentElement.querySelector('.user-dropdown').classList.toggle('open')">
            <img src="${data.user.avatar || ''}" alt="" onerror="this.style.display='none'">
            <span>${data.user.name || data.user.email}</span>
          </div>
          <div class="user-dropdown">
            <a href="/profile">My Profile</a>
            <a href="/auth/logout">Sign out</a>
          </div>
        </div>`;
      document.addEventListener('click', e => {
        if (!e.target.closest('.user-menu')) {
          document.querySelectorAll('.user-dropdown').forEach(d => d.classList.remove('open'));
        }
      });
    } else {
      area.innerHTML = '<a href="/auth/google" class="sign-in-btn">Sign in with Google</a>';
    }
  } catch(e) { console.warn('Auth check failed'); }
}
initAuth();
</script>
</body>
</html>
