<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload — DeckPad</title>
<style>/* ─── DeckPad Global Styles ──────────────────────────────────────────────── */
:root {
  --bg: #050505;
  --surface: #0e0e0e;
  --surface2: #161616;
  --border: #1e1e1e;
  --border2: #2a2a2a;
  --gold: #f5c518;
  --gold2: #c89f15;
  --gold-glow: rgba(245,197,24,.12);
  --text: #eee;
  --muted: #777;
  --muted2: #555;
  --radius: 12px;
  --radius-lg: 16px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

a { color: var(--gold); text-decoration: none; }
a:hover { color: var(--gold2); }

/* ─── Layout ─────────────────────────────────────────────────────────────── */
.container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

/* ─── Header ─────────────────────────────────────────────────────────────── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 32px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
  background: rgba(5,5,5,.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.logo {
  font-size: 1.4em; font-weight: 800; color: var(--gold);
  letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px;
}
.logo span { font-size: 1.3em; }

.header-actions { display: flex; gap: 12px; align-items: center; }

.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 20px; border-radius: 8px; font-size: 14px;
  font-weight: 600; cursor: pointer; border: none;
  transition: all .15s ease;
}
.btn-primary {
  background: var(--gold); color: #000;
}
.btn-primary:hover { background: var(--gold2); transform: translateY(-1px); }
.btn-ghost {
  background: transparent; color: var(--muted); border: 1px solid var(--border2);
}
.btn-ghost:hover { border-color: var(--gold2); color: var(--text); }

/* ─── Search & Filters ───────────────────────────────────────────────────── */
.toolbar {
  display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
  padding: 24px 0 16px;
}

.search-box {
  flex: 1; min-width: 200px; position: relative;
}
.search-box input {
  width: 100%; padding: 11px 16px 11px 40px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-size: 14px; outline: none;
  transition: border-color .2s;
}
.search-box input:focus { border-color: var(--gold2); }
.search-box input::placeholder { color: var(--muted2); }
.search-box::before {
  content: '🔍'; position: absolute; left: 14px; top: 50%;
  transform: translateY(-50%); font-size: 14px; pointer-events: none;
}

.sort-select {
  padding: 11px 16px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-size: 14px; cursor: pointer; outline: none;
}
.sort-select:focus { border-color: var(--gold2); }
.sort-select option { background: var(--surface); }

/* ─── Tags ───────────────────────────────────────────────────────────────── */
.tag-bar {
  display: flex; gap: 6px; flex-wrap: wrap; padding-bottom: 8px;
}
.tag-chip {
  padding: 5px 14px; border-radius: 100px; font-size: 12px; font-weight: 500;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--muted); cursor: pointer; transition: all .15s;
  user-select: none;
}
.tag-chip:hover { border-color: var(--gold2); color: var(--text); }
.tag-chip.active {
  background: var(--gold-glow); border-color: var(--gold2);
  color: var(--gold);
}

/* ─── Gallery Grid ───────────────────────────────────────────────────────── */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px; padding: 8px 0 48px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  cursor: pointer;
  transition: transform .2s ease, border-color .2s, box-shadow .2s;
}
.card:hover {
  transform: translateY(-4px);
  border-color: var(--border2);
  box-shadow: 0 16px 48px rgba(0,0,0,.5);
}
.card-thumb {
  width: 100%; aspect-ratio: 16/9; object-fit: cover;
  background: var(--surface2);
  display: block;
}
.card-thumb-placeholder {
  width: 100%; aspect-ratio: 16/9;
  display: flex; align-items: center; justify-content: center;
  font-size: 48px;
  background: linear-gradient(135deg, #1a1510, #0a0a0a);
}
.card-body { padding: 16px; }
.card-title {
  font-size: 16px; font-weight: 700; color: var(--text);
  margin-bottom: 6px; line-height: 1.3;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.card-meta {
  font-size: 12px; color: var(--muted); display: flex;
  align-items: center; gap: 12px;
}
.card-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 10px; }
.card-tag {
  font-size: 10px; padding: 2px 8px; border-radius: 4px;
  background: rgba(245,197,24,.06); color: var(--gold2);
  border: 1px solid rgba(245,197,24,.12);
}

/* ─── Empty State ────────────────────────────────────────────────────────── */
.empty-state {
  text-align: center; padding: 80px 20px; grid-column: 1 / -1;
}
.empty-state .icon { font-size: 64px; margin-bottom: 16px; }
.empty-state h3 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.empty-state p { color: var(--muted); margin-bottom: 24px; }

/* ─── Pagination ─────────────────────────────────────────────────────────── */
.pagination {
  display: flex; justify-content: center; gap: 8px; padding: 0 0 48px;
}
.page-btn {
  padding: 8px 14px; border-radius: 8px; font-size: 14px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted); cursor: pointer; transition: all .15s;
}
.page-btn:hover { border-color: var(--gold2); color: var(--text); }
.page-btn.active { background: var(--gold); color: #000; border-color: var(--gold); font-weight: 700; }
.page-btn:disabled { opacity: .3; cursor: default; }

/* ─── Upload Page ────────────────────────────────────────────────────────── */
.upload-page { max-width: 640px; margin: 0 auto; padding: 40px 24px 80px; }
.upload-page h1 {
  font-size: 32px; font-weight: 800; margin-bottom: 8px;
}
.upload-page .subtitle { color: var(--muted); margin-bottom: 32px; }

.drop-zone {
  border: 2px dashed var(--border2); border-radius: var(--radius-lg);
  padding: 60px 24px; text-align: center;
  transition: border-color .2s, background .2s; cursor: pointer;
  margin-bottom: 24px;
}
.drop-zone:hover, .drop-zone.drag-over {
  border-color: var(--gold); background: var(--gold-glow);
}
.drop-zone .icon { font-size: 48px; margin-bottom: 12px; }
.drop-zone .label { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.drop-zone .hint { font-size: 13px; color: var(--muted); }
.drop-zone .file-name {
  margin-top: 12px; font-size: 14px; color: var(--gold);
  font-weight: 600; display: none;
}

.form-group { margin-bottom: 20px; }
.form-group label {
  display: block; font-size: 13px; font-weight: 600;
  color: var(--muted); margin-bottom: 6px;
}
.form-group input, .form-group textarea {
  width: 100%; padding: 12px 14px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-size: 14px;
  outline: none; font-family: inherit; transition: border-color .2s;
}
.form-group input:focus, .form-group textarea:focus { border-color: var(--gold2); }
.form-group textarea { resize: vertical; min-height: 80px; }

.upload-progress {
  display: none; margin-top: 20px; text-align: center;
}
.progress-bar-bg {
  width: 100%; height: 6px; background: var(--surface2);
  border-radius: 3px; overflow: hidden; margin-bottom: 8px;
}
.progress-bar-fill {
  height: 100%; background: var(--gold); border-radius: 3px;
  width: 0%; transition: width .3s ease;
}
.progress-text { font-size: 13px; color: var(--muted); }

/* ─── Deck Viewer ────────────────────────────────────────────────────────── */
.viewer-page { padding-bottom: 48px; }

.viewer-back {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 20px 0; font-size: 14px; color: var(--muted);
}
.viewer-back:hover { color: var(--gold); }

.viewer-frame-wrap {
  position: relative; width: 100%; aspect-ratio: 16/9;
  border-radius: var(--radius-lg); overflow: hidden;
  border: 1px solid var(--border);
  background: #000;
}
.viewer-frame {
  width: 100%; height: 100%; border: none;
}
.viewer-fullscreen {
  position: absolute; top: 12px; right: 12px;
  background: rgba(0,0,0,.7); border: 1px solid rgba(255,255,255,.15);
  color: #fff; padding: 8px 14px; border-radius: 8px;
  font-size: 13px; cursor: pointer; opacity: 0;
  transition: opacity .2s;
  backdrop-filter: blur(8px);
}
.viewer-frame-wrap:hover .viewer-fullscreen { opacity: 1; }
.viewer-fullscreen:hover { background: rgba(245,197,24,.3); border-color: var(--gold); }

.viewer-info { padding: 24px 0; }
.viewer-title { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
.viewer-meta { font-size: 14px; color: var(--muted); display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 12px; }
.viewer-desc { font-size: 15px; color: var(--muted); line-height: 1.6; margin-bottom: 16px; }
.viewer-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
.viewer-tag {
  padding: 4px 12px; border-radius: 6px; font-size: 12px;
  background: rgba(245,197,24,.06); color: var(--gold2);
  border: 1px solid rgba(245,197,24,.12);
}

.viewer-actions { display: flex; gap: 10px; flex-wrap: wrap; }

.embed-box {
  margin-top: 20px; padding: 16px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 10px;
  display: none;
}
.embed-box label { font-size: 12px; color: var(--muted); margin-bottom: 6px; display: block; }
.embed-box code {
  display: block; padding: 10px; background: var(--bg);
  border-radius: 6px; font-size: 12px; color: var(--gold);
  word-break: break-all; font-family: 'SF Mono', Monaco, monospace;
}

/* ─── Footer ─────────────────────────────────────────────────────────────── */
.footer {
  text-align: center; padding: 32px; font-size: 13px;
  color: var(--muted2); border-top: 1px solid var(--border);
}

/* ─── Nav Tabs ────────────────────────────────────────────────────────────── */
.nav-tabs { display: flex; align-items: center; gap: 2px; }
.nav-tab {
  padding: 8px 14px; font-size: 13px; font-weight: 500;
  color: var(--muted); text-decoration: none; position: relative;
  transition: color .15s;
}
.nav-tab::after {
  content: ''; position: absolute; bottom: -21px; left: 14px; right: 14px;
  height: 2px; background: var(--gold); border-radius: 2px;
  opacity: 0; transition: opacity .15s;
}
.nav-tab:hover { color: var(--text); }
.nav-tab.active { color: var(--gold); }
.nav-tab.active::after { opacity: 1; }

/* ─── Responsive ─────────────────────────────────────────────────────────── */
@media (max-width: 640px) {
  .header { padding: 16px 20px; gap: 12px; flex-wrap: wrap; }
  .logo { font-size: 1.2em; }
  .nav-tabs { gap: 0; order: 3; width: 100%; border-top: 1px solid var(--border); padding-top: 8px; }
  .nav-tab::after { bottom: -9px; }
  .gallery { grid-template-columns: 1fr; }
  .toolbar { flex-direction: column; }
  .upload-page h1 { font-size: 24px; }
  .viewer-title { font-size: 22px; }
  .viewer-frame-wrap { aspect-ratio: 4/3; }
}
</style>
</head>
<body>

<header class="header">
  <a href="/" class="logo"><span>🎭</span> DeckPad</a>
  <nav class="nav-tabs">
    <a href="/" class="nav-tab">Decks</a>
    <a href="/build" class="nav-tab">Build in Public</a>
    <a href="/vote" class="nav-tab">Vote</a>
  </nav>
  <div class="header-actions">
    <a href="/upload" class="btn btn-primary">⬆ Upload Deck</a>
  </div>
</header>

<div class="upload-page">
  <h1>Upload a Presentation</h1>
  <p class="subtitle">Drop an .html file or .zip archive — we'll handle the rest</p>

  <form id="uploadForm">
    <div class="drop-zone" id="dropZone">
      <div class="icon">📂</div>
      <div class="label">Drop your file here</div>
      <div class="hint">or click to browse &nbsp;·&nbsp; .html or .zip up to 50MB</div>
      <div class="file-name" id="fileName"></div>
      <input type="file" id="fileInput" accept=".html,.htm,.zip" hidden>
    </div>

    <div class="form-group">
      <label>Title *</label>
      <input type="text" id="title" placeholder="My Amazing Presentation" required>
    </div>

    <div class="form-group">
      <label>Author</label>
      <input type="text" id="author" placeholder="Your name or handle">
    </div>

    <div class="form-group">
      <label>Tags</label>
      <input type="text" id="tags" placeholder="design, tech, keynote (comma-separated)">
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea id="description" placeholder="What's this presentation about?"></textarea>
    </div>

    <button type="submit" class="btn btn-primary" id="submitBtn" style="width:100%;justify-content:center;padding:14px;" disabled>
      Upload Deck
    </button>

    <div class="upload-progress" id="progress">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">Uploading...</div>
    </div>
  </form>
</div>

<script>
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const fileName = document.getElementById('fileName');
  const submitBtn = document.getElementById('submitBtn');
  let selectedFile = null;

  // Drag & drop
  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files.length) setFile(e.dataTransfer.files[0]);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files.length) setFile(fileInput.files[0]);
  });

  function setFile(file) {
    const ext = file.name.split('.').pop().toLowerCase();
    if (!['html', 'htm', 'zip'].includes(ext)) {
      alert('Only .html, .htm, or .zip files accepted');
      return;
    }
    selectedFile = file;
    fileName.textContent = `📄 ${file.name} (${(file.size / 1024).toFixed(0)} KB)`;
    fileName.style.display = 'block';
    submitBtn.disabled = false;

    // Auto-fill title from filename if empty
    const titleInput = document.getElementById('title');
    if (!titleInput.value) {
      titleInput.value = file.name.replace(/\.(html|htm|zip)$/i, '').replace(/[-_]/g, ' ');
    }
  }

  // Submit
  document.getElementById('uploadForm').addEventListener('submit', async e => {
    e.preventDefault();
    if (!selectedFile) return;

    const title = document.getElementById('title').value.trim();
    if (!title) { alert('Title is required'); return; }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Uploading...';
    const progress = document.getElementById('progress');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    progress.style.display = 'block';

    const formData = new FormData();
    formData.append('file', selectedFile);
    formData.append('title', title);
    formData.append('author', document.getElementById('author').value.trim());
    formData.append('tags', document.getElementById('tags').value.trim());
    formData.append('description', document.getElementById('description').value.trim());

    try {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', '/api/upload');

      xhr.upload.addEventListener('progress', e => {
        if (e.lengthComputable) {
          const pct = Math.round((e.loaded / e.total) * 100);
          progressFill.style.width = pct + '%';
          progressText.textContent = pct < 100 ? `Uploading... ${pct}%` : 'Processing...';
        }
      });

      xhr.addEventListener('load', () => {
        if (xhr.status >= 200 && xhr.status < 300) {
          const data = JSON.parse(xhr.responseText);
          progressFill.style.width = '100%';
          progressText.textContent = 'Done! Redirecting...';
          setTimeout(() => { window.location.href = '/deck/' + data.id; }, 500);
        } else {
          const err = JSON.parse(xhr.responseText);
          alert(err.error || 'Upload failed');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Upload Deck';
          progress.style.display = 'none';
        }
      });

      xhr.addEventListener('error', () => {
        alert('Upload failed — check your connection');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Upload Deck';
        progress.style.display = 'none';
      });

      xhr.send(formData);
    } catch (err) {
      alert(err.message);
      submitBtn.disabled = false;
      submitBtn.textContent = 'Upload Deck';
      progress.style.display = 'none';
    }
  });
</script>
</body>
</html>
