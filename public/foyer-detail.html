<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idea — LunarPad</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header class="header">
  <a href="/" class="logo">Lunar <span class="logo-slash"> \ </span><span class="logo-accent">Pad</span></a>
  <nav class="nav-tabs">
    <a href="/" class="nav-tab">Build in Public</a>
    <a href="/decks" class="nav-tab">Decks</a>
    <a href="/foyer" class="nav-tab active">The Foyer</a>
  </nav>
  <div class="header-actions" id="authArea">
    <div id="userArea"></div>
  </div>
</header>

<main class="foyer-detail-wrap">
  <a href="/foyer" style="display:inline-flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--muted);text-decoration:none;margin-bottom:16px;transition:color .15s" onmouseenter="this.style.color='var(--accent)'" onmouseleave="this.style.color='var(--muted)'">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Back to The Foyer
  </a>
  <div id="ideaContent">
    <div class="foyer-empty">Loading idea...</div>
  </div>

  <div class="foyer-detail-section" id="comments" style="display:none">
    <div class="comments-header">
      <span id="ideaCommentsHeader">Comments</span>
      <div class="comment-filters" id="ideaCommentFilters" style="display:none">
        <button class="comment-filter active" data-sort="top" onclick="sortIdeaComments('top',this)">Top</button>
        <button class="comment-filter" data-sort="newest" onclick="sortIdeaComments('newest',this)">Newest</button>
        <button class="comment-filter" data-sort="oldest" onclick="sortIdeaComments('oldest',this)">Oldest</button>
        <button class="comment-filter" data-sort="threads" onclick="sortIdeaComments('threads',this)">Biggest threads</button>
      </div>
    </div>
    <div id="ideaCommentFormArea"></div>
    <div id="ideaCommentList"></div>
  </div>
</main>

<script>
const ideaId = window.location.pathname.split('/').pop();

async function loadIdea() {
  try {
    const res = await fetch('/api/ideas/' + ideaId);
    if (!res.ok) { document.getElementById('ideaContent').innerHTML = '<div class="foyer-empty">Idea not found.</div>'; return; }
    const idea = await res.json();
    document.title = idea.title + ' — LunarPad';
    _ideaData = idea;
    document.getElementById('ideaContent').innerHTML = renderIdea(idea);
    document.getElementById('comments').style.display = '';
    initVoteState();
    initTeamState();
    loadIdeaComments();
    loadZapContributors();
  } catch { document.getElementById('ideaContent').innerHTML = '<div class="foyer-empty">Could not load idea.</div>'; }
}

function renderIdea(idea) {
  const authorAvatar = idea.author_avatar ? `<img src="${esc(idea.author_avatar)}" alt="" onerror="this.style.display='none'">` : '';
  const authorName = esc(idea.author_name || idea.author_username || 'Anonymous');
  const membersHtml = idea.members && idea.members.length ? `
    <div class="foyer-detail-section">
      <h3># Team (${idea.members.length})</h3>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        ${idea.members.map(m => `<span style="display:inline-flex;align-items:center;gap:4px;font-size:0.75rem;color:var(--text2);background:var(--glass);border:1px solid var(--border);border-radius:100px;padding:3px 10px 3px 3px">
          ${m.avatar ? `<img src="${esc(m.avatar)}" style="width:18px;height:18px;border-radius:50%" onerror="this.style.display='none'">` : ''}
          ${esc(m.name || m.username)}
        </span>`).join('')}
      </div>
    </div>` : '';

  return `
    <div class="foyer-detail-card">
      <h1>${esc(idea.title)}</h1>
      <div class="foyer-detail-author">
        ${authorAvatar}
        <span>${authorName}</span>
        <span style="margin-left:auto">${timeAgo(idea.created_at)}</span>
      </div>
      <div class="description">${esc(idea.description || '')}</div>
      ${idea.looking_for ? `<div class="looking-for-badges" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px">${idea.looking_for.split(',').map(r => `<span class="looking-for-badge">${esc(r.trim())}</span>`).join('')}</div>` : ''}
      <div class="foyer-detail-stats">
        <span><span class="stat-value">${idea.votes || 0}</span> votes</span>
        <span><span class="stat-value">${idea.total_sats_received || 0}</span> sats</span>
        <span><span class="stat-value">${idea.team_size || 0}</span> builders</span>
      </div>
      <div class="foyer-detail-actions">
        <button class="vote-btn vote-pill" id="voteBtn" onclick="toggleVote()" style="font-size:0.85rem;padding:8px 18px">
          ▲ <span id="voteLabel">Upvote</span> <span id="voteCount">${idea.votes || 0}</span>
        </button>
        <button class="btn btn-zap" onclick="showZapPanel()" style="font-size:0.82rem;padding:7px 16px">⚡ Zap sats</button>
        <button class="btn" id="joinBtn" onclick="toggleTeam()" style="font-size:0.82rem;padding:7px 16px;border-radius:20px">👥 Join Team</button>
        ${idea.converted_to_project_id
          ? `<a href="/project/${esc(idea.converted_to_project_id)}" class="btn btn-primary" style="font-size:0.82rem;padding:7px 16px;border-radius:20px">View Project →</a>`
          : `<button class="btn" id="convertBtn" style="display:none;font-size:0.82rem;padding:7px 16px;border-radius:20px" onclick="showConvertModal()">🚀 Convert to Project</button>`}
      </div>
      ${idea.converted_to_project_id ? `<div style="margin-top:10px;font-size:0.8rem;color:var(--accent)">✓ This idea has been converted to a project</div>` : ''}
      <div id="zapPanel" style="display:none;margin-top:12px;padding:16px;background:var(--glass);border:1px solid var(--border);border-radius:var(--radius)">
        <div id="zapInput">
          <label style="font-size:0.75rem;color:var(--muted);display:block;margin-bottom:6px">Amount (sats)</label>
          <div style="display:flex;gap:8px;margin-bottom:8px">
            <input type="number" id="zapAmount" min="1" value="100" style="flex:1;padding:6px 10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:0.85rem">
            <button class="btn btn-primary btn-sm" onclick="submitZap()">Generate Invoice</button>
          </div>
          <input type="text" id="zapNote" placeholder="Add a note (optional)" style="width:100%;padding:6px 10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:0.8rem;box-sizing:border-box">
        </div>
        <div id="zapQr" style="display:none;text-align:center;margin-top:12px">
          <img id="zapQrImg" src="" style="max-width:200px;border-radius:var(--radius)">
          <p style="font-size:0.7rem;color:var(--muted);margin-top:8px">Scan to pay. Waiting for confirmation...</p>
        </div>
      </div>
    </div>
    ${membersHtml}
    <div class="foyer-detail-section" id="backedBySection" style="display:none">
      <h3># Backed By</h3>
      <div id="backedByList"></div>
    </div>`;
}

async function loadZapContributors() {
  try {
    const res = await fetch('/api/ideas/' + ideaId + '/zaps');
    const data = await res.json();
    const section = document.getElementById('backedBySection');
    const list = document.getElementById('backedByList');
    if (!data.zaps || !data.zaps.length) { section.style.display = 'none'; return; }
    section.style.display = '';
    list.innerHTML = data.zaps.map(z => `
      <div style="display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:0.8rem">
        <span style="color:var(--gold);font-weight:700;flex-shrink:0">⚡ ${z.amount_sats}</span>
        <span style="color:var(--text);font-weight:500">${esc(z.user_name || 'Anonymous')}</span>
        ${z.note ? `<span style="color:var(--text2);font-style:italic;flex:1">"${esc(z.note)}"</span>` : '<span style="flex:1"></span>'}
        <span style="color:var(--muted2);font-size:0.65rem;font-family:var(--font-mono)">${timeAgo(z.created_at)}</span>
      </div>`).join('');
  } catch {}
}

let _voted = false;
let _ideaData = null;

async function initVoteState() {
  try {
    const res = await fetch('/api/vote/check?type=idea&ids=' + ideaId);
    const data = await res.json();
    if (data[ideaId]?.voted) {
      _voted = true;
      const btn = document.getElementById('voteBtn');
      if (btn) btn.classList.add('voted');
    }
  } catch {}
}

async function toggleVote() {
  try {
    const res = await fetch('/api/vote', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({type:'idea',id:ideaId}) });
    const data = await res.json();
    _voted = data.voted;
    const btn = document.getElementById('voteBtn');
    btn.classList.toggle('voted', _voted);
    document.getElementById('voteCount').textContent = data.votes;
  } catch {}
}

function showZapPanel() {
  const panel = document.getElementById('zapPanel');
  panel.style.display = panel.style.display === 'none' ? '' : 'none';
  document.getElementById('zapInput').style.display = '';
  document.getElementById('zapQr').style.display = 'none';
}

let _zapPollInterval = null;

async function submitZap() {
  const amount = parseInt(document.getElementById('zapAmount').value);
  if (!amount || amount < 1) return alert('Enter a valid amount');
  try {
    const res = await fetch('/api/ideas/' + ideaId + '/zap', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ amount_sats: amount, note: (document.getElementById('zapNote')?.value || '').trim() || undefined })
    });
    if (!res.ok) { const e = await res.json(); return alert(e.error || 'Zap failed'); }
    const data = await res.json();
    document.getElementById('zapInput').style.display = 'none';
    document.getElementById('zapQr').style.display = '';
    document.getElementById('zapQrImg').src = data.qr_data_url;
    startZapPoll(data.zap_id);
  } catch { alert('Zap failed'); }
}

function startZapPoll(zapId) {
  if (_zapPollInterval) clearInterval(_zapPollInterval);
  let attempts = 0;
  _zapPollInterval = setInterval(async () => {
    attempts++;
    if (attempts > 60) { clearInterval(_zapPollInterval); return; }
    try {
      const res = await fetch('/api/zaps/verify/' + zapId);
      const data = await res.json();
      if (data.settled) {
        clearInterval(_zapPollInterval);
        document.getElementById('zapPanel').style.display = 'none';
        // Refresh idea to get updated sats
        const iRes = await fetch('/api/ideas/' + ideaId);
        if (iRes.ok) {
          const idea = await iRes.json();
          const statsEl = document.querySelector('.foyer-detail-stats');
          if (statsEl) {
            statsEl.children[1].innerHTML = '<span class="stat-value">' + (idea.total_sats_received || 0) + '</span> sats';
          }
        }
      }
    } catch {}
  }, 3000);
}

// ─── Comments ─────────────────────────────────────────────────────────────────
let _ideaRoots = [];
let _ideaReplies = {};

async function loadIdeaComments() {
  const formArea = document.getElementById('ideaCommentFormArea');
  const list = document.getElementById('ideaCommentList');
  try {
    if (_currentUser) {
      formArea.innerHTML = `
        <div class="comment-form">
          <textarea id="ideaCommentText" placeholder="Add a comment..." onkeydown="if((event.metaKey||event.ctrlKey)&&event.key==='Enter')postIdeaComment()"></textarea>
          <div class="comment-form-actions">
            <button class="btn btn-primary btn-sm" onclick="postIdeaComment()">Comment</button>
          </div>
        </div>`;
    } else {
      formArea.innerHTML = '<p class="sign-in-prompt"><a href="/welcome">Sign in</a> to comment</p>';
    }
    const res = await fetch('/api/ideas/' + ideaId + '/comments');
    const comments = await res.json();
    const header = document.getElementById('ideaCommentsHeader');
    if (header) header.textContent = 'Comments (' + comments.length + ')';
    if (!comments.length) { list.innerHTML = '<p class="sign-in-prompt">No comments yet.</p>'; return; }
    buildIdeaThreadData(comments);
    sortIdeaComments('top');
  } catch { list.innerHTML = '<p class="sign-in-prompt">Could not load comments.</p>'; }
}

function buildIdeaThreadData(comments) {
  const byId = {};
  _ideaRoots = [];
  _ideaReplies = {};
  for (const c of comments) {
    byId[c.id] = c;
    const effectiveParent = c.parent_id ? (byId[c.parent_id]?.parent_id || c.parent_id) : null;
    if (!effectiveParent) { _ideaRoots.push(c); }
    else { (_ideaReplies[effectiveParent] = _ideaReplies[effectiveParent] || []).push(c); }
  }
  const filters = document.getElementById('ideaCommentFilters');
  if (filters) filters.style.display = _ideaRoots.length > 1 ? '' : 'none';
}

function sortIdeaComments(mode, btn) {
  if (btn) {
    document.querySelectorAll('#ideaCommentFilters .comment-filter').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
  const sorted = [..._ideaRoots];
  if (mode === 'top') sorted.sort((a, b) => (b.votes || 0) - (a.votes || 0));
  else if (mode === 'newest') sorted.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
  else if (mode === 'oldest') sorted.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
  else if (mode === 'threads') sorted.sort((a, b) => (_ideaReplies[b.id]?.length || 0) - (_ideaReplies[a.id]?.length || 0));
  const list = document.getElementById('ideaCommentList');
  if (!sorted.length) { list.innerHTML = '<p class="sign-in-prompt">No comments yet.</p>'; return; }
  list.innerHTML = sorted.map(c => renderIdeaThread(c, _ideaReplies[c.id] || [])).join('');
}

function renderIdeaThread(root, kids) {
  const replyBtn = _currentUser && !kids.length ? `<button class="reply-btn" onclick="focusIdeaReply('${esc(root.id)}')">Reply</button>` : '';
  const threadReplies = kids.map(r => `
    <div class="thread-reply" id="comment-${esc(r.id)}">
      <div class="thread-reply-body">
        <span class="comment-author">${esc(r.author_name)}</span>
        <span class="comment-time">${timeAgo(r.created_at)}</span>
        <div class="comment-text">${esc(r.content)}</div>
      </div>
      <button class="vote-btn btn-sm ${r.voted ? 'voted' : ''}" onclick="voteIdeaComment('${esc(r.id)}', this)">
        <span class="arrow">▲</span>
        <span>${r.votes || 0}</span>
      </button>
    </div>`).join('');
  const replyCount = kids.length ? `<span class="thread-count">${kids.length} ${kids.length === 1 ? 'reply' : 'replies'}</span>` : '';
  const quickReply = _currentUser && kids.length ? `
    <div class="thread-reply-input">
      <input id="quickReply-${esc(root.id)}" placeholder="Add a reply..." onkeydown="if(event.key==='Enter'){postIdeaReply('${esc(root.id)}');event.preventDefault()}">
      <button class="btn btn-primary btn-sm" onclick="postIdeaReply('${esc(root.id)}')">Reply</button>
    </div>` : '';
  return `
    <div class="comment-item" id="comment-${esc(root.id)}">
      <div class="comment-body">
        <span class="comment-author">${esc(root.author_name)}</span>
        <span class="comment-time">${timeAgo(root.created_at)}</span>
        <div class="comment-text">${esc(root.content)}</div>
        <div class="comment-actions">${replyBtn} ${replyCount}</div>
      </div>
      <button class="vote-btn btn-sm ${root.voted ? 'voted' : ''}" onclick="voteIdeaComment('${esc(root.id)}', this)">
        <span class="arrow">▲</span>
        <span>${root.votes || 0}</span>
      </button>
      ${kids.length ? `<div class="thread-replies">${threadReplies}${quickReply}</div>` : ''}
      <div id="reply-form-${esc(root.id)}"></div>
    </div>`;
}

function focusIdeaReply(parentId) {
  const container = document.getElementById('reply-form-' + parentId);
  if (!container) return;
  container.innerHTML = `
    <div class="thread-replies" style="margin-top:8px">
      <div class="thread-reply-input">
        <input id="quickReply-${parentId}" placeholder="Add a reply..." onkeydown="if(event.key==='Enter'){postIdeaReply('${parentId}');event.preventDefault()}">
        <button class="btn btn-primary btn-sm" onclick="postIdeaReply('${parentId}')">Reply</button>
      </div>
    </div>`;
  document.getElementById('quickReply-' + parentId).focus();
}

async function postIdeaComment() {
  const text = document.getElementById('ideaCommentText').value.trim();
  if (!text) return;
  try {
    const res = await fetch('/api/ideas/' + ideaId + '/comments', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ content: text })
    });
    if (res.ok) { document.getElementById('ideaCommentText').value = ''; loadIdeaComments(); }
    else { const e = await res.json(); alert(e.error || 'Failed'); }
  } catch { alert('Failed to post comment'); }
}

async function postIdeaReply(parentId) {
  const input = document.getElementById('quickReply-' + parentId);
  if (!input) return;
  const content = input.value.trim();
  if (!content) return;
  try {
    const res = await fetch('/api/ideas/' + ideaId + '/comments', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ content, parent_id: parentId })
    });
    if (res.ok) { loadIdeaComments(); }
    else { const e = await res.json(); alert(e.error || 'Failed'); }
  } catch { alert('Failed to post reply'); }
}

async function voteIdeaComment(id, btn) {
  try {
    const res = await fetch('/api/vote', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({type:'comment',id}) });
    const data = await res.json();
    btn.classList.toggle('voted', data.voted);
    btn.querySelector('span:last-child').textContent = data.votes;
  } catch {}
}

// ─── Team ─────────────────────────────────────────────────────────────────────
let _isMember = false;

function initTeamState() {
  if (!_ideaData || !_currentUser) return;
  _isMember = (_ideaData.members || []).some(m => m.user_id === _currentUser.id);
  const btn = document.getElementById('joinBtn');
  if (btn) {
    btn.textContent = _isMember ? 'Leave Team' : 'Join Team';
    if (_isMember) btn.classList.add('voted'); else btn.classList.remove('voted');
  }
}

async function toggleTeam() {
  const action = _isMember ? 'leave' : 'join';
  try {
    const res = await fetch('/api/ideas/' + ideaId + '/' + action, { method: 'POST' });
    if (!res.ok && res.status !== 409) { const e = await res.json(); return alert(e.error || 'Failed'); }
    await refreshTeam();
  } catch { alert('Failed to ' + action + ' team'); }
}

async function refreshTeam() {
  try {
    const res = await fetch('/api/ideas/' + ideaId);
    if (!res.ok) return;
    _ideaData = await res.json();
    // Update team count in stats
    const statsEl = document.querySelector('.foyer-detail-stats');
    if (statsEl && statsEl.children[2]) {
      statsEl.children[2].innerHTML = '<span class="stat-value">' + (_ideaData.team_size || 0) + '</span> builders';
    }
    // Update members section
    const existingSection = document.querySelector('.foyer-detail-section h3');
    let teamSection = null;
    document.querySelectorAll('.foyer-detail-section h3').forEach(h => { if (h.textContent.includes('Team')) teamSection = h.parentElement; });
    const membersHtml = _ideaData.members && _ideaData.members.length ? `
      <h3># Team (${_ideaData.members.length})</h3>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        ${_ideaData.members.map(m => `<span style="display:inline-flex;align-items:center;gap:4px;font-size:0.75rem;color:var(--text2);background:var(--glass);border:1px solid var(--border);border-radius:100px;padding:3px 10px 3px 3px">
          ${m.avatar ? `<img src="${esc(m.avatar)}" style="width:18px;height:18px;border-radius:50%" onerror="this.style.display='none'">` : ''}
          ${esc(m.name || m.username)}
        </span>`).join('')}
      </div>` : '';
    if (teamSection) {
      if (membersHtml) { teamSection.innerHTML = membersHtml; } else { teamSection.remove(); }
    } else if (membersHtml) {
      const card = document.querySelector('.foyer-detail-card');
      if (card) { const div = document.createElement('div'); div.className = 'foyer-detail-section'; div.innerHTML = membersHtml; card.after(div); }
    }
    initTeamState();
  } catch {}
}

function timeAgo(dateStr) {
  if (!dateStr) return '';
  const now = Date.now();
  const then = new Date(dateStr + (dateStr.includes('Z') ? '' : 'Z')).getTime();
  const diff = Math.floor((now - then) / 1000);
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
  return new Date(then).toLocaleDateString();
}

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ─── Convert ──────────────────────────────────────────────────────────────────
function initConvertState() {
  if (!_ideaData || !_currentUser) return;
  if (_ideaData.converted_to_project_id) return;
  if (_currentUser.id === _ideaData.user_id || _currentUser.is_admin) {
    const btn = document.getElementById('convertBtn');
    if (btn) btn.style.display = '';
  }
}

function showConvertModal() {
  document.getElementById('convertName').value = _ideaData.title || '';
  document.getElementById('convertSats').textContent = _ideaData.total_sats_received || 0;
  document.getElementById('convertTeam').textContent = _ideaData.team_size || 0;
  document.getElementById('convertModal').classList.add('open');
}

async function confirmConvert() {
  const name = document.getElementById('convertName').value.trim();
  if (!name) return alert('Project name required');
  try {
    const res = await fetch('/api/ideas/' + ideaId + '/convert', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ name })
    });
    if (!res.ok) { const e = await res.json(); return alert(e.error || 'Conversion failed'); }
    const data = await res.json();
    window.location.href = '/project/' + data.project_id;
  } catch { alert('Conversion failed'); }
}

loadIdea();
</script>

<div class="modal-overlay" id="convertModal">
  <div class="modal-content">
    <button class="modal-close" onclick="this.closest('.modal-overlay').classList.remove('open')">&times;</button>
    <div class="modal-title">Convert Idea to Project</div>
    <p style="font-size:0.8rem;color:var(--text2);margin-bottom:16px">This will create a new project and carry over the sats pool and team members.</p>
    <div class="form-group">
      <label>Project Name</label>
      <input type="text" id="convertName" placeholder="Project name">
    </div>
    <div style="display:flex;gap:20px;margin:12px 0;font-size:0.8rem;color:var(--muted)">
      <span>Sats: <strong id="convertSats" style="color:var(--text)">0</strong></span>
      <span>Team: <strong id="convertTeam" style="color:var(--text)">0</strong> builders</span>
    </div>
    <div class="form-actions">
      <button class="btn" onclick="this.closest('.modal-overlay').classList.remove('open')">Cancel</button>
      <button class="btn btn-primary" onclick="confirmConvert()">Convert</button>
    </div>
  </div>
</div>
