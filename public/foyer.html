<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Foyer — LunarPad</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header class="header">
  <a href="/" class="logo">Lunar <span class="logo-slash"> \ </span><span class="logo-accent">Pad</span></a>
  <nav class="nav-tabs">
    <a href="/" class="nav-tab">Build in Public</a>
    <a href="/decks" class="nav-tab">Decks</a>
    <a href="/foyer" class="nav-tab active">The Foyer</a>
  </nav>
  <div class="header-actions" id="authArea">
    <div id="userArea"></div>
  </div>
</header>

<main class="container" style="padding-top:24px">
  <div class="foyer-header">
    <h1>The Foyer</h1>
    <p>Share ideas, find collaborators, build together.</p>
  </div>

  <div class="foyer-filters">
    <button class="comment-filter active" data-sort="top" onclick="sortIdeas('top',this)">Top</button>
    <button class="comment-filter" data-sort="newest" onclick="sortIdeas('newest',this)">Newest</button>
    <button class="comment-filter" data-sort="most_zapped" onclick="sortIdeas('most_zapped',this)">Most Backed</button>
    <button class="comment-filter" data-sort="biggest_team" onclick="sortIdeas('biggest_team',this)">Biggest Teams</button>
  </div>

  <div class="foyer-layout">
    <div class="foyer-main">
      <div class="foyer-container" id="bubbleContainer">
        <div class="foyer-empty">Loading ideas...</div>
      </div>
    </div>
    <aside class="foyer-sidebar">
      <div id="topZappersSection" style="display:none;margin-bottom:16px">
        <div class="sidebar-header">Top Zappers This Week</div>
        <div id="topZappersList"></div>
      </div>
      <div class="sidebar-header">Activity</div>
      <div class="activity-feed" id="activityFeed">
        <div class="foyer-empty" style="font-size:0.75rem">Loading activity...</div>
      </div>
    </aside>
  </div>
</main>

<div class="modal-overlay" id="ideaModal">
  <div class="modal-content">
    <button class="modal-close" onclick="this.closest('.modal-overlay').classList.remove('open')">&times;</button>
    <div class="modal-title">Post an Idea</div>
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="ideaTitle" placeholder="What should we build?">
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="ideaDesc" placeholder="Describe the idea, the problem it solves, or why it matters..." rows="4"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn" onclick="this.closest('.modal-overlay').classList.remove('open')">Cancel</button>
      <button class="btn btn-primary" onclick="postIdea()">Post Idea</button>
    </div>
  </div>
</div>

<script>
let _ideas = [];
let _currentSort = 'top';
let _votedIds = new Set();

async function loadIdeas(sort) {
  _currentSort = sort || _currentSort;
  try {
    const res = await fetch('/api/ideas?sort=' + _currentSort);
    _ideas = await res.json();
    // Check which ideas the user has voted on
    if (_ideas.length) {
      try {
        const ids = _ideas.map(i => i.id).join(',');
        const vRes = await fetch('/api/vote/check?type=idea&ids=' + ids);
        const vData = await vRes.json();
        _votedIds = new Set(Object.keys(vData).filter(id => vData[id].voted));
      } catch {}
    }
    renderBubbles();
  } catch { document.getElementById('bubbleContainer').innerHTML = '<div class="foyer-empty">Could not load ideas.</div>'; }
}

function renderBubbles() {
  const container = document.getElementById('bubbleContainer');
  if (!_ideas.length) {
    container.innerHTML = '<div class="foyer-empty">No ideas yet. Be the first to post one!</div>';
    return;
  }
  // Size bubbles based on active sort metric
  const sorted = [..._ideas];
  const metricFn = {
    top:          i => i.votes || 0,
    newest:       i => i.votes || 0,
    oldest:       i => i.votes || 0,
    most_zapped:  i => i.total_sats_received || 0,
    biggest_team: i => i.team_size || 0,
  }[_currentSort] || (i => i.votes || 0);

  const maxMetric = Math.max(...sorted.map(i => metricFn(i)), 1);

  const items = sorted.map(idea => {
    const metric = metricFn(idea);
    const ratio = Math.log(metric + 1) / Math.log(maxMetric + 1);
    const size = Math.round(140 + ratio * 110);
    const fontSize = Math.max(0.7, 0.75 + ratio * 0.35);
    return { idea, size, fontSize, votes: idea.votes || 0 };
  });

  // Sort items by size descending for packing (largest = center top)
  // but keep original indices to map back
  const packOrder = items.map((item, i) => ({ item, i })).sort((a, b) => b.item.size - a.item.size);
  const containerWidth = container.offsetWidth || 800;
  const positions = packBubbles(packOrder.map(p => p.item), containerWidth);
  // Map positions back to original order
  const finalPositions = new Array(items.length);
  packOrder.forEach((p, pi) => { finalPositions[p.i] = positions[pi]; });
  const totalHeight = Math.max(...finalPositions.map(p => p.y + p.r)) + 20;

  container.style.position = 'relative';
  container.style.height = totalHeight + 'px';
  container.innerHTML = finalPositions.map((pos, i) => {
    const item = items[i];
    const voted = _votedIds.has(item.idea.id);
    const converted = item.idea.converted_to_project_id;
    return `<a href="/foyer/${esc(item.idea.id)}" class="idea-bubble ${voted ? 'voted' : ''} ${converted ? 'converted' : ''}"
      style="width:${item.size}px;height:${item.size}px;position:absolute;left:${pos.x - pos.r}px;top:${pos.y - pos.r}px"
      id="bubble-${esc(item.idea.id)}">
      ${converted ? '<span class="bubble-converted">✓</span>' : ''}
      <span class="bubble-title" style="font-size:${item.fontSize}rem">${esc(item.idea.title)}</span>
      ${item.idea.views_today > 0 ? `<span class="bubble-views">${item.idea.views_today} view${item.idea.views_today === 1 ? '' : 's'} today</span>` : ''}
      ${item.idea.total_sats_received > 0 ? `<span class="bubble-sats">⚡ ${item.idea.total_sats_received}</span>` : ''}
      <button class="bubble-vote-btn ${voted ? 'voted' : ''}" onclick="event.preventDefault();event.stopPropagation();voteBubble('${esc(item.idea.id)}',this)" title="Upvote">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        <span id="bv-${esc(item.idea.id)}">${item.votes}</span>
      </button>
    </a>`;
  }).join('');
}

function packBubbles(items, containerWidth) {
  if (!items.length) return [];
  const positions = [];
  const gap = 12;

  // First bubble: top center
  const r0 = items[0].size / 2;
  positions.push({ x: containerWidth / 2, y: r0 + 10, r: r0 });

  // Place remaining bubbles as close to center-top as possible without overlapping
  for (let i = 1; i < items.length; i++) {
    const r = items[i].size / 2;
    let bestX = containerWidth / 2, bestY = 9999;

    // Try candidate positions around each existing bubble
    for (const placed of positions) {
      for (let angle = 0; angle < 360; angle += 15) {
        const rad = angle * Math.PI / 180;
        const dist = placed.r + r + gap;
        const cx = placed.x + Math.cos(rad) * dist;
        const cy = placed.y + Math.sin(rad) * dist;

        // Keep within bounds
        if (cx - r < 0 || cx + r > containerWidth || cy - r < 0) continue;

        // Check no overlap with any placed bubble
        let overlaps = false;
        for (const p of positions) {
          const dx = cx - p.x, dy = cy - p.y;
          if (Math.sqrt(dx * dx + dy * dy) < p.r + r + gap) { overlaps = true; break; }
        }
        if (overlaps) continue;

        // Prefer positions closest to top-center
        const distToCenter = Math.abs(cx - containerWidth / 2) * 0.5 + cy;
        if (distToCenter < bestY) { bestX = cx; bestY = distToCenter; }
      }
    }
    // If bestY is still 9999, fallback
    if (bestY === 9999) {
      const lastY = Math.max(...positions.map(p => p.y + p.r));
      bestX = containerWidth / 2;
      bestY = lastY + r + gap;
      positions.push({ x: bestX, y: bestY, r });
    } else {
      // Recover actual y from the scoring (re-find the best position)
      let finalX = bestX, finalY = 0;
      for (const placed of positions) {
        for (let angle = 0; angle < 360; angle += 15) {
          const rad = angle * Math.PI / 180;
          const dist = placed.r + r + gap;
          const cx = placed.x + Math.cos(rad) * dist;
          const cy = placed.y + Math.sin(rad) * dist;
          if (cx - r < 0 || cx + r > containerWidth || cy - r < 0) continue;
          let overlaps = false;
          for (const p of positions) {
            const dx = cx - p.x, dy = cy - p.y;
            if (Math.sqrt(dx * dx + dy * dy) < p.r + r + gap) { overlaps = true; break; }
          }
          if (overlaps) continue;
          const score = Math.abs(cx - containerWidth / 2) * 0.5 + cy;
          if (Math.abs(score - bestY) < 0.01) { finalX = cx; finalY = cy; }
        }
      }
      positions.push({ x: finalX, y: finalY, r });
    }
  }
  return positions;
}

async function voteBubble(id, btn) {
  try {
    const res = await fetch('/api/vote', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({type:'idea',id}) });
    const data = await res.json();
    document.getElementById('bv-' + id).textContent = data.votes;
    btn.classList.toggle('voted', data.voted);
    const bubble = document.getElementById('bubble-' + id);
    if (bubble) bubble.classList.toggle('voted', data.voted);
    if (data.voted) { _votedIds.add(id); } else { _votedIds.delete(id); }
    // Update the idea in memory for re-sorting
    const idea = _ideas.find(i => i.id === id);
    if (idea) idea.votes = data.votes;
  } catch {}
}

function sortIdeas(sort, btn) {
  document.querySelectorAll('.foyer-filters .comment-filter').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  loadIdeas(sort);
}

async function postIdea() {
  const title = document.getElementById('ideaTitle').value.trim();
  const description = document.getElementById('ideaDesc').value.trim();
  if (!title) return alert('Title is required');
  try {
    const res = await fetch('/api/ideas', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ title, description })
    });
    if (!res.ok) { const e = await res.json(); return alert(e.error || 'Failed'); }
    document.getElementById('ideaTitle').value = '';
    document.getElementById('ideaDesc').value = '';
    document.getElementById('ideaModal').classList.remove('open');
    sortIdeas('newest');
  } catch { alert('Failed to post idea'); }
}

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ─── Activity Feed ────────────────────────────────────────────────────────────
let _activityInterval = null;

async function loadActivity() {
  try {
    const res = await fetch('/api/foyer/activity');
    const items = await res.json();
    const feed = document.getElementById('activityFeed');
    if (!items.length) { feed.innerHTML = '<div class="foyer-empty" style="font-size:0.75rem">No activity yet</div>'; return; }
    feed.innerHTML = items.map(a => {
      const icon = { zap: '⚡', join: '👥', new_idea: '💡', conversion: '🚀' }[a.type] || '•';
      const actor = esc(a.actor_name || 'Someone');
      const idea = esc(a.idea_title || 'an idea');
      let text = '';
      if (a.type === 'zap') text = `<b>${actor}</b> zapped <a href="/foyer/${esc(a.idea_id)}">${idea}</a> ${a.amount_sats} sats`;
      else if (a.type === 'join') text = `<b>${actor}</b> joined <a href="/foyer/${esc(a.idea_id)}">${idea}</a>`;
      else if (a.type === 'new_idea') text = `<b>${actor}</b> posted <a href="/foyer/${esc(a.idea_id)}">${idea}</a>`;
      else if (a.type === 'conversion') text = `<a href="/foyer/${esc(a.idea_id)}">${idea}</a> became a project`;
      return `<div class="activity-item"><span class="activity-icon">${icon}</span><span class="activity-text">${text}</span><span class="activity-time">${timeAgoShort(a.ts)}</span></div>`;
    }).join('');
  } catch {}
}

async function loadTopZappers() {
  try {
    const res = await fetch('/api/foyer/top-zappers');
    const zappers = await res.json();
    const section = document.getElementById('topZappersSection');
    const list = document.getElementById('topZappersList');
    if (!zappers.length) { section.style.display = 'none'; return; }
    section.style.display = '';
    list.innerHTML = zappers.map((z, i) => {
      const medal = ['🥇','🥈','🥉'][i] || `${i+1}.`;
      return `<div class="top-zapper-item">
        <span class="top-zapper-rank">${medal}</span>
        <span class="top-zapper-name">${esc(z.user_name || 'Anonymous')}</span>
        <span class="top-zapper-sats">⚡ ${z.total_sats}</span>
      </div>`;
    }).join('');
  } catch {}
}

function timeAgoShort(dateStr) {
  if (!dateStr) return '';
  const now = Date.now();
  const then = new Date(dateStr + (dateStr.includes('Z') ? '' : 'Z')).getTime();
  const diff = Math.floor((now - then) / 1000);
  if (diff < 60) return 'now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h';
  if (diff < 604800) return Math.floor(diff / 86400) + 'd';
  return new Date(then).toLocaleDateString();
}

loadIdeas('top');
loadTopZappers();
loadActivity();
_activityInterval = setInterval(loadActivity, 30000);
document.addEventListener('visibilitychange', () => {
  if (document.hidden) { clearInterval(_activityInterval); }
  else { loadActivity(); _activityInterval = setInterval(loadActivity, 30000); }
});
</script>
<script src="/js/auth.js"></script>
<script>initAuth();</script>
<button class="fab" title="Post Idea" onclick="document.getElementById('ideaModal').classList.add('open')"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span class="fab-label">Post Idea</span></button>
<script>document.addEventListener("keydown",function(e){if(e.key==="Escape")document.querySelectorAll(".modal-overlay.open").forEach(function(m){m.classList.remove("open")})});</script>
</body>
</html>
